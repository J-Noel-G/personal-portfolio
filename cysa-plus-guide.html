                "4.1": `
    <div class="border-b border-slate-700 pb-4 mb-6">
        <h2 class="text-3xl font-bold text-white">Objective 4.1: Apply Vulnerability Management Reporting and Communication Practices</h2>
    </div>
    <div class="space-y-8">
        <div>
            <p>Finding vulnerabilities is only half the battle. A vulnerability management program that doesn't communicate its findings effectively is a failed program. Reporting is the critical bridge between your technical analysis and the actions the business needs to take to reduce risk. 🌉 This objective covers how to create effective reports, translate them into action plans, measure your program's success, and communicate with the right stakeholders in a language they understand.</p>
        </div>
        <hr class="border-slate-700">

        <div>
            <h3 class="text-2xl font-semibold text-white mb-4">Vulnerability Management Reporting: The Doctor's Diagnosis</h3>
            <p class="mb-4">A good vulnerability report is like a good medical report. It clearly explains the problem, the risk, and the recommended treatment. It must be clear, concise, and actionable.</p>
            <p class="italic mb-4"><strong>Analogy:</strong> A doctor doesn't just hand you a sheet of raw lab numbers. They write a summary that says, "You have high cholesterol (the vulnerability). This increases your risk of a heart attack (the risk score). I recommend diet and exercise (the mitigation)."</p>
            <div class="pl-4">
                <h4 class="text-xl font-semibold text-white mb-2">Key Components of a Report</h4>
                <ul class="list-disc list-inside space-y-1 pl-4">
                    <li><strong>Vulnerabilities:</strong> A clear description of each vulnerability (e.g., <code>CVE-2023-12345</code>, Apache Log4j RCE).</li>
                    <li><strong>Affected Hosts:</strong> A list of the specific systems where the vulnerability was found.</li>
                    <li><strong>Risk Score:</strong> The severity of the finding, usually based on the <code>CVSS</code> score combined with business context.</li>
                    <li><strong>Mitigation:</strong> Clear, actionable guidance on how to fix the vulnerability.</li>
                    <li><strong>Prioritization:</strong> Guidance on which vulnerabilities to fix first based on their overall risk.</li>
                </ul>
            </div>
        </div>
        <hr class="border-slate-700">

        <div>
            <h3 class="text-2xl font-semibold text-white mb-4">Action Plans: The Treatment Plan</h3>
            <p class="mb-4">The report's findings must be translated into a concrete action plan. This plan assigns ownership and deadlines for remediation tasks.</p>
            <ul class="list-disc list-inside space-y-2 pl-4">
                <li><strong>Configuration Management:</strong> The plan may require a change to a system's secure baseline (e.g., disabling <code>TLS 1.0</code> on all web servers).</li>
                <li><strong>Patching:</strong> The most common action. The plan will specify which patches need to be applied to which systems.</li>
                <li><strong>Compensating Controls:</strong> When patching isn't an option, the plan must detail the compensating controls to be implemented (e.g., isolating a legacy system with firewall rules).</li>
                <li><strong>Awareness, Education, and Training:</strong> If the vulnerability is related to human error, the action plan might include mandatory training.</li>
            </ul>
        </div>
        <hr class="border-slate-700">

        <div>
            <h3 class="text-2xl font-semibold text-white mb-4">Inhibitors to Remediation: Why Can't We Just Fix It?</h3>
            <p class="mb-4">In the real world, you can't always apply a patch immediately. An analyst must understand the common business and technical roadblocks that can delay or prevent remediation.</p>
            <p class="italic mb-4"><strong>Analogy:</strong> A mechanic tells you your car needs a major engine repair. You can't do it right now because you need the car to get to work every day. That's a business process interruption.</p>
             <div class="pl-4">
                <h4 class="text-xl font-semibold text-white mb-2">Common Inhibitors</h4>
                 <ul class="list-disc list-inside space-y-2 pl-4">
                    <li><strong>Business Process Interruption:</strong> The #1 inhibitor. The business fears that patching will cause downtime and lost revenue.</li>
                    <li><strong>Degrading Functionality:</strong> A patch might fix a security flaw but remove a feature that the business relies on.</li>
                    <li><strong>Organizational Governance:</strong> Remediation may be governed by strict internal rules, such as a <strong>Service-Level Agreement (<code>SLA</code>)</strong> or a <strong>Memorandum of Understanding (<code>MOU</code>)</strong>.</li>
                    <li><strong>Legacy and Proprietary Systems:</strong> It may be impossible to patch an old, unsupported operating system or a "black box" system.</li>
                </ul>
            </div>
        </div>
        <hr class="border-slate-700">
        
        <div>
            <h3 class="text-2xl font-semibold text-white mb-4">Metrics and KPIs: Are We Getting Better?</h3>
            <p class="mb-4">You must be able to measure the effectiveness of your vulnerability management program. Metrics and Key Performance Indicators (<code>KPIs</code>) help you track progress and justify the program's value.</p>
            <p class="italic mb-4"><strong>Analogy:</strong> It's like tracking your fitness journey. 📈 You measure your weight, your run times, and your blood pressure to see if your diet and exercise plan is working.</p>
             <div class="pl-4">
                <ul class="list-disc list-inside space-y-2 pl-4">
                    <li><strong>Mean Time to Detect (MTTD):</strong> How long does it take us to find a vulnerability after it's published?</li>
                    <li><strong>Mean Time to Acknowledge (MTTA):</strong> How long from when the alert fires until an analyst starts working on it?</li>
                    <li><strong>Mean Time to Remediate (MTTR):</strong> How long from detection until the patch is successfully applied?</li>
                    <li><strong>Trends:</strong> Are the number of open critical vulnerabilities and the MTTR going up or down over time?</li>
                </ul>
            </div>
        </div>
        <hr class="border-slate-700">

        <div>
            <h3 class="text-2xl font-semibold text-white mb-4">Stakeholder Identification and Communication: Know Your Audience</h3>
            <p class="mb-4">A report that is perfect for a system administrator is useless to a CEO. You must tailor your communication to the audience.</p>
             <div class="pl-4">
                <ul class="list-disc list-inside space-y-2 pl-4">
                    <li><strong>Technical Teams (System Admins, Developers):</strong> They need the details—the specific <code>CVE</code>, affected hosts, and the exact patch required.</li>
                    <li><strong>Management (Department Heads, Business Owners):</strong> They need to understand the business risk. Don't tell them about a "buffer overflow"; tell them "this vulnerability could allow an attacker to steal all of your customer data."</li>
                    <li><strong>Executive Leadership (CISO, CIO):</strong> They need a high-level summary. A dashboard showing risk trends over time is perfect for this audience.</li>
                </ul>
            </div>
        </div>
        <hr class="border-slate-700">

        <div>
            <h3 class="text-2xl font-semibold text-white mb-3">Objective 4.1 Summary</h3>
            <p>Effective reporting and communication are what turn the technical data from vulnerability scans into meaningful risk reduction for the business. A CySA+ analyst must be a skilled translator, capable of creating detailed action plans for technical teams and concise, business-focused summaries for leadership. You must also understand the real-world inhibitors that can delay patching and use metrics to prove the value and effectiveness of your security efforts. For the exam, be prepared to identify the most appropriate way to communicate a finding to a specific stakeholder.</p>
        </div>
    `,
                "4.2": `
    <div class="border-b border-slate-700 pb-4 mb-6">
        <h2 class="text-3xl font-bold text-white">Objective 4.2: Explain Incident Reporting and Communication Practices</h2>
    </div>
    <div class="space-y-8">
        <div>
            <p>During a security incident, the technical response is only half the battle. How you communicate during and after the event is just as critical. Poor communication can destroy customer trust, incur massive regulatory fines, and create internal chaos, even if the technical response is perfect. Reporting and communication are the structured processes for keeping the right people informed with the right information at the right time.</p>
        </div>
        <hr class="border-slate-700">

        <div>
            <h3 class="text-2xl font-semibold text-white mb-4">Stakeholder Identification, Declaration, and Escalation</h3>
            <p class="italic mb-4"><strong>Analogy:</strong> A fire breaks out in a hospital. The surgeon needs to know what's happening, but so do the hospital administrator, the fire department, and the patients' families. You can't tell everyone the same thing at the same time. You need a plan.</p>
            <div class="pl-4">
                <ul class="list-disc list-inside space-y-2">
                    <li><strong>Stakeholder Identification:</strong> Before an incident happens, you must identify all the parties who will need to be informed. This includes technical teams, executive leadership, legal, HR, public relations, and potentially customers and regulators.</li>
                    <li><strong>Incident Declaration:</strong> This is the formal moment when an "event" is officially declared an "incident." This declaration, typically made by an incident response lead, triggers the full activation of the <code>IR</code> plan and formal communication channels.</li>
                    <li><strong>Escalation:</strong> The process of notifying people up the chain of command. A playbook should clearly define when and how to escalate an issue from a Tier 1 analyst to a senior incident responder, and from there to the <code>CISO</code> or <code>CIO</code>.</li>
                </ul>
            </div>
        </div>
        <hr class="border-slate-700">

        <div>
            <h3 class="text-2xl font-semibold text-white mb-4">Communications: Managing the Message</h3>
            <p class="mb-4">During an incident, you will have multiple, parallel communication streams.</p>
            <div class="pl-4 space-y-4">
                 <ul class="list-disc list-inside space-y-2">
                    <li><strong>Legal:</strong> Your legal department should be one of your first calls. They provide guidance on liability, regulatory obligations, and can protect evidence under attorney-client privilege. They must approve ALL external communications.</li>
                    <li><strong>Public Relations (PR):</strong> The <code>PR</code> team manages the external narrative. They craft official statements for the media and customers to maintain trust without revealing sensitive technical details.</li>
                    <li><strong>Regulatory Reporting:</strong> Many regulations have strict data breach notification deadlines that analysts must memorize for the exam:
                        <ul class="list-circle list-inside pl-6 mt-1 space-y-1">
                            <li><strong>GDPR:</strong> Requires reporting breaches to authorities within <strong>72 hours</strong>.</li>
                            <li><strong>HIPAA:</strong> Breaches affecting over 500 records must be reported to HHS within <strong>60 days</strong>.</li>
                            <li><strong>PCI DSS:</strong> Strict requirements for handling and reporting credit card data breaches immediately to acquiring banks.</li>
                        </ul>
                    </li>
                    <li><strong>Law Enforcement:</strong> For serious criminal incidents (like a major ransomware attack), you will need to engage with law enforcement agencies like the <code>FBI</code>.</li>
                </ul>
                <p><strong>Real-World Scenario:</strong> A company suffers a ransomware attack. The <code>IR</code> lead tells the execs, "Our primary file-sharing service is down. We believe customer <code>PII</code> was accessed. Our legal counsel has been engaged." They do NOT say, "The threat actor used Cobalt Strike to deploy Ryuk ransomware via a Log4j vulnerability." The message is tailored to the audience.</p>
            </div>
        </div>
        <hr class="border-slate-700">

        <div>
            <h3 class="text-2xl font-semibold text-white mb-4">Incident Response Reporting: Documenting What Happened</h3>
            <p class="mb-4">After the dust settles, you must create a formal report that documents the incident from start to finish.</p>
            <p class="italic mb-4"><strong>Analogy:</strong> This is the final investigation report for a plane crash. It details the full timeline, the cause, and recommendations to prevent it from happening again.</p>
            <div class="pl-4">
                <h4 class="text-xl font-semibold text-white mb-2">Key Components of the Report</h4>
                 <ul class="list-disc list-inside space-y-2 pl-4">
                    <li><strong>Executive Summary:</strong> A one-page, non-technical summary for leadership, focusing on business impact.</li>
                    <li><strong>Who, What, When, Where, and Why:</strong> The detailed narrative of the incident.</li>
                    <li><strong>Timeline:</strong> A chronological log of all major events.</li>
                    <li><strong>Scope:</strong> A description of what assets were affected.</li>
                    <li><strong>Evidence:</strong> A summary of the key forensic evidence collected.</li>
                    <li><strong>Recommendations:</strong> Actionable steps derived from the root cause analysis to prevent recurrence.</li>
                </ul>
            </div>
        </div>
        <hr class="border-slate-700">

        <div>
            <h3 class="text-2xl font-semibold text-white mb-4">Learning and Improving: Post-Incident Analysis</h3>
            <p class="mb-4">The final report is the primary input for the "Lessons Learned" phase.</p>
            <div class="pl-4">
                 <ul class="list-disc list-inside space-y-2">
                    <li><strong>Root Cause Analysis (RCA):</strong> The deep investigation to find the fundamental control failure that allowed the incident to occur. The goal is to fix the underlying problem, not just the symptom.</li>
                    <li><strong>Lessons Learned:</strong> A formal, blame-free meeting where the response team discusses what went well, what went poorly, and what needs to be improved in the process, tools, or training.</li>
                </ul>
            </div>
        </div>
        <hr class="border-slate-700">

        <div>
            <h3 class="text-2xl font-semibold text-white mb-4">Metrics and KPIs: Measuring Performance</h3>
            <p class="mb-4">To improve your incident response process, you have to measure it.</p>
            <p class="italic mb-4"><strong>Analogy:</strong> A fire department tracks its response times to measure its efficiency. ⏱️ A SOC does the same.</p>
            <div class="pl-4">
                <h4 class="text-xl font-semibold text-white mb-2">Key IR Metrics</h4>
                 <ul class="list-disc list-inside space-y-2 pl-4">
                    <li><strong>Mean Time to Detect (MTTD):</strong> How long does an attacker "dwell" in our network before we catch them? A lower number is better.</li>
                    <li><strong>Mean Time to Respond (MTTR):</strong> How quickly can we contain the threat once we know about it? This measures reaction speed. A lower number is better.</li>
                    <li><strong>Mean Time to Remediate (MTTR):</strong> How long does it take to fully eradicate the threat and recover? (Note: <code>MTTR</code> can refer to Respond or Remediate). A lower number is better.</li>
                </ul>
            </div>
        </div>
        <hr class="border-slate-700">

        <div>
            <h3 class="text-2xl font-semibold text-white mb-3">Objective 4.2 Summary</h3>
            <p>In incident response, clear and controlled communication is not a soft skill—it's a core competency. A CySA+ analyst must understand the importance of identifying stakeholders, tailoring the message to the audience, and following a formal communication plan. After the incident, a thorough report that includes a proper root cause analysis and feeds a lessons learned process is what turns a costly failure into a valuable learning opportunity. By tracking metrics like <code>MTTD</code> and <code>MTTR</code>, the organization can measure its progress and build a faster, stronger, and more resilient incident response capability.</p>
        </div>
    `

                const instruction = "You are a CySA+ tutor. Explain the provided concept in simple terms. Provide a real-world analogy. Keep it under 3 paragraphs. Use HTML formatting for readability (<b>, <br>, <ul>, <li>). Do not use markdown backticks.";
                const result = await callGemini(`Explain this concept: ${selectedText}`, instruction);
                
                if(result) addMessage(result, false);
            });

            // AI Action: Mnemonic
            btnMnemonic.addEventListener('click', async () => {
                let selectedText = window.getSelection().toString().trim();
                if (!selectedText && lastSelectedText) {
                    selectedText = lastSelectedText; // Fallback to cached selection for mobile
                }
                
                if (!selectedText) {
                    addMessage("Please highlight a list of items or a concept first to create a mnemonic.", false);
                    return;
                }
                
                addMessage(`Create memory aid for: "${selectedText.substring(0, 30)}..."`, true);
                const instruction = "You are a memory expert. Create a catchy, easy-to-remember mnemonic, acronym, or visual memory hook to help the user memorize the provided text. Keep it brief. Use HTML formatting (<b>, <br>).";
                const result = await callGemini(`Help me memorize this: ${selectedText}`, instruction);
                
                if(result) addMessage(result, false);
            });

            // AI Action: Quiz
            btnQuiz.addEventListener('click', async () => {
                // Get text of current objective
                const currentContent = document.getElementById('content-area').innerText;
                addMessage("Generate a quiz for this section.", true);
                
                const instruction = `You are a strict CySA+ exam writer. Based ONLY on the provided text, generate exactly 3 multiple-choice questions. 
                Return a JSON array of objects with the format:
                [{"q": "Question text", "options": ["A", "B", "C", "D"], "answer": "Correct option exactly as written", "exp": "Brief explanation"}]`;
                
                const jsonStr = await callGemini(`Text: ${currentContent}`, instruction, true);
                
                if(jsonStr) {
                    try {
                        const questions = JSON.parse(jsonStr);
                        let quizHtml = `<h3 class="font-bold text-indigo-400 mb-3">📝 Knowledge Check</h3>`;
                        
                        questions.forEach((item, index) => {
                            quizHtml += `<div class="mb-4 pb-4 border-b border-slate-600 last:border-0"><p class="font-semibold text-white mb-2">${index+1}. ${item.q}</p><div class="space-y-1">`;
                            item.options.forEach((opt, optIndex) => {
                                const isCorrect = opt === item.answer;
                                quizHtml += `<button onclick="this.classList.add('${isCorrect ? 'bg-emerald-600' : 'bg-red-600'}', 'text-white'); if('${isCorrect}' === 'true') { this.parentElement.nextElementSibling.classList.remove('hidden'); }" class="w-full text-left p-2 bg-slate-800 rounded border border-slate-600 hover:border-indigo-400 transition-colors text-sm">${String.fromCharCode(65 + optIndex)}. ${opt}</button>`;
                            });
                            quizHtml += `</div><div class="hidden mt-2 p-2 bg-emerald-900/30 border border-emerald-700 rounded text-xs text-emerald-200"><strong>Correct!</strong> ${item.exp}</div></div>`;
                        });
                        
                        addMessage(quizHtml, false);
                    } catch (e) {
                        addMessage("❌ Failed to parse quiz data. Please try again.", false);
                    }
                }
            });

            // Search Filter
            if(searchInput) {
                searchInput.addEventListener('input', function(e) {
                    const term = e.target.value.toLowerCase();
                    
                    document.querySelectorAll('.nav-item-li').forEach(li => {
                        const text = li.textContent.toLowerCase();
                        if (text.includes(term)) {
                            li.style.display = 'block';
                            const ul = li.closest('ul.collapsible-content');
                            if (ul && term !== '') {
                                ul.classList.add('expanded');
                                const icon = ul.previousElementSibling.querySelector('svg');
                                if(icon) icon.classList.add('rotate-180');
                            }
                        } else {
                            li.style.display = 'none';
                        }
                    });

                    document.querySelectorAll('.domain-container').forEach(container => {
                        const ul = container.querySelector('ul.collapsible-content');
                        if(term !== '') {
                            const hasVisible = Array.from(ul.querySelectorAll('.nav-item-li')).some(item => item.style.display === 'block');
                            container.style.display = hasVisible ? 'block' : 'none';
                        } else {
                            container.style.display = 'block';
                        }
                    });
                });
            }

            function toggleMenu() {
                sidebar.classList.toggle('-translate-x-full');
                overlay.classList.toggle('hidden');
            }
            menuToggle.addEventListener('click', toggleMenu);
            overlay.addEventListener('click', toggleMenu);

            navigationMenu.addEventListener('click', function(e) {
                const domainToggle = e.target.closest('.domain-toggle');
                if (domainToggle) {
                    const content = domainToggle.nextElementSibling;
                    const icon = domainToggle.querySelector('svg');
                    content.classList.toggle('expanded');
                    icon.classList.toggle('rotate-180');
                }
                if (e.target.closest('.sidebar-link') && window.innerWidth < 768) {
                    toggleMenu();
                }
            });

            window.addEventListener('hashchange', router);

            buildNav();
            router();
        });
    </script>
</body>
</html>
