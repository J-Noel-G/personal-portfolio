"1.1": {
                title: "OSI Model Concepts",
                content: `<div class="prose max-w-none"><h2 class="text-3xl font-bold mb-4">1.1 Explain concepts related to the OSI reference model.</h2><p>The OSI model is like a blueprint for how data gets from a program on your computer to a program on another computer. It breaks down this complex process into seven manageable layers. Each layer has a specific job and only talks to the layers directly above and below it. This makes it easier to develop new network technologies and troubleshoot problems.</p>
                <div class="analogy">
                    <p><strong>Analogy: The Postal Service</strong></p>
                    <p>Think of sending a letter. You (Application) write the letter. You might put it in a special greeting card (Presentation) that needs to be opened a certain way. You put it in an envelope and address it (Session/Transport/Network). You drop it in a mailbox (Data Link), and the mail carrier (Physical) picks it up and drives it away. The process is reversed for the recipient.</p>
                </div>
                <h3>Layer 7 - Application</h3><p><strong>What it does:</strong> This is the layer you interact with. It provides network services directly to software applications. It's not the application itself (like Chrome or Outlook), but the protocols that the application uses to communicate over the network.</p><p><strong>Context:</strong> When you type "google.com" into your browser, the browser uses the Hypertext Transfer Protocol (HTTP), an Application layer protocol, to request the webpage.</p><p><strong>Common Protocols:</strong> HTTP/HTTPS, FTP, SMTP, POP3, IMAP, DNS, DHCP, SSH, Telnet</p>
                <h3>Layer 6 - Presentation</h3><p><strong>What it does:</strong> This layer acts as a translator. It ensures that data sent from the Application layer of one system can be read by the Application layer of another system. It handles data formatting, character encoding (like ASCII to Unicode), data compression, and encryption/decryption.</p><p><strong>Context:</strong> When you securely connect to your bank's website, this layer handles the SSL/TLS encryption to scramble your data, making it unreadable to eavesdroppers.</p><p><strong>Key Functions:</strong> Encryption/Decryption, Compression/Decompression, Data formatting (JPEG, GIF, MPEG)</p>
                <h3>Layer 5 - Session</h3><p><strong>What it does:</strong> This is the dialogue controller. It establishes, manages, and terminates connections (called sessions) between two computers. It ensures that the communication is orderly and synchronized.</p><p><strong>Context:</strong> When you're logged into a web application and have multiple tabs open to the same site, the Session layer helps keep track of which data belongs to which tab, preventing your actions in one tab from affecting another.</p><p><strong>Key Functions:</strong> Session establishment, maintenance, and termination; Full-duplex, half-duplex, or simplex communication</p>
                <h3>Layer 4 - Transport</h3><p><strong>What it does:</strong> This layer provides end-to-end communication services. It breaks large amounts of data into smaller chunks called segments. It's responsible for reliability (ensuring all segments arrive and are in order) and flow control (making sure not to overwhelm the receiving computer). This is where TCP (reliable) and UDP (unreliable) live.</p><p><strong>Context:</strong> When you download a file, TCP is used to ensure every single piece of that file arrives correctly. If a piece is missing, TCP requests it to be resent. For a video call, UDP is used because speed is more important than perfect reliability; a few lost pixels are better than a long delay.</p><p><strong>Key Concepts:</strong> Port numbers (0-65535), TCP segments vs UDP datagrams, Flow control, Error detection and correction</p>
                <h3>Layer 3 - Network</h3><p><strong>What it does:</strong> This is the "interstate highway" layer. It's responsible for moving data packets from the source network to the destination network. It uses logical addressing (IP addresses) to figure out the best path for the data to travel, a process known as routing.</p><p><strong>Context:</strong> When you send an email to someone across the world, routers at this layer examine the destination IP address on the packet and forward it from one network to the next, making thousands of "hops" to find its way to the destination.</p><p><strong>Key Concepts:</strong> IP addressing (IPv4/IPv6), Routing protocols (OSPF, EIGRP, BGP), Subnetting, NAT</p>
                <h3>Layer 2 - Data Link</h3><p><strong>What it does:</strong> This layer handles communication on the *local* network segment. It takes the packets from the Network layer and puts them into containers called frames. It adds a physical address (MAC address) to the frame to specify which device on the local network should receive it. It also performs error checking for the physical layer.</p><p><strong>Context:</strong> When your computer wants to send data to your home router, it puts the router's MAC address on the frame. The switch in your house looks at this MAC address to know which physical port to send the frame out of to reach the router.</p><p><strong>Key Concepts:</strong> MAC addresses (48-bit), Ethernet standards, VLANs, Switching, ARP (Address Resolution Protocol)</p>
                <h3>Layer 1 - Physical</h3><p><strong>What it does:</strong> This is the hardware layer. It's responsible for the actual transmission of the raw data bits (1s and 0s) across a physical medium. It defines the specifications for cables, connectors, voltages, and radio frequencies.</p><p><strong>Context:</strong> This is your Ethernet cable, the fiber optic line running under the street, or the Wi-Fi radio waves in the air. It's the physical "stuff" that carries the signal.</p><p><strong>Key Concepts:</strong> Cable types (copper, fiber), Connectors, Signal encoding, Bandwidth, Attenuation</p>
                
                <h3>Data Encapsulation Process</h3>
                <p><strong>Remember:</strong> As data moves down the OSI stack, each layer adds its own header (and sometimes trailer). This is called <strong>encapsulation</strong>:</p>
                <ul>
                    <li><strong>Layer 7-5:</strong> Data</li>
                    <li><strong>Layer 4:</strong> Segments (TCP) or Datagrams (UDP)</li>
                    <li><strong>Layer 3:</strong> Packets</li>
                    <li><strong>Layer 2:</strong> Frames</li>
                    <li><strong>Layer 1:</strong> Bits</li>
                </ul></div>`,
                quiz: [{ question: "Which OSI layer is responsible for logical addressing and routing across different networks?", options: ["Transport", "Network", "Data Link", "Physical"], answer: "Network" }, { question: "If you are troubleshooting a bad Ethernet cable, which OSI layer are you focused on?", options: ["Layer 1 - Physical", "Layer 2 - Data Link", "Layer 3 - Network", "Layer 4 - Transport"], answer: "Layer 1 - Physical" }, { question: "At which layer does data become segments (TCP) or datagrams (UDP)?", options: ["Layer 3 - Network", "Layer 4 - Transport", "Layer 5 - Session", "Layer 2 - Data Link"], answer: "Layer 4 - Transport" }]
            },
            "1.2": {
                title: "Networking Appliances, Applications, and Functions",
                content: `<div class="prose max-w-none"><h2 class="text-3xl font-bold mb-4">1.2 Compare and contrast networking appliances, applications, and functions.</h2><p>As networks grow, we use specialized devices and services to manage them effectively. These can be dedicated hardware boxes (physical appliances) or software running on a server (virtual appliances).</p>
                
                <h3>Core Network Infrastructure</h3>
                <ul>
                    <li><strong>Router:</strong> Think of a router as the traffic cop for a network. Its job is to connect different networks together (like your home network to the internet) and direct traffic between them. It makes decisions based on Layer 3 IP addresses and maintains routing tables.</li>
                    <li><strong>Switch:</strong> A switch is like a smart postal worker inside a single office building. It connects devices on the *same* local network and uses Layer 2 MAC addresses to send data directly to the intended recipient, rather than shouting it out to everyone like an old hub. Creates separate collision domains for each port.</li>
                    <li><strong>Hub (Legacy):</strong> An older device that simply repeats all data to every connected device. Creates one large collision domain and is largely obsolete due to security and performance issues.</li>
                    <li><strong>Bridge:</strong> Connects two network segments and filters traffic based on MAC addresses. Largely replaced by switches but important for understanding Layer 2 concepts.</li>
                    <li><strong>Repeater:</strong> Amplifies signals to extend cable distances. Works at the Physical layer (Layer 1).</li>
                </ul>
                
                <h3>Security Appliances</h3>
                <ul>
                    <li><strong>Firewall:</strong> This is the security guard standing at the gate of your network. It inspects all incoming and outgoing traffic and decides what to allow or block based on a set of security rules. Can be stateless (examines each packet individually) or stateful (tracks connection state).</li>
                    <li><strong>IDS/IPS:</strong> An Intrusion Detection System (IDS) is like a security camera that watches network traffic for suspicious activity and sends an alert. An Intrusion Prevention System (IPS) is like that same camera system but with a guard who can actively step in and block the suspicious activity from happening. IDS is passive monitoring, IPS is active blocking.</li>
                    <li><strong>UTM (Unified Threat Management):</strong> A single device that combines multiple security functions: firewall, antivirus, anti-spam, VPN, and content filtering. Good for smaller networks that need comprehensive security without multiple appliances.</li>
                    <li><strong>NGFW (Next-Generation Firewall):</strong> Advanced firewalls that can inspect application-layer traffic, not just ports and protocols. They can identify specific applications (like Facebook or Skype) and apply policies accordingly.</li>
                </ul>
                
                <h3>Load Balancing and Optimization</h3>
                <ul>
                    <li><strong>Load Balancer:</strong> When a website gets very popular, one server isn't enough. A load balancer sits in front of a group of servers and distributes incoming requests among them, preventing any single server from being overloaded and ensuring the website stays fast and available.</li>
                    <li><strong>Proxy Server:</strong> A proxy server acts as an intermediary. When you browse the web through a proxy, the proxy makes the request on your behalf. This can be used to hide your IP address, bypass content filters, cache frequently accessed websites to speed up access for a whole organization, or filter malicious content.</li>
                    <li><strong>Reverse Proxy:</strong> While a regular proxy acts on behalf of clients, a reverse proxy acts on behalf of servers. It can provide load balancing, SSL termination, and caching for web servers.</li>
                </ul>
                
                <h3>Storage Solutions</h3>
                <ul>
                    <li><strong>NAS (Network-Attached Storage):</strong> A simple, self-contained box you plug into your network to get shared file storage, like a shared drive for your office. Works at the file level and typically uses protocols like NFS or SMB/CIFS.</li>
                    <li><strong>SAN (Storage Area Network):</strong> A much more complex and high-performance dedicated network designed specifically for block-level storage, typically used by servers and databases in a data center. Uses protocols like Fibre Channel or iSCSI.</li>
                </ul>
                
                <h3>Wireless Infrastructure</h3>
                <ul>
                    <li><strong>Wireless Access Point (WAP):</strong> The device that creates a Wi-Fi network. It can operate in several modes: standalone, controller-based, or mesh.</li>
                    <li><strong>Wireless LAN Controller (WLC):</strong> In a large building with many APs, a WLC acts as a central brain, managing all the APs from one place. Handles configuration, security policies, and seamless roaming.</li>
                    <li><strong>Wireless Range Extender/Repeater:</strong> Extends Wi-Fi coverage by receiving and retransmitting the signal. Can reduce performance as it typically halves bandwidth.</li>
                </ul>
                
                <h3>Specialized Services and Functions</h3>
                <ul>
                    <li><strong>CDN (Content Delivery Network):</strong> A network of servers spread across the globe. When you watch a Netflix video, you're not streaming it from a single server in California. You're streaming it from a CDN server located in a data center near you, which makes the video start faster and play more smoothly.</li>
                    <li><strong>VPN Concentrator:</strong> A specialized device that handles multiple VPN connections simultaneously. Provides secure, encrypted "tunnels" for remote users to access the corporate network.</li>
                    <li><strong>DNS Server:</strong> The "phonebook" of the internet that translates domain names (like google.com) to IP addresses. Can be authoritative (holds the actual records) or recursive (queries other DNS servers on behalf of clients).</li>
                    <li><strong>DHCP Server:</strong> Automatically assigns IP addresses, subnet masks, default gateways, and DNS servers to devices when they join a network. Eliminates manual IP configuration.</li>
                    <li><strong>QoS (Quality of Service):</strong> QoS is like creating a VIP lane on the network highway. It allows you to prioritize time-sensitive traffic, like a video conference or a VoIP phone call, over less important traffic, like a large file download, ensuring your call doesn't get choppy.</li>
                    <li><strong>TTL (Time to Live):</strong> This is a safety mechanism. Every IP packet has a TTL value that gets reduced by one every time it crosses a router. If the TTL reaches zero, the packet is destroyed. This prevents packets from getting stuck in an infinite routing loop and circling the internet forever.</li>
                </ul>
                
                <h3>Network Monitoring and Management</h3>
                <ul>
                    <li><strong>SIEM (Security Information and Event Management):</strong> Collects and analyzes security logs from across the network to identify potential threats and compliance issues.</li>
                    <li><strong>Network Analyzer/Packet Capture:</strong> Tools like Wireshark that capture and analyze network traffic for troubleshooting and security analysis.</li>
                    <li><strong>Bandwidth Shaper/Traffic Shaper:</strong> Controls the flow of network traffic to ensure fair usage and prevent any single application or user from consuming all available bandwidth.</li>
                </ul></div>`,
                quiz: [{ question: "Your company's website is slowing down due to high traffic. Which device would you implement to distribute requests across multiple web servers?", options: ["Firewall", "Router", "Load Balancer", "Proxy"], answer: "Load Balancer" }, { question: "An IDS is a ______ security control, while an IPS is a ______ control.", options: ["preventive, detective", "detective, preventive", "corrective, detective", "detective, corrective"], answer: "detective, preventive" }, { question: "Which device operates at Layer 2 and creates separate collision domains for each port?", options: ["Hub", "Switch", "Router", "Repeater"], answer: "Switch" }]
            },
            "1.3": {
                title: "Cloud Concepts and Connectivity Options",
                content: `<div class="prose max-w-none"><h2 class="text-3xl font-bold mb-4">1.3 Summarize cloud concepts and connectivity options.</h2><p>Cloud computing is essentially renting someone else's computer, storage, and network resources over the internet. This offers incredible flexibility and power without the need to buy and maintain your own physical hardware.</p>
                
                <h3>Core Cloud Concepts</h3>
                <ul>
                    <li><strong>Virtualization:</strong> The foundation of cloud computing. It allows multiple virtual machines to run on a single physical server, maximizing resource utilization and enabling rapid provisioning.</li>
                    <li><strong>NFV (Network Functions Virtualization):</strong> This is the big idea of taking functions that used to require a dedicated hardware box (like a router or firewall) and turning them into software that can run on any standard server. This is a foundational concept for cloud networking.</li>
                    <li><strong>VPC (Virtual Private Cloud):</strong> Imagine a giant data center owned by AWS or Azure. A VPC is your own private, logically isolated section of that data center. You can create your own subnets, routing tables, and security rules within your VPC, just like you would in a physical network, but it's all virtual.</li>
                    <li><strong>Scalability vs. Elasticity:</strong> <strong>Scalability</strong> is the ability to add more resources to handle a growing workload (e.g., adding more servers as your user base grows). <strong>Elasticity</strong> is the ability to automatically add *or remove* resources in response to short-term spikes in demand. Think of a retailer's website automatically adding servers for Black Friday and then removing them afterwards.</li>
                    <li><strong>Multitenancy:</strong> This is how cloud providers make money efficiently. They have a single, massive infrastructure that is shared by many different customers ("tenants"), with strong logical separation to keep everyone's data private and secure.</li>
                    <li><strong>High Availability:</strong> Cloud systems are designed with redundancy and failover capabilities to minimize downtime. Typically measured as "nines" (99.9%, 99.99%, etc.).</li>
                </ul>
                
                <h3>Cloud Security</h3>
                <ul>
                    <li><strong>Security Groups:</strong> Act as virtual firewalls at the instance level. They control inbound and outbound traffic using allow rules only (stateful).</li>
                    <li><strong>NACLs (Network Access Control Lists):</strong> Act as firewalls at the subnet level. They can have both allow and deny rules and are stateless (must define rules for both directions).</li>
                    <li><strong>Identity and Access Management (IAM):</strong> Controls who can access what resources in the cloud environment. Uses principles of least privilege and role-based access control.</li>
                    <li><strong>Data Encryption:</strong> Encryption at rest (stored data) and in transit (data being transmitted) are essential cloud security practices.</li>
                </ul>
                
                <h3>Cloud Connectivity Options</h3>
                <ul>
                    <li><strong>Internet Gateway:</strong> This is the virtual "front door" of your VPC. You attach it to your VPC to allow resources in public subnets to communicate with the internet.</li>
                    <li><strong>NAT Gateway/NAT Instance:</strong> This allows servers in a *private* subnet (which can't be reached from the internet) to initiate connections *out* to the internet (e.g., to download software updates), without allowing the internet to initiate connections back to them.</li>
                    <li><strong>VPN Connection:</strong> Creates a secure, encrypted tunnel over the public internet to connect your on-premises network to your VPC. Cost-effective but limited by internet bandwidth and latency.</li>
                    <li><strong>Direct Connect:</strong> A dedicated, private physical connection from your data center directly to the cloud provider's network. Offers higher bandwidth, lower latency, and more consistent performance than VPN.</li>
                    <li><strong>Transit Gateway:</strong> A central hub that connects multiple VPCs and on-premises networks, simplifying complex network topologies.</li>
                    <li><strong>VPC Peering:</strong> Allows two VPCs to communicate directly with each other using private IP addresses, as if they were on the same network.</li>
                </ul>
                
                <h3>Service Models - The "as a Service" Stack</h3>
                <p><strong>The Pizza Analogy:</strong></p>
                <ul>
                    <li><strong>On-Premises:</strong> You make everything from scratch - buy ingredients, make dough, cook, serve, and clean up. (You manage everything)</li>
                    <li><strong>IaaS (Infrastructure as a Service):</strong> The cloud provider gives you the basic ingredients (pizza dough, sauce, cheese). You add your own toppings and bake it yourself. (You manage the OS and applications, they provide the hardware)</li>
                    <li><strong>PaaS (Platform as a Service):</strong> They deliver the pizza ready to eat, but you set the table and provide the drinks. (You manage your application code, they manage the OS, runtime, and servers)</li>
                    <li><strong>SaaS (Software as a Service):</strong> You just go to a restaurant and eat the pizza. They handle everything. (You just use the software, like Gmail or Salesforce)</li>
                </ul>
                
                <h3>Deployment Models</h3>
                <ul>
                    <li><strong>Public Cloud:</strong> Resources owned and operated by a third-party provider (AWS, Azure, GCP) and shared among multiple organizations.</li>
                    <li><strong>Private Cloud:</strong> Cloud infrastructure dedicated to a single organization, either on-premises or hosted by a third party.</li>
                    <li><strong>Hybrid Cloud:</strong> Combination of public and private clouds that can share data and applications.</li>
                    <li><strong>Community Cloud:</strong> Shared by several organizations with common concerns (security, compliance, jurisdiction).</li>
                </ul>
                
                <h3>Cloud Benefits and Considerations</h3>
                <ul>
                    <li><strong>CapEx vs OpEx:</strong> Cloud shifts costs from capital expenditure (buying servers) to operational expenditure (monthly service fees).</li>
                    <li><strong>Global Reach:</strong> Deploy resources in multiple geographic regions for performance and disaster recovery.</li>
                    <li><strong>Vendor Lock-in:</strong> The difficulty of moving from one cloud provider to another due to proprietary services and APIs.</li>
                    <li><strong>Compliance:</strong> Cloud providers offer various compliance certifications (SOC, HIPAA, PCI DSS) but shared responsibility model applies.</li>
                </ul></div>`,
                quiz: [{ question: "You need to allow servers in a private VPC subnet to download security patches from the internet, but you cannot allow any inbound connections to those servers. What should you use?", options: ["Internet Gateway", "NAT Gateway", "Direct Connect", "VPN"], answer: "NAT Gateway" }, { question: "Which cloud service model gives the customer the most responsibility, including managing the operating system?", options: ["SaaS", "PaaS", "IaaS", "FaaS"], answer: "IaaS" }, { question: "What is the main difference between scalability and elasticity?", options: ["Scalability is automatic, elasticity is manual", "Elasticity can scale both up and down automatically, scalability typically refers to scaling up", "They are the same thing", "Scalability is for storage, elasticity is for compute"], answer: "Elasticity can scale both up and down automatically, scalability typically refers to scaling up" }]
            },
            "1.4": {
                title: "Networking Ports, Protocols, and Traffic Types",
                content: `<div class="prose max-w-none"><h2 class="text-3xl font-bold mb-4">1.4 Explain common networking ports, protocols, and traffic types.</h2><p>To ensure data gets to the right application on a server, networks use a system of ports. Think of an IP address as the street address of an apartment building, and the port number as the specific apartment number for the application you want to talk to.</p>
                
                <h3>Port Number Ranges</h3>
                <ul>
                    <li><strong>Well-known ports (0-1023):</strong> Reserved for system services and common protocols</li>
                    <li><strong>Registered ports (1024-49151):</strong> Assigned to specific applications by IANA</li>
                    <li><strong>Dynamic/Private ports (49152-65535):</strong> Used for temporary connections</li>
                </ul>
                
                <h3>Essential Protocols and Their Ports</h3>
                <table>
                    <thead><tr><th>Protocol</th><th>Port(s)</th><th>Context & Purpose</th></tr></thead>
                    <tbody>
                        <tr><td><strong>FTP</strong></td><td>20, 21</td><td>File Transfer Protocol. Port 21 for commands, Port 20 for data. Has active and passive modes.</td></tr>
                        <tr><td><strong>SSH / SFTP</strong></td><td>22</td><td><strong>SSH</strong> provides secure command-line management. <strong>SFTP</strong> is secure file transfer over SSH.</td></tr>
                        <tr><td><strong>Telnet</strong></td><td>23</td><td>Insecure, clear-text remote management. Replaced by SSH in modern networks.</td></tr>
                        <tr><td><strong>SMTP</strong></td><td>25</td><td>Simple Mail Transfer Protocol - for sending email between mail servers.</td></tr>
                        <tr><td><strong>DNS</strong></td><td>53</td><td>Domain Name System - translates domain names to IP addresses. Uses both TCP and UDP.</td></tr>
                        <tr><td><strong>DHCP</strong></td><td>67, 68</td><td>Dynamic Host Configuration Protocol - automatically assigns IP addresses. Server uses 67, client uses 68.</td></tr>
                        <tr><td><strong>HTTP</strong></td><td>80</td><td>Hypertext Transfer Protocol - foundation of the World Wide Web (unencrypted).</td></tr>
                        <tr><td><strong>POP3</strong></td><td>110</td><td>Post Office Protocol v3 - downloads email from server to client (email gets deleted from server).</td></tr>
                        <tr><td><strong>NTP</strong></td><td>123</td><td>Network Time Protocol - synchronizes computer clocks across networks.</td></tr>
                        <tr><td><strong>IMAP</strong></td><td>143</td><td>Internet Message Access Protocol - accesses email on server (email stays on server).</td></tr>
                        <tr><td><strong>SNMP</strong></td><td>161, 162</td><td>Simple Network Management Protocol - monitors and manages network devices. 161 for queries, 162 for traps.</td></tr>
                        <tr><td><strong>LDAP</strong></td><td>389</td><td>Lightweight Directory Access Protocol - accesses directory services like Active Directory.</td></tr>
                        <tr><td><strong>HTTPS</strong></td><td>443</td><td>HTTP Secure - encrypted web traffic using SSL/TLS.</td></tr>
                        <tr><td><strong>SMB/CIFS</strong></td><td>445</td><td>Server Message Block - Windows file and printer sharing.</td></tr>
                        <tr><td><strong>LDAPS</strong></td><td>636</td><td>LDAP over SSL - secure directory access.</td></tr>
                        <tr><td><strong>FTPS</strong></td><td>989, 990</td><td>FTP over SSL - secure file transfer.</td></tr>
                        <tr><td><strong>IMAP over SSL</strong></td><td>993</td><td>Secure IMAP email access.</td></tr>
                        <tr><td><strong>POP3 over SSL</strong></td><td>995</td><td>Secure POP3 email access.</td></tr>
                        <tr><td><strong>RDP</strong></td><td>3389</td><td>Remote Desktop Protocol - graphical remote control of Windows computers.</td></tr>
                        <tr><td><strong>SIP</strong></td><td>5060, 5061</td><td>Session Initiation Protocol - sets up Voice over IP (VoIP) calls. 5060 unencrypted, 5061 encrypted.</td></tr>
                    </tbody>
                </table>
                
                <h3>Core Transport Protocols</h3>
                <ul>
                    <li><strong>TCP (Transmission Control Protocol):</strong> 
                        <ul>
                            <li>Connection-oriented and reliable</li>
                            <li>Uses three-way handshake (SYN, SYN-ACK, ACK)</li>
                            <li>Provides error detection, correction, and retransmission</li>
                            <li>Flow control prevents overwhelming the receiver</li>
                            <li>Used for web browsing, email, file transfers - anything requiring accuracy</li>
                        </ul>
                    </li>
                    <li><strong>UDP (User Datagram Protocol):</strong>
                        <ul>
                            <li>Connectionless and "best-effort"</li>
                            <li>No handshake, acknowledgments, or retransmissions</li>
                            <li>Much lower overhead and faster than TCP</li>
                            <li>Used for streaming media, online games, DNS queries - speed over reliability</li>
                        </ul>
                    </li>
                </ul>
                
                <h3>Network Layer Protocols</h3>
                <ul>
                    <li><strong>ICMP (Internet Control Message Protocol):</strong> Used for network diagnostics and error reporting. Powers tools like ping and traceroute. Common ICMP types:
                        <ul>
                            <li>Echo Request/Reply (ping)</li>
                            <li>Destination Unreachable</li>
                            <li>Time Exceeded (used by traceroute)</li>
                            <li>Redirect</li>
                        </ul>
                    </li>
                    <li><strong>ARP (Address Resolution Protocol):</strong> Resolves IP addresses to MAC addresses on the local network segment.</li>
                    <li><strong>RARP (Reverse ARP):</strong> Legacy protocol that resolves MAC addresses to IP addresses.</li>
                </ul>
                
                <h3>Tunneling and VPN Protocols</h3>
                <ul>
                    <li><strong>GRE (Generic Routing Encapsulation):</strong> Simple tunneling protocol that encapsulates packets from one protocol inside another. Often used with IPSec for VPNs.</li>
                    <li><strong>IPSec:</strong> A comprehensive security suite for IP networks:
                        <ul>
                            <li><strong>AH (Authentication Header):</strong> Provides authentication and integrity</li>
                            <li><strong>ESP (Encapsulating Security Payload):</strong> Provides encryption, authentication, and integrity</li>
                            <li><strong>Tunnel Mode:</strong> Encrypts entire IP packet</li>
                            <li><strong>Transport Mode:</strong> Encrypts only the payload</li>
                        </ul>
                    </li>
                    <li><strong>L2TP (Layer 2 Tunneling Protocol):</strong> Often combined with IPSec for secure VPNs.</li>
                    <li><strong>PPTP (Point-to-Point Tunneling Protocol):</strong> Older VPN protocol, considered insecure.</li>
                </ul>
                
                <h3>Traffic Flow Types</h3>
                <ul>
                    <li><strong>Unicast:</strong> One-to-one communication. Like sending a letter to a specific person.</li>
                    <li><strong>Broadcast:</strong> One-to-all communication on the local network segment. Like shouting in a room.</li>
                    <li><strong>Multicast:</strong> One-to-many communication to interested recipients only. Like a newsletter subscription.</li>
                    <li><strong>Anycast:</strong> One-to-nearest communication. The packet is delivered to the closest of multiple servers providing the same service. Commonly used with DNS and CDNs.</li>
                </ul>
                
                <h3>Application Layer Protocols Deep Dive</h3>
                <ul>
                    <li><strong>HTTP Methods:</strong> GET (retrieve data), POST (submit data), PUT (update data), DELETE (remove data), HEAD (get headers only)</li>
                    <li><strong>SMTP vs POP3 vs IMAP:</strong>
                        <ul>
                            <li><strong>SMTP:</strong> Sends email between servers</li>
                            <li><strong>POP3:</strong> Downloads email to local device, removes from server</li>
                            <li><strong>IMAP:</strong> Keeps email on server, synchronizes across devices</li>
                        </ul>
                    </li>
                    <li><strong>DNS Record Types:</strong>
                        <ul>
                            <li><strong>A:</strong> Maps domain to IPv4 address</li>
                            <li><strong>AAAA:</strong> Maps domain to IPv6 address</li>
                            <li><strong>CNAME:</strong> Creates alias for another domain</li>
                            <li><strong>MX:</strong> Specifies mail server for domain</li>
                            <li><strong>PTR:</strong> Reverse DNS lookup (IP to domain)</li>
                            <li><strong>NS:</strong> Specifies authoritative name servers</li>
                        </ul>
                    </li>
                </ul>
                
                <h3>Quality of Service (QoS) and Traffic Management</h3>
                <ul>
                    <li><strong>DSCP (Differentiated Services Code Point):</strong> Marks packets for QoS treatment</li>
                    <li><strong>Traffic Shaping:</strong> Controls the flow of traffic to ensure bandwidth limits</li>
                    <li><strong>Traffic Policing:</strong> Drops or marks packets that exceed defined rates</li>
                    <li><strong>CoS (Class of Service):</strong> Layer 2 QoS marking in Ethernet frames</li>
                </ul></div>`,
