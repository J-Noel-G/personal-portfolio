    "5.3": {
        title: "Common Issues with Network Services",
        content: `<div class="prose max-w-none">
            <h2 class="text-3xl font-bold mb-4">5.3 Given a scenario, troubleshoot common issues with network services.</h2>
            <p>When services like DHCP or DNS fail, the network appears "down" to users even if connectivity is fine.</p>
            
            <h3>Troubleshooting Service Failures</h3>
            <table class="w-full text-left border-collapse mt-4">
                <thead><tr><th class="border p-2">Symptom</th><th class="border p-2">Likely Failed Service</th><th class="border p-2">Common Causes</th><th class="border p-2">Diagnostic Tools</th></tr></thead>
                <tbody>
                    <tr><td class="border p-2">Client has a <strong>169.254.x.x</strong> IP address (APIPA)</td><td class="border p-2"><strong>DHCP</strong></td><td class="border p-2">DHCP server down, scope exhausted, IP helper/relay missing, client not in same broadcast domain</td><td class="border p-2">ipconfig/release & /renew, packet capture, DHCP server logs</td></tr>
                    <tr><td class="border p-2">Can ping IPs but cannot resolve hostnames</td><td class="border p-2"><strong>DNS</strong></td><td class="border p-2">Incorrect DNS server settings, DNS server down, incorrect records, firewall blocking port 53</td><td class="border p-2">nslookup, dig, DNS server logs</td></tr>
                    <tr><td class="border p-2">Can access local but not remote resources</td><td class="border p-2"><strong>Routing</strong></td><td class="border p-2">Missing or incorrect default gateway, routing protocol issues, ACLs blocking traffic</td><td class="border p-2">route print, traceroute, routing tables</td></tr>
                    <tr><td class="border p-2">Specific server/service unreachable</td><td class="border p-2"><strong>Firewall/ACL</strong></td><td class="border p-2">Firewall rules blocking traffic, misconfigured ACLs, security group restrictions</td><td class="border p-2">telnet/nc to test ports, firewall logs</td></tr>
                    <tr><td class="border p-2">Network extremely slow, link lights blinking erratically</td><td class="border p-2"><strong>Switching (STP)</strong></td><td class="border p-2">Switching loop causing broadcast storm, STP convergence issues</td><td class="border p-2">STP status, interface error counters</td></tr>
                    <tr><td class="border p-2">Intermittent connectivity issues</td><td class="border p-2"><strong>IP Addressing</strong></td><td class="border p-2">Duplicate IP address, DHCP scope issues</td><td class="border p-2">arp -a, DHCP server logs</td></tr>
                    <tr><td class="border p-2">Time synchronization issues</td><td class="border p-2"><strong>NTP</strong></td><td class="border p-2">Incorrect NTP configuration, firewall blocking port 123</td><td class="border p-2">ntpq -p, w32tm commands</td></tr>
                    <tr><td class="border p-2">Authentication failures</td><td class="border p-2"><strong>AAA Services</strong></td><td class="border p-2">RADIUS/TACACS+ server unreachable, incorrect shared secret</td><td class="border p-2">Authentication logs, packet captures</td></tr>
                </tbody>
            </table>

            <h3 class="mt-6">Troubleshooting Steps for Common Services</h3>
            
            <h4>DHCP Issues</h4>
            <ol>
                <li>Verify client is configured for DHCP (ipconfig /all)</li>
                <li>Check for DHCP server availability</li>
                <li>Verify DHCP scope has available addresses</li>
                <li>Check for rogue DHCP servers (DHCP snooping)</li>
                <li>Verify IP helper addresses on routers if clients are on different subnets</li>
            </ol>

            <h4>DNS Issues</h4>
            <ol>
                <li>Verify client DNS server settings</li>
                <li>Test basic resolution (nslookup, dig)</li>
                <li>Check for DNS server availability</li>
                <li>Verify forwarders/root hints are configured correctly</li>
                <li>Check DNS cache (ipconfig /displaydns, flushdns)</li>
            </ol>

            <h4>NTP Issues</h4>
            <ol>
                <li>Verify client time settings</li>
                <li>Check NTP server reachability</li>
                <li>Verify firewall isn't blocking UDP 123</li>
                <li>Check time drift between devices</li>
            </ol>
        </div>`,
        quiz: [{ question: "A user reports that they cannot access the internet, but can access the local file server. What is the most likely misconfiguration on their computer?", options: ["Incorrect IP address", "Incorrect subnet mask", "Incorrect default gateway", "Incorrect DNS server"], answer: "Incorrect default gateway" }, { question: "A broadcast storm is overwhelming your network. Which switching protocol has likely failed or been misconfigured?", options: ["VTP", "LACP", "STP", "802.1X"], answer: "STP" }, { question: "Users report getting 169.254.x.x addresses. Which service should you investigate first?", options: ["DNS", "DHCP", "NTP", "RADIUS"], answer: "DHCP" }]
    },
    "5.4": {
        title: "Common Performance Issues",
        content: `<div class="prose max-w-none">
            <h2 class="text-3xl font-bold mb-4">5.4 Given a scenario, troubleshoot common performance issues.</h2>
            <p>Sometimes the network works, but it's just slow. Troubleshooting performance requires looking at metrics that measure connection quality.</p>
            
            <h3>Key Performance Metrics</h3>
            <table class="w-full text-left border-collapse mt-4">
                <thead><tr><th class="border p-2">Metric</th><th class="border p-2">Description</th><th class="border p-2">Impacts</th><th class="border p-2">Measurement Tools</th></tr></thead>
                <tbody>
                    <tr><td class="border p-2"><strong>Latency</strong></td><td class="border p-2">The time delay for a packet to travel from source to destination (round-trip time)</td><td class="border p-2">High latency makes interactive applications feel sluggish (VoIP, video conferencing)</td><td class="border p-2">ping, traceroute</td></tr>
                    <tr><td class="border p-2"><strong>Jitter</strong></td><td class="border p-2">The <em>variation</em> in latency over time</td><td class="border p-2">High jitter causes garbled audio in VoIP and video freezes</td><td class="border p-2">Specialized network monitoring tools</td></tr>
                    <tr><td class="border p-2"><strong>Packet Loss</strong></td><td class="border p-2">Packets being dropped, usually due to congestion</td><td class="border p-2">Causes TCP retransmissions, drastically slowing down file transfers and web browsing</td><td class="border p-2">ping, iperf, packet captures</td></tr>
                    <tr><td class="border p-2"><strong>Bandwidth</strong></td><td class="border p-2">The maximum data transfer capacity of a link</td><td class="border p-2">A bottleneck with low bandwidth will limit throughput for all users</td><td class="border p-2">iperf, speedtest</td></tr>
                    <tr><td class="border p-2"><strong>Throughput</strong></td><td class="border p-2">The actual rate of successful data transfer</td><td class="border p-2">Often lower than bandwidth due to protocol overhead and network conditions</td><td class="border p-2">iperf, file transfer tests</td></tr>
                </tbody>
            </table>

            <h3 class="mt-6">Common Causes of Poor Performance</h3>
            <ul>
                <li><strong>Bandwidth Saturation:</strong> Link utilization approaching 100% capacity</li>
                <li><strong>Network Congestion:</strong> Too much traffic causing queuing delays and drops</li>
                <li><strong>Buffer Bloat:</strong> Excessive buffering causing high latency</li>
                <li><strong>Routing Issues:</strong> Suboptimal paths causing increased latency</li>
                <li><strong>QoS Misconfiguration:</strong> Critical traffic not being prioritized</li>
                <li><strong>Asymmetric Routing:</strong> Packets taking different paths in each direction</li>
                <li><strong>MTU Issues:</strong> Fragmentation causing overhead</li>
            </ul>

            <h3 class="mt-6">Troubleshooting Performance Issues</h3>
            <ol>
                <li><strong>Baseline Normal Performance:</strong> Know what "good" looks like for your network</li>
                <li><strong>Identify Affected Applications:</strong> Is it all traffic or specific applications?</li>
                <li><strong>Check Interface Utilization:</strong> Look for saturated links</li>
                <li><strong>Analyze Traffic Flows:</strong> Identify bandwidth hogs</li>
                <li><strong>Test Path Performance:</strong> Use tools like ping, traceroute, iperf</li>
                <li><strong>Review QoS Configuration:</strong> Ensure proper traffic prioritization</li>
                <li><strong>Check for Errors:</strong> High error rates can reduce effective throughput</li>
            </ol>

            <h3 class="mt-6">Common Causes of Poor Wireless Performance</h3>
            <ul>
                <li><strong>Interference:</strong>
                    <ul>
                        <li><strong>Co-channel:</strong> Other APs on the same channel</li>
                        <li><strong>Adjacent-channel:</strong> Nearby channels bleeding into yours</li>
                        <li><strong>Non-WiFi:</strong> Microwaves, Bluetooth, cordless phones</li>
                    </ul>
                </li>
                <li><strong>Insufficient Coverage:</strong>
                    <ul>
                        <li><strong>Attenuation:</strong> Signal weakening over distance</li>
                        <li><strong>Absorption:</strong> Walls and other obstacles blocking signals</li>
                    </ul>
                </li>
                <li><strong>Overcapacity:</strong> Too many client devices connected to a single AP</li>
                <li><strong>Channel Width:</strong> Too wide causing more interference, or too narrow limiting throughput</li>
                <li><strong>Low Signal-to-Noise Ratio (SNR):</strong> Weak signal compared to background noise</li>
            </ul>

            <h3 class="mt-6">Wireless Troubleshooting Tools</h3>
            <ul>
                <li><strong>Wi-Fi Analyzers:</strong> Show channel utilization and signal strength</li>
                <li><strong>Spectrum Analyzers:</strong> Detect non-WiFi interference sources</li>
                <li><strong>Site Survey Tools:</strong> Plan optimal AP placement</li>
            </ul>
        </div>`,
        quiz: [{ question: "Users on a VoIP phone system complain of choppy audio and dropped words. Which performance metric best describes this issue?", options: ["High Latency", "Low Bandwidth", "High Jitter", "Packet Loss"], answer: "High Jitter" }, { question: "You use a Wi-Fi analyzer and see that your office AP and the neighboring office's AP are both using Channel 6. This is an example of:", options: ["Absorption", "Attenuation", "Co-channel interference", "Client disassociation"], answer: "Co-channel interference" }, { question: "What tool would be most appropriate for measuring maximum possible throughput between two points?", options: ["ping", "traceroute", "iperf", "nslookup"], answer: "iperf" }]
    },
    "5.5": {
        title: "Troubleshooting Tools and Protocols",
        content: `<div class="prose max-w-none">
            <h2 class="text-3xl font-bold mb-4">5.5 Given a scenario, use the appropriate tool or protocol to solve networking issues.</h2>
            <p>Having the right tool for the job is essential for efficient troubleshooting. 🛠️</p>
            
            <h3>Essential Troubleshooting Tools</h3>
            <table class="w-full text-left border-collapse mt-4">
                <thead>
                    <tr>
                        <th class="border p-2">Tool</th><th class="border p-2">Type</th><th class="border p-2">Primary Purpose</th><th class="border p-2">Example Use Cases</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td class="border p-2"><strong>Cable Tester / Certifier</strong></td><td class="border p-2">Hardware</td><td class="border p-2">Tests for physical cable faults like opens, shorts, and split pairs. Certifiers can measure performance.</td><td class="border p-2">Verifying new cable runs meet Cat6 specifications</td></tr>
                    <tr><td class="border p-2"><strong>Toner Probe & Wand</strong></td><td class="border p-2">Hardware</td><td class="border p-2">Traces a specific wire from a wall jack back to a patch panel.</td><td class="border p-2">Identifying which port in the wiring closet connects to a specific office jack</td></tr>
                    <tr><td class="border p-2"><strong>OTDR</strong></td><td class="border p-2">Hardware</td><td class="border p-2">For fiber optics, pinpoints the exact location of a break or fault along a long cable run.</td><td class="border p-2">Locating a break in a 500m fiber run between buildings</td></tr>
                    <tr><td class="border p-2"><strong>Light Meter</strong></td><td class="border p-2">Hardware</td><td class="border p-2">Measures optical power levels in fiber connections.</td><td class="border p-2">Verifying proper signal strength in a fiber link</td></tr>
                    <tr><td class="border p-2"><strong>Wi-Fi Analyzer</strong></td><td class="border p-2">Software/Hardware</td><td class="border p-2">Shows wireless networks, channels, signal strength, and interference.</td><td class="border p-2">Optimizing AP channel assignments to reduce interference</td></tr>
                    <tr><td class="border p-2"><strong>Spectrum Analyzer</strong></td><td class="border p-2">Hardware</td><td class="border p-2">Detects and analyzes RF signals across frequency bands.</td><td class="border p-2">Identifying non-WiFi sources of interference</td></tr>
                    <tr><td class="border p-2"><strong><code>ping</code></strong></td><td class="border p-2">CLI</td><td class="border p-2">Tests basic end-to-end connectivity (ICMP echo) and measures latency.</td><td class="border p-2">Testing basic reachability of a network host</td></tr>
                    <tr><td class="border p-2"><strong><code>tracert / traceroute</code></strong></td><td class="border p-2">CLI</td><td class="border p-2">Traces the hop-by-hop path a packet takes to a destination, identifying where failures occur.</td><td class="border p-2">Determining where along the path packets are being dropped</td></tr>
                    <tr><td class="border p-2"><strong><code>ipconfig / ifconfig</code></strong></td><td class="border p-2">CLI</td><td class="border p-2">Displays the IP configuration (IP address, subnet mask, gateway) of a host.</td><td class="border p-2">Verifying a host's network settings</td></tr>
                    <tr><td class="border p-2"><strong><code>nslookup / dig</code></strong></td><td class="border p-2">CLI</td><td class="border p-2">Tests DNS name resolution.</td><td class="border p-2">Troubleshooting DNS resolution problems</td></tr>
                    <tr><td class="border p-2"><strong><code>arp -a</code></strong></td><td class="border p-2">CLI</td><td class="border p-2">Displays the local ARP cache (IP-to-MAC address mappings).</td><td class="border p-2">Identifying duplicate IP addresses</td></tr>
                    <tr><td class="border p-2"><strong><code>netstat</code></strong></td><td class="border p-2">CLI</td><td class="border p-2">Displays active network connections, listening ports, and routing tables on a host.</td><td class="border p-2">Identifying which ports a server is listening on</td></tr>
                    <tr><td class="border p-2"><strong><code>tcpdump</code></strong></td><td class="border p-2">CLI</td><td class="border p-2">Captures and displays network traffic.</td><td class="border p-2">Basic packet capture on Unix/Linux systems</td></tr>
                    <tr><td class="border p-2"><strong>Packet Analyzer (Wireshark)</strong></td><td class="border p-2">Software</td><td class="border p-2">Captures and decodes network traffic for deep-dive analysis of protocol issues.</td><td class="border p-2">Analyzing application protocol problems</td></tr>
                    <tr><td class="border p-2"><strong>Port Scanner (Nmap)</strong></td><td class="border p-2">Software</td><td class="border p-2">Scans a device to discover open ports and running services.</td><td class="border p-2">Verifying firewall rules are working as intended</td></tr>
                    <tr><td class="border p-2"><strong>Bandwidth Tester (iperf)</strong></td><td class="border p-2">Software</td><td class="border p-2">Measures maximum achievable bandwidth between two points.</td><td class="border p-2">Testing actual throughput between sites</td></tr>
                    <tr><td class="border p-2"><strong>SNMP Tools</strong></td><td class="border p-2">Software</td><td class="border p-2">Queries network devices for status and performance data.</td><td class="border p-2">Monitoring interface utilization and errors</td></tr>
                    <tr><td class="border p-2"><strong>NetFlow Analyzer</strong></td><td class="border p-2">Software</td><td class="border p-2">Analyzes flow data to understand traffic patterns.</td><td class="border p-2">Identifying bandwidth hogs</td></tr>
                </tbody>
            </table>

            <h3 class="mt-6">Troubleshooting with Protocol Analyzers</h3>
            <p>When using tools like Wireshark:</p>
            <ul>
                <li><strong>Filter Traffic:</strong> Use display filters to focus on relevant packets</li>
                <li><strong>Follow Streams:</strong> Reconstruct complete conversations between hosts</li>
                <li><strong>Look for Errors:</strong> Retransmissions, duplicate ACKs, protocol errors</li>
                <li><strong>Compare Timing:</strong> Look for excessive delays between packets</li>
            </ul>

            <h3 class="mt-6">Common Troubleshooting Scenarios</h3>
            <table class="w-full text-left border-collapse mt-4">
                <thead><tr><th class="border p-2">Problem</th><th class="border p-2">Best Tool(s)</th></tr></thead>
                <tbody>
                    <tr><td class="border p-2">Physical connectivity issues</td><td class="border p-2">Cable tester, link lights</td></tr>
                    <tr><td class="border p-2">IP configuration problems</td><td class="border p-2">ipconfig, ping</td></tr>
                    <tr><td class="border p-2">DNS resolution failures</td><td class="border p-2">nslookup, dig</td></tr>
                    <tr><td class="border p-2">Routing issues</td><td class="border p-2">traceroute, route print</td></tr>
                    <tr><td class="border p-2">Application connectivity</td><td class="border p-2">telnet/nc, Wireshark</td></tr>
                    <tr><td class="border p-2">Performance problems</td><td class="border p-2">iperf, NetFlow analyzer</td></tr>
                    <tr><td class="border p-2">Wireless issues</td><td class="border p-2">Wi-Fi analyzer, spectrum analyzer</td></tr>
                </tbody>
            </table>
        </div>`,
        quiz: [{ question: "You want to identify the specific wall jack that a cable from a switch port is connected to. Which tool would you use?", options: ["Cable tester", "Toner probe", "Wi-Fi analyzer", "Nmap"], answer: "Toner probe" }, { question: "You can ping an external IP address but cannot browse to any websites by name. Which command-line tool would be best to troubleshoot this?", options: ["tracert", "ipconfig", "nslookup", "arp"], answer: "nslookup" }, { question: "Which tool would be most appropriate for measuring the actual throughput between two hosts?", options: ["ping", "traceroute", "iperf", "nslookup"], answer: "iperf" }]
    },
            // Reference
            "6.1": {
                title: "Acronyms",
                content: `<h2 class="text-3xl font-bold mb-4">Acronyms</h2><div class="space-y-4 text-slate-700"><p>A quick reference for common networking acronyms.</p><input type="text" id="acronym-search" placeholder="Search for an acronym..." class="w-full p-2 border border-slate-300 rounded-lg mb-4"><ul id="acronym-list" class="grid md:grid-cols-2 lg:grid-cols-3 gap-x-8 gap-y-2"><li><strong>AAA:</strong> Authentication, Authorization, and Accounting</li><li><strong>ACL:</strong> Access Control List</li><li><strong>AD:</strong> Administrative Distance</li><li><strong>AP:</strong> Access Point</li><li><strong>APIPA:</strong> Automatic Private IP Addressing</li><li><strong>API:</strong> Application Programming Interface</li><li><strong>ARP:</strong> Address Resolution Protocol</li><li><strong>BGP:</strong> Border Gateway Protocol</li><li><strong>BSSID:</strong> Basic Service Set Identifier</li><li><strong>CAN:</strong> Campus Area Network</li><li><strong>CDP:</strong> Cisco Discovery Protocol</li><li><strong>CIDR:</strong> Classless Inter-Domain Routing</li><li><strong>CIA:</strong> Confidentiality, Integrity, Availability</li><li><strong>CDN:</strong> Content Delivery Network</li><li><strong>DCI:</strong> Data Center Interconnect</li><li><strong>DHCP:</strong> Dynamic Host Configuration Protocol</li><li><strong>DMZ:</strong> Demilitarized Zone</li><li><strong>DNS:</strong> Domain Name System</li><li><strong>DNSSEC:</strong> Domain Name System Security Extensions</li><li><strong>DoH:</strong> DNS over HTTPS</li><li><strong>DoS:</strong> Denial-of-Service</li><li><strong>EIGRP:</strong> Enhanced Interior Gateway Routing Protocol</li><li><strong>EOL:</strong> End-of-Life</li><li><strong>EOS:</strong> End-of-Support</li><li><strong>ESP:</strong> Encapsulating Security Payload</li><li><strong>ESSID:</strong> Extended Service Set Identifier</li><li><strong>FC:</strong> Fibre Channel</li><li><strong>FHRP:</strong> First Hop Redundancy Protocol</li><li><strong>FTP:</strong> File Transfer Protocol</li><li><strong>GDPR:</strong> General Data Protection Regulation</li><li><strong>GRE:</strong> Generic Routing Encapsulation</li><li><strong>GUI:</strong> Graphical User Interface</li><li><strong>HTTP:</strong> Hypertext Transfer Protocol</li><li><strong>HTTPS:</strong> Hypertext Transfer Protocol Secure</li><li><strong>IaaS:</strong> Infrastructure as a Service</li><li><strong>IaC:</strong> Infrastructure as Code</li><li><strong>IAM:</strong> Identity and Access Management</li><li><strong>ICMP:</strong> Internet Control Message Protocol</li><li><strong>IDF:</strong> Intermediate Distribution Frame</li><li><strong>IDS:</strong> Intrusion Detection System</li><li><strong>IKE:</strong> Internet Key Exchange</li><li><strong>IP:</strong> Internet Protocol</li><li><strong>IPAM:</strong> IP Address Management</li><li><strong>IPS:</strong> Intrusion Prevention System</li><li><strong>IPSec:</strong> Internet Protocol Security</li><li><strong>LAN:</strong> Local Area Network</li><li><strong>LACP:</strong> Link Aggregation Control Protocol</li><li><strong>LDAP:</strong> Lightweight Directory Access Protocol</li><li><strong>LLDP:</strong> Link Layer Discovery Protocol</li><li><strong>MAC:</strong> Media Access Control</li><li><strong>MAN:</strong> Metropolitan Area Network</li><li><strong>MDF:</strong> Main Distribution Frame</li><li><strong>MFA:</strong> Multifactor Authentication</li><li><strong>MIB:</strong> Management Information Base</li><li><strong>MPO:</strong> Multi-fiber Push On</li><li><strong>MTBF:</strong> Mean Time Between Failures</li><li><strong>MTTR:</strong> Mean Time to Repair</li><li><strong>MTU:</strong> Maximum Transmission Unit</li><li><strong>NAC:</strong> Network Access Control</li><li><strong>NAS:</strong> Network-Attached Storage</li><li><strong>NAT:</strong> Network Address Translation</li><li><strong>NFV:</strong> Network Functions Virtualization</li><li><strong>NTP:</strong> Network Time Protocol</li><li><strong>NTS:</strong> Network Time Security</li><li><strong>OSPF:</strong> Open Shortest Path First</li><li><strong>OT:</strong> Operational Technology</li><li><strong>PaaS:</strong> Platform as a Service</li><li><strong>PAN:</strong> Personal Area Network</li><li><strong>PAT:</strong> Port Address Translation</li><li><strong>PCI DSS:</strong> Payment Card Industry Data Security Standard</li><li><strong>PDU:</strong> Power Distribution Unit</li><li><strong>PKI:</strong> Public Key Infrastructure</li><li><strong>PoE:</strong> Power over Ethernet</li><li><strong>PSK:</strong> Pre-Shared Key</li><li><strong>PTP:</strong> Precision Time Protocol</li><li><strong>QoS:</strong> Quality of Service</li><li><strong>QSFP:</strong> Quad Small Form-factor Pluggable</li><li><strong>RADIUS:</strong> Remote Authentication Dial-In User Service</li><li><strong>RBAC:</strong> Role-Based Access Control</li><li><strong>RDP:</strong> Remote Desktop Protocol</li><li><strong>RPO:</strong> Recovery Point Objective</li><li><strong>RTO:</strong> Recovery Time Objective</li><li><strong>SaaS:</strong> Software as a Service</li><li><strong>SAML:</strong> Security Assertion Markup Language</li><li><strong>SAN:</strong> Storage Area Network</li><li><strong>SASE:</strong> Secure Access Service Edge</li><li><strong>SCADA:</strong> Supervisory Control and Data Acquisition</li><li><strong>SDN:</strong> Software-Defined Network</li><li><strong>SD-WAN:</strong> Software-Defined Wide Area Network</li><li><strong>SFP:</strong> Small Form-factor Pluggable</li><li><strong>SFTP:</strong> Secure File Transfer Protocol</li><li><strong>SIEM:</strong> Security Information and Event Management</li><li><strong>SIP:</strong> Session Initiation Protocol</li><li><strong>SLA:</strong> Service-Level Agreement</li><li><strong>SLAAC:</strong> Stateless Address Autoconfiguration</li><li><strong>SMB:</strong> Server Message Block</li><li><strong>SMTP:</strong> Simple Mail Transfer Protocol</li><li><strong>SNMP:</strong> Simple Network Management Protocol</li><li><strong>SSID:</strong> Service Set Identifier</li><li><strong>SSH:</strong> Secure Shell</li><li><strong>SSO:</strong> Single Sign-On</li><li><strong>STP:</strong> Spanning Tree Protocol</li><li><strong>SVI:</strong> Switch Virtual Interface</li><li><strong>TACACS+:</strong> Terminal Access Controller Access-Control System Plus</li><li><strong>TCP:</strong> Transmission Control Protocol</li><li><strong>TFTP:</strong> Trivial File Transfer Protocol</li><li><strong>TTL:</strong> Time to Live</li><li><strong>UDP:</strong> User Datagram Protocol</li><li><strong>UPS:</strong> Uninterruptible Power Supply</li><li><strong>URL:</strong> Uniform Resource Locator</li><li><strong>VLAN:</strong> Virtual Local Area Network</li><li><strong>VLSM:</strong> Variable-Length Subnet Mask</li><li><strong>VPC:</strong> Virtual Private Cloud</li><li><strong>VPN:</strong> Virtual Private Network</li><li><strong>VRRP:</strong> Virtual Router Redundancy Protocol</li><li><strong>VXLAN:</strong> Virtual Extensible Local Area Network</li><li><strong>WAN:</strong> Wide Area Network</li><li><strong>WLAN:</strong> Wireless Local Area Network</li><li><strong>WLC:</strong> Wireless LAN Controller</li><li><strong>WPA:</strong> Wi-Fi Protected Access</li><li><strong>ZTA:</strong> Zero Trust Architecture</li></ul></div>`,
                quiz: null // No quiz for the acronym list
            }
        };

        const navigationData = [
            {
                chapter: "1.0 Networking Concepts (23%)",
                sections: [
                    { id: "1.1", title: "1.1 OSI Model Concepts" },
                    { id: "1.2", title: "1.2 Networking Appliances, Applications, and Functions" },
                    { id: "1.3", title: "1.3 Cloud Concepts and Connectivity Options" },
                    { id: "1.4", title: "1.4 Networking Ports, Protocols, Services, and Traffic Types" },
                    { id: "1.5", title: "1.5 Transmission Media and Transceivers" },
                    { id: "1.6", title: "1.6 Network Topologies, Architectures, and Types" },
                    { id: "1.7", title: "1.7 IPv4 Network Addressing" },
                    { id: "1.8", title: "1.8 Evolving Use Cases for Modern Networks" }
                ]
            },
            {
                chapter: "2.0 Network Implementation (20%)",
                sections: [
                    { id: "2.1", title: "2.1 Routing Technologies" },
                    { id: "2.2", title: "2.2 Switching Technologies and Features" },
                    { id: "2.3", title: "2.3 Wireless Devices and Technologies" },
                    { id: "2.4", title: "2.4 Physical Installations" }
                ]
            },
            {
                chapter: "3.0 Network Operations (19%)",
                sections: [
                    { id: "3.1", title: "3.1 Organizational Processes and Procedures" },
                    { id: "3.2", title: "3.2 Network Monitoring Technologies" },
                    { id: "3.3", title: "3.3 Disaster Recovery Concepts" },
                    { id: "3.4", title: "3.4 IPv4 and IPv6 Network Services" },
                    { id: "3.5", title: "3.5 Network Access and Management Methods" }
                ]
            },
            {
                chapter: "4.0 Network Security (14%)",
                sections: [
                    { id: "4.1", title: "4.1 Basic Network Security Concepts" },
                    { id: "4.2", title: "4.2 Types of Attacks" },
                    { id: "4.3", title: "4.3 Security Features, Defense Techniques, and Solutions" }
                ]
            },
            {
                chapter: "5.0 Network Troubleshooting (24%)",
                sections: [
                    { id: "5.1", title: "5.1 Troubleshooting Methodology" },
                    { id: "5.2", title: "5.2 Common Cabling and Physical Interface Issues" },
                    { id: "5.3", title: "5.3 Common Issues with Network Services" },
                    { id: "5.4", title: "5.4 Common Performance Issues" },
                    { id: "5.5", title: "5.5 Troubleshooting Tools and Protocols" }
                ]
            },
            {
                chapter: "Reference",
                sections: [
                    { id: "6.1", title: "Acronyms" }
                ]
            }
        ];

        const contentArea = document.getElementById('content-area');
        const navigation = document.getElementById('navigation');
        const sidebar = document.getElementById('sidebar');
        const openSidebarBtn = document.getElementById('open-sidebar');
        const closeSidebarBtn = document.getElementById('close-sidebar');

        function loadContent(event, sectionId) {
            event.preventDefault();

            const sectionData = studyGuideData[sectionId];
            if (!sectionData) {
                contentArea.innerHTML = `<div class="content-card bg-white p-6 sm:p-8 rounded-xl shadow-md"><h2 class="text-2xl font-bold">Content not found</h2><p>Please select a topic from the menu.</p></div>`;
                return;
            }

            let quizHtml = '';
            if (sectionData.quiz) {
                quizHtml = `
                    <div class="mt-8 border-t pt-6">
                        <h3 class="text-2xl font-semibold mb-4">Test Your Knowledge</h3>
                        <button onclick="startQuiz('${sectionId}')" class="bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 transition-colors">Start Quiz</button>
                    </div>
                `;
            }

            let html = `
                <div class="content-card bg-white p-6 sm:p-8 rounded-xl shadow-md opacity-0">
                    ${sectionData.content}
                    ${quizHtml}
                </div>
            `;
            contentArea.innerHTML = html;
            
            // Force reflow to ensure transition is applied
            contentArea.offsetHeight;

            setTimeout(() => {
                const card = contentArea.querySelector('.content-card');
                if(card) card.style.opacity = 1;
            }, 10);

            const acronymSearch = document.getElementById('acronym-search');
            if (acronymSearch) {
                acronymSearch.addEventListener('keyup', filterAcronyms);
            }

            if (window.innerWidth < 1024) {
                sidebar.classList.add('-translate-x-full');
            }
        }

        function filterAcronyms() {
            const searchTerm = document.getElementById('acronym-search').value.toUpperCase();
            const listItems = document.querySelectorAll('#acronym-list li');
            listItems.forEach(item => {
                if (item.textContent.toUpperCase().includes(searchTerm)) {
                    item.classList.remove('hidden');
                } else {
                    item.classList.add('hidden');
                }
            });
        }

        function startQuiz(sectionId) {
            const sectionData = studyGuideData[sectionId];
            const quiz = sectionData.quiz;
            if (!quiz) return;

            let currentQuestionIndex = 0;
            let score = 0;

            function showQuestion() {
                if (currentQuestionIndex >= quiz.length) {
                    showQuizResult();
                    return;
                }
                const q = quiz[currentQuestionIndex];
                let optionsHtml = '';
                // Shuffle options
                const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);
                shuffledOptions.forEach(option => {
                    optionsHtml += `<button class="quiz-option w-full text-left p-3 border-2 border-slate-300 rounded-lg hover:bg-slate-100">${option}</button>`;
                });

                contentArea.innerHTML = `
                    <div class="content-card bg-white p-8 rounded-xl shadow-md">
                        <div class="mb-2 text-sm text-slate-500">Question ${currentQuestionIndex + 1} of ${quiz.length}</div>
                        <h3 class="text-xl font-semibold mb-6">${q.question}</h3>
                        <div class="space-y-3" id="quiz-options">${optionsHtml}</div>
                    </div>
                `;

                document.querySelectorAll('.quiz-option').forEach(button => {
                    button.addEventListener('click', handleAnswer);
                });
            }

            function handleAnswer(e) {
                const selectedOption = e.target;
                const selectedAnswer = selectedOption.textContent;
                const correctAnswer = quiz[currentQuestionIndex].answer;
                const optionsContainer = document.getElementById('quiz-options');

                optionsContainer.querySelectorAll('button').forEach(btn => btn.disabled = true);

                if (selectedAnswer === correctAnswer) {
                    selectedOption.classList.add('correct');
                    score++;
                } else {
                    selectedOption.classList.add('incorrect');
                    optionsContainer.querySelectorAll('button').forEach(btn => {
                        if (btn.textContent === correctAnswer) {
                            btn.classList.add('correct');
                        }
                    });
                }

                currentQuestionIndex++;
                setTimeout(showQuestion, 1500);
            }

            function showQuizResult() {
                contentArea.innerHTML = `
                    <div class="content-card bg-white p-8 rounded-xl shadow-md text-center">
                        <h3 class="text-2xl font-bold mb-4">Quiz Complete!</h3>
                        <p class="text-lg mb-6">You scored ${score} out of ${quiz.length}</p>
                        <button onclick="loadContent(event, '${sectionId}')" class="bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 transition-colors">Back to Topic</button>
                    </div>
                `;
            }

            showQuestion();
        }

        function buildNavigation() {
            let navHtml = '';
            navigationData.forEach(chapter => {
                navHtml += `<div class="mb-4"><h2 class="text-lg font-semibold text-slate-900 mb-2">${chapter.chapter}</h2><div class="space-y-1">`;
                chapter.sections.forEach(section => {
                    navHtml += `<a href="#" onclick="loadContent(event, '${section.id}')" class="block text-slate-600 hover:text-blue-600 hover:bg-slate-100 p-2 rounded-md transition-colors">${section.title}</a>`;
                });
                navHtml += `</div></div>`;
            });
            navigation.innerHTML = navHtml;
        }
        
        openSidebarBtn.addEventListener('click', () => sidebar.classList.remove('-translate-x-full'));
        closeSidebarBtn.addEventListener('click', () => sidebar.classList.add('-translate-x-full'));

        window.addEventListener('DOMContentLoaded', (event) => {
            buildNavigation();
            const firstSectionId = "1.1";
            const dummyEvent = new Event('initialLoad');
            loadContent(dummyEvent, firstSectionId);
        });

        // Make functions globally available for inline event handlers
        window.loadContent = loadContent;
        window.startQuiz = startQuiz;
    </script>
</body>
</html>
