        const mobileMenuBtn = document.getElementById('mobile-menu-btn');

        // Load Content Function
        function loadContent(key) {
            const data = contentData[key];
            if (!data) return;

            // Update UI State (Active Nav)
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active-nav'));
            
            // Find the button that corresponds to this key to highlight it
            const correspondingBtn = document.querySelector(`button[onclick="loadContent('${key}')"]`);
            if (correspondingBtn) {
                correspondingBtn.classList.add('active-nav');
            }

            // Fade Out
            contentContainer.style.opacity = '0';
            
            setTimeout(() => {
                // Inject HTML
                contentContainer.innerHTML = `
                    <div class="border-b-2 border-roma-gold pb-4 mb-8">
                        <h2 class="text-3xl md:text-5xl font-serif text-roma-paper uppercase tracking-widest">${data.title}</h2>
                        <p class="text-roma-gold font-body mt-2 italic text-lg">${data.subtitle}</p>
                    </div>
                    <div class="content-body text-gray-300 leading-relaxed font-body">
                        ${data.html}
                    </div>
                `;
                
                // Fade In
                contentContainer.style.opacity = '1';
                contentContainer.classList.add('fade-in');
                
                // Scroll to top
                mainContent.scrollTop = 0;
            }, 200);

            // Close mobile menu if open
            if(window.innerWidth < 768) {
                toggleMobileMenu();
            }
        }

        // Tab Switching Logic (Global helper)
        window.switchTab = function(tabId) {
            // Safety check for event
            if (!event || !event.target) return;

            // Get the parent container of the clicked tab (to scope the search)
            const parentContainer = document.getElementById(tabId).parentElement;
            
            // Hide all siblings that are tab-content
            const allTabs = parentContainer.querySelectorAll('.tab-content');
            allTabs.forEach(tab => {
                tab.classList.add('hidden');
            });

            // Find the active tab and show it
            document.getElementById(tabId).classList.remove('hidden');

            // Handle button states
            // Find the header container (previous sibling of the first tab content usually, or rely on event)
            const btnContainer = event.target.parentElement;
            const allBtns = btnContainer.querySelectorAll('.tab-btn');
            
            allBtns.forEach(btn => {
                btn.classList.remove('active-tab');
                btn.classList.add('text-gray-400');
            });
            
            event.target.classList.add('active-tab');
            event.target.classList.remove('text-gray-400');
        };

        // Mobile Menu Toggle
        function toggleMobileMenu() {
            const isClosed = sidebar.classList.contains('-translate-x-full');
            if (isClosed) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        mobileMenuBtn.addEventListener('click', toggleMobileMenu);

        // Initial Load
        document.addEventListener('DOMContentLoaded', () => {
            // Manually trigger Intro load
            const introBtn = document.querySelector('button[onclick="loadContent(\'intro\')"]');
            if(introBtn) {
                introBtn.classList.add('active-nav'); // Set initial active state manually since we aren't clicking
                loadContent('intro'); 
            }
        });
