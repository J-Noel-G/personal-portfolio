<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Sanctus - Prayer Memorization</title>
    
    <!-- 1. Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet">
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Merriweather', 'serif'],
              display: ['Cinzel', 'serif'],
            },
            colors: {
              gold: {
                50: '#fffaeb', 100: '#fef0c7', 200: '#fde68a', 300: '#fcd34d', 400: '#fbbf24',
                500: '#f59e0b', 600: '#d97706', 700: '#b45309', 800: '#92400e', 900: '#78350f', 950: '#451a03',
              },
              church: {
                50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8',
                500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0c4a6e', 950: '#020617',
              }
            }
          }
        }
      }
    </script>

    <style>
      * {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        -webkit-tap-highlight-color: transparent;
      }
      body { overscroll-behavior-y: none; }
      
      .snap-container {
        scroll-behavior: smooth;
        -webkit-overflow-scrolling: touch;
      }

      /* Fluid Card Sizing */
      .fluid-card {
        width: 92%;
        max-width: 680px;
        height: auto;
        max-height: 80vh;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: clamp(1.25rem, 3.5vh, 2.5rem);
        border-radius: 1.5rem;
      }

      /* Fluid Typography scaling with screen height */
      .fluid-text {
        font-size: clamp(0.95rem, 2.2vh, 1.15rem);
        line-height: clamp(1.6, 2.8vh, 1.9);
      }

      .fluid-title {
        font-size: clamp(1.1rem, 3vh, 1.5rem);
      }

      .glass-panel {
        background: rgba(10, 10, 15, 0.65);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      }
      
      .bg-noise {
        background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyBAMAAADsEZWCAAAAGFBMVEUAAAAAAAACAgIBAQEAAAAAAAABAQEAAAB2XFmnAAAACHRSTlMAz8+WlpmZlpvF688AAAABYktHRACIBR1IAAAAJ0lEQVQ4y2NgQQ0wMHCwM2ARY2RgYGARZ2BgYBFnYGBgEWdgYGARZwA5OAGx9K0x4gAAAABJRU5ErkJggg==");
        opacity: 0.025;
      }

      .card-scroll::-webkit-scrollbar { width: 4px; }
      .card-scroll::-webkit-scrollbar-track { background: transparent; }
      .card-scroll::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.3); border-radius: 2px; }
    </style>
  </head>
  <body class="bg-church-950 text-slate-100 antialiased overflow-x-hidden min-h-screen">
    
    <!-- Background layers -->
    <div class="fixed inset-0 z-0 pointer-events-none">
      <div class="absolute inset-0 bg-gradient-to-b from-church-950 via-church-900 to-slate-950"></div>
      <div class="absolute top-[-20%] left-1/2 -translate-x-1/2 w-[800px] h-[800px] bg-gold-600/10 rounded-full blur-[120px]"></div>
      <div class="absolute inset-0 bg-noise pointer-events-none"></div>
    </div>

    <!-- Main Container -->
    <div id="root" class="relative z-10 min-h-screen flex flex-col"></div>

    <script>
      // --- APP STATE ---
      let currentLang = 'en'; 
      let currentView = 'LOADING'; 
      let selectedCategory = null;
      let selectedPrayer = null;
      let selectedMysteryGroup = 'JOYFUL'; 
      let searchQuery = '';
      let PRAYERS_DATA = [];

      const PrayerCategory = {
        MASS_RESPONSES: 'Mass Responses',
        BASIC: 'Basic Prayers',
        ROSARY: 'Holy Rosary',
        NOVENAS: 'Novenas',
        SAINTS: 'Prayers of Saints',
        DIVINE_MERCY: 'Divine Mercy',
        ACTIVITIES: 'Daily Activities',
        MEAL: 'Meal Prayers',
        ACTS: 'Acts of Faith, Hope, Love',
        LITANIES: 'Litanies',

      const CATEGORY_TRANSLATIONS = {
        [PrayerCategory.BASIC]: { es: 'Oraciones Básicas', la: 'Orationes Fundamentales' },
        [PrayerCategory.MASS_RESPONSES]: { es: 'Respuestas de la Misa', la: 'Responsa Missae' },
        [PrayerCategory.ROSARY]: { es: 'Santo Rosario', la: 'Sanctum Rosarium' },
        [PrayerCategory.NOVENAS]: { es: 'Novenas', la: 'Novendiales' },
        [PrayerCategory.SAINTS]: { es: 'Oraciones a los Santos', la: 'Orationes ad Sanctos' },
        [PrayerCategory.DIVINE_MERCY]: { es: 'Divina Misericordia', la: 'Divina Misericordia' },
        [PrayerCategory.ACTIVITIES]: { es: 'Actividades Diarias', la: 'Actus Cotidiani' },
        [PrayerCategory.MEAL]: { es: 'Oraciones para las Comidas', la: 'Orationes pro Mesa' },
        [PrayerCategory.ACTS]: { es: 'Actos de Fe, Esperanza y Caridad', la: 'Actus Fidei, Spei, Caritatis' },
        [PrayerCategory.LITANIES]: { es: 'Letanías', la: 'Litaniae' },

      const LITANY_LINKS = [
        'https://www.ewtn.com/catholicism/devotions/litany-of-loreto-246',
        'https://www.ewtn.com/catholicism/devotions/litany-of-the-sacred-heart-of-jesus-250',
        'https://www.ewtn.com/catholicism/devotions/litany-of-st-joseph-247',
        'https://www.ewtn.com/catholicism/devotions/litany-of-the-holy-name-of-jesus-248',
        'https://www.ewtn.com/catholicism/devotions/litany-of-the-most-precious-blood-of-jesus-249',
        'https://www.ewtn.com/catholicism/devotions/litany-of-the-saints-251',
        'https://www.ewtn.com/catholicism/devotions/litany-of-humility-245'
      ];

      const COMMON_PRAYERS = {
        SIGN_CROSS: { 
            en: "By the sign of the holy cross,\ndeliver us from our enemies, O Lord our God.\nIn the name of the Father, and of the Son, and of the Holy Spirit. Amen.", 
            es: "Por la señal de la Santa Cruz,\nde nuestros enemigos líbranos Señor, Dios nuestro.\nEn el nombre del Padre, y del Hijo, y del Espíritu Santo. Amén.",
            la: "Per signum Crucis\nde inimicis nostris libera nos, Deus noster.\nIn nomine Patris, et Filii, et Spiritus Sancti. Amen."
        },
        COME_HS: { 
            title: "Come, Holy Spirit", title_es: "Ven, Espíritu Santo", title_la: "Veni Sancte Spiritus",
            en: "Come, Holy Spirit,\nfill the hearts of Thy faithful\nand enkindle in them the fire of Thy love.\nSend forth Thy Spirit and they shall be created.\nAnd Thou shalt renew the face of the earth.", 
            es: "Ven, Espíritu Santo,\nllena los corazones de tus fieles\ny enciende en ellos el fuego de tu amor.\nEnvía tu Espíritu y serán creados.\nY renovarás la faz de la tierra.",
            la: "Veni, Sancte Spiritus,\nreple tuorum corda fidelium\net tui amoris in eis ignem accende.\nEmitte Spiritum tuum et creabuntur.\nEt renovabis faciem terrae."
        },
        FATIMA: { 
            en: "O my Jesus, forgive us our sins,\nsave us from the fires of hell,\nlead all souls to Heaven,\nespecially those in most need of Thy mercy.", 
            es: "Oh Jesús mío, perdona nuestros pecados,\nlíbranos del fuego del infierno,\nlleva al cielo a todas las almas,\nespecialmente a las más necesitadas de tu misericordia.",
            la: "Domine Iesu, dimitte nobis debita nostra,\nsalva nos ab igne inferiori,\nperduc in caelum omnes animas,\npraesertim eas, quae misericordiae tuae maxime indigent."
        }
      };

      const MYSTERIES = {
        JOYFUL: [
          { t: "The Annunciation", t_es: "La Encarnación", t_la: "Annuntiatio", s: "Luke 1:38", fruit_en: "Humility", fruit_es: "Humildad", m_en: "The Angel Gabriel announces to Mary that she will be the Mother of God. She responds with a humble 'Fiat': 'Behold the handmaid of the Lord.'", m_es: "El Ángel Gabriel le anuncia a María que será la Madre de Dios. Ella responde con un humilde 'Fiat': 'He aquí la esclava del Señor'." },
          { t: "The Visitation", t_es: "La Visitación", t_la: "Visitatio", s: "Luke 1:42", fruit_en: "Love of Neighbor", fruit_es: "Amor al Prójimo", m_en: "Mary hastens to the hill country to help her cousin Elizabeth. John the Baptist leaps for joy in Elizabeth's womb at the presence of the Savior.", m_es: "María se apresura a la montaña para ayudar a su prima Isabel. Juan el Bautista salta de gozo en el vientre de Isabel ante la presencia del Salvador." },
          { t: "The Nativity", t_es: "El Nacimiento", t_la: "Nativitas", s: "Luke 2:11", fruit_en: "Poverty of Spirit", fruit_es: "Pobreza de Espíritu", m_en: "Jesus is born in a stable in Bethlehem. The King of Kings enters the world in poverty, teaching us to detach our hearts from material things.", m_es: "Jesús nace en un establo en Belén. El Rey de Reyes entra al mundo en pobreza, enseñándonos a despegar nuestros corazones." },
          { t: "The Presentation", t_es: "La Presentación", t_la: "Praesentatio", s: "Luke 2:22", fruit_en: "Obedience", fruit_es: "Obediencia", m_en: "Mary and Joseph present Jesus in the Temple. Simeon prophesies that Jesus will be a light to the nations and that a sword of sorrow will pierce Mary's soul.", m_es: "María y José presentan a Jesús en el Templo. Simeón profetiza que Jesús será luz para las naciones." },
          { t: "The Finding in the Temple", t_es: "El Niño Perdido y Hallado", t_la: "Inventio in Templo", s: "Luke 2:46", fruit_en: "Joy in finding Jesus", fruit_es: "Gozo de buscar a Jesús", m_en: "After three days of anxious searching, Mary and Joseph find Jesus in the Temple, teaching the elders. We pray to always find Jesus in our lives.", m_es: "Después de tres días de búsqueda angustiosa, María y José encuentran a Jesús en el Templo." }
        ],
        SORROWFUL: [
          { t: "The Agony in the Garden", t_es: "La Oración en el Huerto", t_la: "Agonia in Horto", s: "Luke 22:42", fruit_en: "Sorrow for Sin", fruit_es: "Dolor por los Pecados", m_en: "Jesus prays in Gethsemane, seeing the sins of the world. He sweats drops of blood but submits to the Father's will: 'Not my will, but yours be done.'", m_es: "Jesús ora en Getsemaní, viendo los pecados del mundo. Suda gotas de sangre pero se somete a la voluntad del Padre." },
          { t: "The Scourging at the Pillar", t_es: "La Flagelación", t_la: "Flagellatio", s: "John 19:1", fruit_en: "Purity", fruit_es: "Pureza", m_en: "Jesus is stripped and bound to a pillar, cruelly scourged by soldiers. He accepts this pain to atone for our sins of the flesh.", m_es: "Jesús es desnudado y atado a una columna, cruelmente azotado por los soldados." },
          { t: "The Crowning with Thorns", t_es: "La Coronación de Espinas", t_la: "Coronatio Spinis", s: "Matt 27:29", fruit_en: "Moral Courage", fruit_es: "Valentía Moral", m_en: "Soldiers mock Jesus' kingship by crowning Him with thorns. He endures the mockery in silence, teaching us to bear humiliation with grace.", m_es: "Los soldados se burlan de la realeza de Jesús coronándolo de espinas." },
          { t: "The Carrying of the Cross", t_es: "El Camino al Calvario", t_la: "Baiulatio Crucis", s: "John 19:17", fruit_en: "Patience", fruit_es: "Paciencia", m_en: "Jesus carries the heavy cross to Calvary. Despite his exhaustion and falls, He perseveres for our salvation. We pray for patience in our own trials.", m_es: "Jesús carga la pesada cruz hacia el Calvario. A pesar de su agotamiento y caídas, persevera por nuestra salvación." },
          { t: "The Crucifixion", t_es: "La Crucifixión", t_la: "Crucifixio", s: "Luke 23:46", fruit_en: "Salvation", fruit_es: "Salvación", m_en: "Jesus is nailed to the cross and dies after three hours of agony. He forgives His enemies and commends His spirit to the Father.", m_es: "Jesús es clavado en la cruz y muere tras tres horas de agonía. Perdona a sus enemigos." }
        ],
        GLORIOUS: [
          { t: "The Resurrection", t_es: "La Resurrección", t_la: "Resurrectio", s: "Matt 28:6", fruit_en: "Faith", fruit_es: "Fe", m_en: "On the third day, Jesus rises from the dead, conquering sin and death. His victory gives us the promise of eternal life.", m_es: "Al tercer día, Jesús resucita de entre los muertos, venciendo al pecado y la muerte. Su victoria nos da la promesa de la vida eterna." },
          { t: "The Ascension", t_es: "La Ascensión", t_la: "Ascensio", s: "Acts 1:9", fruit_en: "Hope", fruit_es: "Esperanza", m_en: "Jesus ascends into heaven to take His place at the right hand of the Father. We place our hope in heaven, our true home.", m_es: "Jesús asciende al cielo para tomar su lugar a la derecha del Padre. Ponemos nuestra esperanza en el cielo." },
          { t: "The Descent of the Holy Spirit", t_es: "La Venida del Espíritu Santo", t_la: "Descensus Spiritus Sancti", s: "Acts 2:3", fruit_en: "Love of God", fruit_es: "Amor a Dios", m_en: "The Holy Spirit descends upon the Apostles and Mary as tongues of fire, filling them with courage and zeal to spread the Gospel.", m_es: "El Espíritu Santo desciende sobre los Apóstoles y María como lenguas de fuego." },
          { t: "The Assumption", t_es: "La Asunción", t_la: "Assumptio", s: "Judith 15:9", fruit_en: "Grace of a Happy Death", fruit_es: "Gracia de una Buena Muerte", m_en: "The Virgin Mary is taken up body and soul into heavenly glory, preserved from the corruption of the grave as the Mother of God.", m_es: "La Virgen María es llevada en cuerpo y alma a la gloria celestial, preservada de la corrupción." },
          { t: "The Coronation", t_es: "La Coronación", t_la: "Coronatio", s: "Rev 12:1", fruit_en: "Trust in Mary's Intercession", fruit_es: "Confianza en María", m_en: "Mary is crowned Queen of Heaven and Earth by her Son. She reigns in glory and intercedes for us as our powerful advocate.", m_es: "María es coronada Reina del Cielo y de la Tierra por su Hijo. Ella reina en gloria e intercede." }
        ],
        LUMINOUS: [
          { t: "The Baptism in the Jordan", t_es: "El Bautismo", t_la: "Baptismus in Iordane", s: "Matt 3:17", fruit_en: "Openness to the Holy Spirit", fruit_es: "Apertura al Espíritu Santo", m_en: "Jesus is baptized by John. The heavens open and the Father proclaims: 'This is my beloved Son.' We pray for fidelity to our own baptismal promises.", m_es: "Jesús es bautizado por Juan. Los cielos se abren y el Padre proclama: 'Este es mi Hijo amado'." },
          { t: "The Wedding at Cana", t_es: "Las Bodas de Caná", t_la: "Nuptiae in Cana", s: "John 2:5", fruit_en: "To Jesus through Mary", fruit_es: "A Jesús por María", m_en: "At Mary's request, Jesus performs His first miracle, turning water into wine. We learn to trust in Mary's intercession: 'Do whatever He tells you.'", m_es: "A petición de María, Jesús realiza su primer milagro, convirtiendo el agua en vino." },
          { t: "The Proclamation of the Kingdom", t_es: "El Anuncio del Reino", t_la: "Proclamatio Regni", s: "Mark 1:15", fruit_en: "Repentance", fruit_es: "Arrepentimiento", m_en: "Jesus preaches the Gospel, calls for conversion, and forgives sins. We pray for a heart open to His word and the grace of true repentance.", m_es: "Jesús predica el Evangelio, llama a la conversión y perdona los pecados." },
          { t: "The Transfiguration", t_es: "La Transfiguración", t_la: "Transfiguratio", s: "Matt 17:2", fruit_en: "Desire for Holiness", fruit_es: "Deseo de Santidad", m_en: "Jesus is revealed in glory to Peter, James, and John. We contemplate His divinity and pray that our lives may reflect His light.", m_es: "Jesús se revela en gloria a Pedro, Santiago y Juan." },
          { t: "The Institution of the Eucharist", t_es: "La Institución de la Eucaristía", t_la: "Institutio Eucharistiae", s: "Matt 26:26", fruit_en: "Eucharistic Adoration", fruit_es: "Adoración Eucarística", m_en: "At the Last Supper, Jesus gives us His Body and Blood. He remains with us always in the Holy Eucharist.", m_es: "En la Última Cena, Jesús nos da su Cuerpo y Sangre." }
        ]
      };

      // --- ASYNC DATABASE FETCH ---
      async function fetchPrayers() {
        render(); 
        try {
          const response = await fetch('prayers.json?v=' + Date.now());
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          PRAYERS_DATA = await response.json();
          currentView = 'HOME';
        } catch (err) {
          console.error("Could not load prayers:", err);
          loadError = err.message;
          currentView = 'ERROR';
        }
        render();
      }

      // --- UTILS ---
      function getCategoryTitle(cat, lang) {
        if (CATEGORY_TRANSLATIONS[cat] && CATEGORY_TRANSLATIONS[cat][lang]) {
          return CATEGORY_TRANSLATIONS[cat][lang];
        }
        return cat;
      }

      function getPrayerById(id) {
        return PRAYERS_DATA.find(p => p.id === id) || { title: id, text: "Prayer text missing in json" };
      }

      function getPrayerTitle(prayer, lang) {
        if (lang === 'es' && prayer.title_es) return prayer.title_es;
        if (lang === 'la' && prayer.title_la) return prayer.title_la;
        return prayer.title;
      }

      function getPrayerText(prayer, lang) {
        if (lang === 'es' && prayer.text_es) return prayer.text_es;
        if (lang === 'la' && prayer.text_la) return prayer.text_la;
        return prayer.text;
      }

      // Updated to persist scroll position on rerender safely across repaint ticks
      function setLang(lang) {
        currentLang = lang;
        
        const container = document.getElementById('slideshow-container');
        const savedScroll = container ? container.scrollTop : null;
        
        render();
        
        if (savedScroll !== null) {
          requestAnimationFrame(() => {
            const newContainer = document.getElementById('slideshow-container');
            if (newContainer) {
              newContainer.scrollTop = savedScroll;
            }
          });
        }
      }

      function handleSearch(val) {
        searchQuery = val;
        render();
      }

      // Fetch dynamic traditional mystery based on day of the week
      function getTraditionalMystery() {
        const day = new Date().getDay(); // 0 = Sunday, 1 = Monday...
        if (day === 0 || day === 3) return 'GLORIOUS'; // Sunday, Wed
        if (day === 1 || day === 6) return 'JOYFUL';    // Monday, Sat
        if (day === 2 || day === 5) return 'SORROWFUL'; // Tuesday, Fri
        return 'LUMINOUS';                              // Thursday
      }

      function selectCategory(cat) {
        if (cat === PrayerCategory.LITANIES) {
          const randomLitany = LITANY_LINKS[Math.floor(Math.random() * LITANY_LINKS.length)];
          window.open(randomLitany, '_blank');
          return;
        }
        if (cat === PrayerCategory.SAINTS) {
          window.open('https://www.franciscanmedia.org/saint-of-the-day/', '_blank');
          return;
        }
        if (cat === PrayerCategory.ROSARY) {
          selectedMysteryGroup = getTraditionalMystery();
          currentView = 'ROSARY_LAUNCH';
        } else if (cat === PrayerCategory.DIVINE_MERCY) {
          currentView = 'DIVINE_MERCY_LAUNCH';
        } else {
          selectedCategory = cat;
          currentView = 'CATEGORY';
        }
        render();
      }

      function startRosary(mysteryGroup) {
        selectedMysteryGroup = mysteryGroup;
        currentView = 'ROSARY_FULL';
        render();
      }

      function startDivineMercy() {
        currentView = 'DIVINE_MERCY_FULL';
        render();
      }

      function viewPrayer(prayerId) {
        selectedPrayer = PRAYERS_DATA.find(p => p.id === prayerId);
        currentView = 'PRAYER_DETAIL';
        render();
      }

      function goBackFromDetail() {
        if (selectedCategory) {
          setView('CATEGORY');
        } else {
          setView('HOME');
        }
      }

      window.toggleBead = (btn) => {
        btn.classList.toggle('bg-gold-500');
        btn.classList.toggle('border-gold-400');
        btn.classList.toggle('scale-110');
        btn.classList.toggle('shadow-[0_0_15px_rgba(234,179,8,0.5)]');
      };

      window.handleSlideshowScroll = (container) => {
        const progress = (container.scrollTop / (container.scrollHeight - container.clientHeight)) * 100;
        const bar = document.getElementById('slideshow-progress-bar');
        if (bar) bar.style.width = `${progress}%`;
      };

      // --- RENDER ENGINE ---
      function render() {
        const root = document.getElementById('root');
        if (!root) return;

        if (currentView !== 'ROSARY_FULL' && currentView !== 'DIVINE_MERCY_FULL') {
          window.scrollTo(0, 0);
        }

        if (currentView === 'LOADING') {
          root.innerHTML = `
            <div class="flex flex-col items-center justify-center min-h-screen gap-6">
              <div class="w-16 h-16 border-4 border-gold-500/10 border-t-gold-500 rounded-full animate-spin"></div>
              <div class="text-gold-500 font-display text-2xl tracking-widest animate-pulse">SANCTUS</div>
            </div>
          `;
          return;
        }

        if (currentView === 'ERROR') {
          root.innerHTML = `
            <div class="flex flex-col items-center justify-center min-h-screen text-center px-6">
              <div class="text-red-500 text-5xl mb-4">⚠</div>
              <h1 class="font-display text-3xl text-gold-500 mb-2">Failed to Load Prayers</h1>
              <p class="font-serif text-slate-400 mb-6 max-w-md">Please ensure prayers.json exists in the root directory.</p>
              <button onclick="fetchPrayers()" class="px-6 py-2.5 bg-gold-500 text-church-950 font-display font-bold rounded-full hover:bg-gold-400 transition-colors">Retry Connection</button>
            </div>
          `;
          return;
        }

        if (currentView === 'HOME') {
          const filteredCategories = Object.values(PrayerCategory).filter(cat => {
            const translated = getCategoryTitle(cat, currentLang).toLowerCase();
            return translated.includes(searchQuery.toLowerCase());
          });

          root.innerHTML = `
            <div class="absolute top-6 right-6 z-50 flex items-center gap-1 bg-black/40 backdrop-blur-md border border-white/10 rounded-full p-1 shadow-lg">
              <button onclick="setLang('en')" class="px-4 py-1.5 rounded-full text-xs font-bold font-display transition-all ${currentLang === 'en' ? 'bg-gold-500 text-church-950 shadow-sm' : 'text-slate-400 hover:text-white'}">EN</button>
              <button onclick="setLang('es')" class="px-4 py-1.5 rounded-full text-xs font-bold font-display transition-all ${currentLang === 'es' ? 'bg-gold-500 text-church-950 shadow-sm' : 'text-slate-400 hover:text-white'}">ES</button>
              <button onclick="setLang('la')" class="px-4 py-1.5 rounded-full text-xs font-bold font-display transition-all ${currentLang === 'la' ? 'bg-gold-500 text-church-950 shadow-sm' : 'text-slate-400 hover:text-white'}">LA</button>
            </div>

                <div class="h-px bg-blue-500/20 flex-1 max-w-[3rem]"></div>
                <span class="font-display text-blue-300 text-xs uppercase tracking-widest text-center leading-tight">${title}</span>
                <div class="h-px bg-blue-500/20 flex-1 max-w-[3rem]"></div>
              </div>
              <div class="w-full flex-1 overflow-y-auto card-scroll pr-1 my-2">
                <div class="font-serif fluid-text text-slate-200 whitespace-pre-line leading-relaxed">
                  ${innerHTML}
                </div>
              </div>
            </div>
            <div class="absolute bottom-6 left-1/2 -translate-x-1/2 opacity-30 animate-bounce flex flex-col items-center pointer-events-none">
              <span class="text-xs uppercase tracking-widest font-display text-gold-500">↓</span>
            </div>
          </div>
        `;
      }

      function makeSnapDecade(title, text, beadCount) {
        let beadsHTML = '';
        for (let i = 0; i < beadCount; i++) {
          beadsHTML += `
            <button onclick="toggleBead(this)" class="w-8 h-8 rounded-full border-2 border-blue-400/30 bg-transparent transition-all duration-300 ease-out active:scale-95" aria-label="Bead ${i+1}"></button>
          `;
        }

        return `
          <div class="snap-start min-h-[100dvh] w-full flex flex-col justify-center items-center px-6 relative">
            <div class="fluid-card glass-panel border border-blue-500/20 bg-gradient-to-b from-blue-500/10 to-transparent animate-fade-in">
              <div class="w-full flex items-center justify-center gap-4 mb-4">
                <div class="h-px bg-blue-500/20 flex-1 max-w-[3rem]"></div>
                <span class="font-display text-blue-300 text-xs uppercase tracking-widest text-center leading-tight">${title}</span>
                <div class="h-px bg-blue-500/20 flex-1 max-w-[3rem]"></div>
              </div>
              
              <div class="w-full flex-1 overflow-y-auto card-scroll pr-1 my-2">
                <p class="font-serif fluid-text text-slate-200 whitespace-pre-line leading-relaxed">${text}</p>
              </div>
              
              <!-- Decade beads -->
              <div class="flex flex-wrap justify-center gap-2 pt-4 border-t border-white/10 mt-2">
                ${beadsHTML}
              </div>
              <p class="text-center text-[10px] text-slate-500 mt-2 font-serif italic">Tap beads to count your prayers</p>
            </div>
            <div class="absolute bottom-6 left-1/2 -translate-x-1/2 opacity-30 animate-bounce flex flex-col items-center pointer-events-none">
              <span class="text-xs uppercase tracking-widest font-display text-gold-500">↓</span>
            </div>
          </div>
        `;
      }

      // --- RUN APP ---
      function goBackFromDetail() {
        if (selectedCategory) {
          setView('CATEGORY');
        } else {
          setView('HOME');
        }
      }

      fetchPrayers();
    </script>
  </body>
</html>
