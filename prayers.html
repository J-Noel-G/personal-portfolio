dia)\n\nDía 5:\nHoy, tráeme a LAS ALMAS DE LOS QUE SE HAN SEPARADO DE MI IGLESIA.\n\nJesús Misericordiosísimo, Bondad misma, Tú no niegas la luz a quienes Te la piden. Acoge en la morada de Tu Corazón Misericordiosísimo las almas de aquellos que se han separado de Tu Iglesia. Atráelos con Tu luz a la unidad de la Iglesia, y no los dejes salir de la morada de Tu Corazón Misericordiosísimo, sino haz que también ellos lleguen a glorificar la generosidad de Tu misericordia.\n\n(Seguido de la Coronilla a la Divina Misericordia)\n\nDía 6:\nHoy, tráeme a LAS ALMAS MANSAS Y HUMILDES, Y A LAS ALMAS DE LOS NIÑOS PEQUEÑOS, y sumérgelas en Mi misericordia.\n\nJesús Misericordiosísimo, Tú mismo has dicho: "Aprended de Mí, que soy manso y humilde de corazón". Acoge en la morada de Tu Corazón Misericordiosísimo a todas las almas mansas y humildes y a las almas de los niños pequeños. Estas almas envían al cielo entero al éxtasis y son las favoritas del Padre celestial.\n\n(Seguido de la Coronilla a la Divina Misericordia)\n\nDía 7:\nHoy, tráeme a LAS ALMAS QUE ESPECIALMENTE VENERAN Y GLORIFICAN MI MISERICORDIA, y sumérgelas en Mi misericordia.\n\nJesús Misericordiosísimo, cuyo Corazón es el Amor mismo, acoge en la morada de Tu Corazón Misericordiosísimo a las almas de aquellos que particularmente ensalzan y veneran la grandeza de Tu misericordia. Estas almas son fuertes con el poder de Dios mismo. En medio de todas las aflicciones y adversidades siguen adelante, confiando en Tu misericordia; y unidas a Ti, oh Jesús, llevan a toda la humanidad sobre sus hombros.\n\n(Seguido de la Coronilla a la Divina Misericordia)\n\nDía 8:\nHoy, tráeme a LAS ALMAS QUE ESTÁN DETENIDAS EN EL PURGATORIO, y sumérgelas en el abismo de Mi misericordia.\n\nJesús Misericordiosísimo, Tú mismo has dicho que deseas misericordia; por eso llevo a la morada de Tu Corazón Misericordiosísimo a las almas del Purgatorio, almas que Te son muy queridas, y que, sin embargo, deben pagar su retribución a Tu justicia. Que los torrentes de Sangre y Agua que brotaron de Tu Corazón apaguen las llamas del Purgatorio, para que también allí se celebre el poder de Tu misericordia.\n\n(Seguido de la Coronilla a la Divina Misericordia)\n\nDía 9:\nHoy, tráeme a LAS ALMAS QUE SE HAN VUELTO TIBIAS, y sumérgelas en el abismo de Mi misericordia.\n\nJesús Compasivísimo, Tú eres la Compasión misma. Llevo a las almas tibias a la morada de Tu Corazón Misericordiosísimo. En este fuego de Tu amor puro, que estas almas tibias, que como cadáveres Te llenan de tan profunda repugnancia, vuelvan a encenderse. Oh Jesús Compasivísimo, ejerce la omnipotencia de Tu misericordia y atráelas al mismo ardor de Tu amor, y concédeles el don del amor santo, porque nada está más allá de Tu poder.\n\n(Seguido de la Coronilla a la Divina Misericordia)`
        }
      ];

      // --- UTILS ---
      const getPrayerText = (prayer, lang) => {
          if (lang === Lang.ES && prayer.text_es) return prayer.text_es;
          if (lang === Lang.LA && prayer.text_la) return prayer.text_la;
          return prayer.text; // Fallback to English
      };
      
      const getPrayerTitle = (prayer, lang) => {
          if (lang === Lang.ES && prayer.title_es) return prayer.title_es;
          if (lang === Lang.LA && prayer.latinTitle) return prayer.latinTitle;
          return prayer.title; // Fallback to English
      };
      
      const getCategoryTitle = (cat, lang) => {
          if (CATEGORY_TRANSLATIONS[cat] && CATEGORY_TRANSLATIONS[cat][lang]) return CATEGORY_TRANSLATIONS[cat][lang];
          return cat;
      };

      const analyzePrayerStructure = (text) => {
        const lines = text.split('\n');
        const segments = [];
        const priestMarkers = ['Priest:', 'Sacerdote:', 'Sacerdos:', 'Lector:', 'Deacon:', 'Diácono:', 'Celebrant:', 'V.'];
        const peopleMarkers = ['People:', 'Pueblo:', 'Populus:', 'All:', 'Todos:', 'R.'];
        let currentRole = Role.PEOPLE; 

        const isDialogue = [...priestMarkers, ...peopleMarkers].some(m => text.includes(m));
        if (!isDialogue) return lines.map(line => ({ text: line.trim(), role: Role.PEOPLE })).filter(s => s.text);

        lines.forEach(line => {
            let content = line.trim();
            if (!content) return;
            if (content.startsWith('(')) { segments.push({ text: content, role: Role.RUBRIC }); return; }
            const priestMarker = priestMarkers.find(m => content.startsWith(m));
            const peopleMarker = peopleMarkers.find(m => content.startsWith(m));

            if (priestMarker) { currentRole = Role.PRIEST; content = content.substring(priestMarker.length).trim(); }
            else if (peopleMarker) { currentRole = Role.PEOPLE; content = content.substring(peopleMarker.length).trim(); }
            if (content) segments.push({ text: content, role: currentRole });
        });
        return segments;
      };
      const breakTextIntoChunks = (text) => text.split(/([.?!,;:]+)(?=\s|$)/).filter(s => s.trim().length > 0);

      // --- COMPONENTS ---
      const Icons = {
        Back: () => <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>,
        Book: () => <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>,
        Puzzle: () => <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19.439 15.424a1 1 0 0 0-1.059-1.585l-2.704.54a1 1 0 0 1-1.176-1.584l2.704-.54a1 1 0 0 0-1.059-1.585l-2.704.54a1 1 0 0 1-1.176-1.584l2.704-.54a1 1 0 0 0-1.058-1.585l-5.856 1.17a3 3 0 0 0-2.4 2.4L4.546 15.6a1 1 0 0 0 1.585 1.059l.54-2.704a1 1 0 0 1 1.584-1.176l.54 2.704a1 1 0 0 0 1.585 1.059l.54-2.704a1 1 0 0 1 1.584-1.176l.54 2.704a1 1 0 0 0 1.585 1.059l1.171-5.856"/></svg>,
        Refresh: () => <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.5 2v6h-6"/><path d="M21.34 15.57a10 10 0 1 1-.57-8.38"/></svg>,
        ChevronRight: ({className}) => <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>,
        ChevronDown: ({className}) => <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m6 9 6 6 6-6"/></svg>,
        Cross: () => <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v20M6 8h12"/></svg>,
        Brain: ({className}) => <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className || "w-6 h-6"}><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/></svg>,
        Globe: () => <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>,
        Search: () => <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      };

      class ErrorBoundary extends React.Component {
        constructor(props) { super(props); this.state = { hasError: false }; }
        static getDerivedStateFromError(error) { return { hasError: true }; }
        componentDidCatch(error, errorInfo) { console.error("App Error:", error, errorInfo); }
        render() {
            if (this.state.hasError) return <div className="min-h-screen flex items-center justify-center bg-church-950 text-gold-500 font-display p-8 text-center">Something went wrong. <button onClick={()=>window.location.reload()} className="underline ml-1">Reload</button></div>;
            return this.props.children;
        }
      }

      // Updated Segmented Language Control
      const HeaderControls = ({ lang, setLang, className }) => (
          <div className={className || "absolute top-6 right-6 z-50 flex items-center gap-1 bg-black/40 backdrop-blur-md border border-white/10 rounded-full p-1 shadow-lg"}>
            <button onClick={() => setLang(Lang.EN)} className={`px-4 py-1.5 rounded-full text-xs font-bold font-display transition-all ${lang === Lang.EN ? 'bg-gold-500 text-church-950 shadow-sm' : 'text-slate-400 hover:text-white'}`}>EN</button>
            <button onClick={() => setLang(Lang.ES)} className={`px-4 py-1.5 rounded-full text-xs font-bold font-display transition-all ${lang === Lang.ES ? 'bg-gold-500 text-church-950 shadow-sm' : 'text-slate-400 hover:text-white'}`}>ES</button>
            <button onClick={() => setLang(Lang.LA)} className={`px-4 py-1.5 rounded-full text-xs font-bold font-display transition-all ${lang === Lang.LA ? 'bg-gold-500 text-church-950 shadow-sm' : 'text-slate-400 hover:text-white'}`}>LA</button>
          </div>
      );

      const Background = () => (
        <div className="fixed inset-0 z-0 pointer-events-none">
          <div className="absolute inset-0 bg-gradient-to-b from-church-950 via-church-900 to-slate-950"></div>
          <div className="absolute top-[-20%] left-1/2 -translate-x-1/2 w-[800px] h-[800px] bg-gold-600/10 rounded-full blur-[120px]"></div>
          <div className="absolute inset-0 bg-noise pointer-events-none"></div>
        </div>
      );

      // --- FULL ROSARY COMPONENT ---
      function RosaryFullView({ lang, setLang, onBack, onMemorize }) {
          const [activeMystery, setActiveMystery] = useState('JOYFUL');
          
          const PRAYERS_BY_ID = useMemo(() => {
              const map = {};
              PRAYERS.forEach(p => map[p.id] = p);
              return map;
          }, []);

          useEffect(() => {
              const day = new Date().getDay();
              if (day === 1 || day === 6) setActiveMystery('JOYFUL'); 
              else if (day === 2 || day === 5) setActiveMystery('SORROWFUL'); 
              else if (day === 0 || day === 3) setActiveMystery('GLORIOUS'); 
              else setActiveMystery('LUMINOUS'); 
          }, []);

          const getPrayer = (id) => {
              const p = PRAYERS_BY_ID[id];
              return p ? getPrayerText(p, lang) : "";
          };
          const getTitle = (id) => {
              const p = PRAYERS_BY_ID[id];
              return p ? getPrayerTitle(p, lang) : "";
          };
          const getCommon = (key) => {
              if(lang === Lang.ES) return COMMON_PRAYERS[key].es;
              if(lang === Lang.LA) return COMMON_PRAYERS[key].la || COMMON_PRAYERS[key].en;
              return COMMON_PRAYERS[key].en;
          };
          const getCommonTitle = (key) => {
              if(lang === Lang.ES) return COMMON_PRAYERS[key].title_es;
              if(lang === Lang.LA) return COMMON_PRAYERS[key].title_la || COMMON_PRAYERS[key].title;
              return COMMON_PRAYERS[key].title;
          };
          
          const mysteries = MYSTERIES[activeMystery];
          const mysteryTitles = {
              JOYFUL: { en: "Joyful Mysteries", es: "Misterios Gozosos", la: "Mysteria Gaudiosa" },
              SORROWFUL: { en: "Sorrowful Mysteries", es: "Misterios Dolorosos", la: "Mysteria Dolorosa" },
              GLORIOUS: { en: "Glorious Mysteries", es: "Misterios Gloriosos", la: "Mysteria Gloriosa" },
              LUMINOUS: { en: "Luminous Mysteries", es: "Misterios Luminosos", la: "Mysteria Lucis" }
          };

          const ctxOpening = lang === Lang.ES ? "Oraciones Iniciales" : lang === Lang.LA ? "Orationes Initiales" : "Opening Prayers";
          const ctxFaith = lang === Lang.ES ? "Por la Fe, Esperanza y Caridad" : lang === Lang.LA ? "Pro Fide, Spe, et Caritate" : "For Faith, Hope, & Charity";
          const ctxClosing = lang === Lang.ES ? "Oraciones Finales" : lang === Lang.LA ? "Orationes Finales" : "Closing Prayers";

          return (
              <div className="h-[100dvh] overflow-y-auto snap-y snap-mandatory relative text-slate-100 bg-church-950 scroll-smooth">
                  <Background />
                  
                  <header className="fixed top-0 left-0 right-0 z-50 px-4 py-4 backdrop-blur-xl border-b border-white/5 bg-church-950/90 shadow-lg">
                      <div className="max-w-4xl mx-auto flex items-center justify-between">
                          <button onClick={onBack} className="p-2 hover:bg-white/10 rounded-full transition-colors text-slate-300 hover:text-white"><Icons.Back /></button>
                          <h1 className="font-display text-xl font-bold text-white">{lang === Lang.ES ? "Santo Rosario" : lang === Lang.LA ? "Sanctum Rosarium" : "Holy Rosary"}</h1>
                          <div className="w-8 md:hidden"></div>
                          <div className="hidden md:block">
                             <HeaderControls lang={lang} setLang={setLang} className="flex items-center" />
                          </div>
                      </div>
                      <div className="md:hidden mt-2 flex justify-center">
                         <HeaderControls lang={lang} setLang={setLang} className="flex items-center relative top-0 right-0" />
                      </div>
                  </header>

                  <main className="relative z-10 w-full">
                      
                      {/* Block 1: Intro & Mystery Selector */}
                      <SnapPage>
                          <div className="text-center">
                              <div className="inline-flex items-center justify-center w-16 h-16 mb-6 rounded-full bg-gold-500/10 border border-gold-500/30 text-gold-400 shadow-[0_0_30px_rgba(234,179,8,0.2)]">
                                  <Icons.Book />
                              </div>
                              <h2 className="font-display text-3xl font-bold mb-10 text-white">
                                  {lang === Lang.ES ? "Selecciona el Misterio" : lang === Lang.LA ? "Elige Mysterium" : "Select Mystery"}
                              </h2>
                              <div className="flex flex-col gap-4 max-w-xs mx-auto">
                                  {Object.keys(MYSTERIES).map(m => (
                                      <button key={m} onClick={() => setActiveMystery(m)} className={`px-6 py-4 rounded-xl text-sm font-bold font-display uppercase tracking-wider border transition-all active:scale-95 ${activeMystery === m ? 'bg-gold-500 text-church-950 border-gold-500 shadow-[0_0_20px_rgba(234,179,8,0.3)]' : 'bg-white/5 text-slate-300 border-white/10 hover:bg-white/10 hover:border-gold-500/50'}`}>
                                          {lang === Lang.ES ? mysteryTitles[m].es : lang === Lang.LA ? mysteryTitles[m].la : mysteryTitles[m].en}
                                      </button>
                                  ))}
                              </div>
                              
                              <div className="mt-12 text-gold-500/60 flex flex-col items-center gap-2">
                                  <span className="text-xs uppercase tracking-widest font-display font-bold">
                                      {lang === Lang.ES ? "Desliza para rezar" : lang === Lang.LA ? "Labi ad orandum" : "Swipe to pray"}
                                  </span>
                              </div>
                          </div>
                      </SnapPage>

                      {/* Block 2: Opening Prayers */}
                      <SnapPage subtitle={ctxOpening}>
                           <PrayerCard title={lang === Lang.ES ? "Señal de la Cruz" : lang === Lang.LA ? "Signum Crucis" : "Sign of the Cross"} text={getCommon('SIGN_CROSS')} />
                      </SnapPage>
                      <SnapPage subtitle={ctxOpening}>
                           <PrayerCard title={getCommonTitle('COME_HS')} text={getCommon('COME_HS')} />
                      </SnapPage>
                      <SnapPage subtitle={ctxOpening}>
                           <PrayerCard title={getTitle('apostles-creed')} text={getPrayer('apostles-creed')} onMemorize={() => onMemorize('apostles-creed')} />
                      </SnapPage>

                      {/* Block 3: Initial 3 Hail Marys */}
                      <SnapPage subtitle={ctxFaith}><PrayerCard title={getTitle('our-father')} text={getPrayer('our-father')} onMemorize={() => onMemorize('our-father')} /></SnapPage>
                      <SnapPage subtitle={ctxFaith}><DecadeCard title={getTitle('hail-mary')} text={getPrayer('hail-mary')} count={3} onMemorize={() => onMemorize('hail-mary')} /></SnapPage>
                      <SnapPage subtitle={ctxFaith}><PrayerCard title={getTitle('glory-be')} text={getPrayer('glory-be')} onMemorize={() => onMemorize('glory-be')} /></SnapPage>

                      {/* Block 4-8: DECADES */}
                      {mysteries.map((m, idx) => {
                          const baseMystery = lang === Lang.ES ? `Misterio ${idx+1}` : lang === Lang.LA ? `Mysterium ${idx+1}` : `Mystery ${idx+1}`;
                          const mysteryName = lang === Lang.ES ? m.t_es : lang === Lang.LA ? m.t_la : m.t;
                          const ctxMystery = `${baseMystery} • ${mysteryName}`;
                          
                          return (
                              <React.Fragment key={idx}>
                                  {/* Mystery Meditation Card */}
                                  <SnapPage subtitle={ctxMystery}>
                                      <div className="px-6 py-10 bg-gradient-to-br from-white/5 to-transparent rounded-xl border border-white/10 text-center shadow-lg">
                                          <h2 className="font-display text-3xl font-bold text-white mb-4">{mysteryName}</h2>
                                          <p className="font-serif italic text-gold-200/80 mb-6">{m.s}</p>
                                          <h5 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">
                                              {lang === Lang.ES ? "Fruto: " : lang === Lang.LA ? "Fructus: " : "Fruit: "} 
                                              <span className="text-gold-400">{lang === Lang.ES ? m.fruit_es : lang === Lang.LA ? m.fruit_la : m.fruit_en}</span>
                                          </h5>
                                          <p className="font-serif text-slate-300 leading-relaxed text-lg">{lang === Lang.ES ? m.m_es : lang === Lang.LA ? m.m_la : m.m_en}</p>
                                      </div>
                                  </SnapPage>
                                  
                                  {/* Decade Prayers */}
                                  <SnapPage subtitle={ctxMystery}><PrayerCard title={getTitle('our-father')} text={getPrayer('our-father')} onMemorize={() => onMemorize('our-father')} /></SnapPage>
                                  <SnapPage subtitle={ctxMystery}><DecadeCard title={getTitle('hail-mary')} text={getPrayer('hail-mary')} count={10} onMemorize={() => onMemorize('hail-mary')} /></SnapPage>
                                  <SnapPage subtitle={ctxMystery}><PrayerCard title={getTitle('glory-be')} text={getPrayer('glory-be')} onMemorize={() => onMemorize('glory-be')} /></SnapPage>
                                  <SnapPage subtitle={ctxMystery}><PrayerCard title={lang === Lang.ES ? "Oración de Fátima" : lang === Lang.LA ? "Oratio Fatimae" : "Fatima Prayer"} text={getCommon('FATIMA')} highlight onMemorize={() => onMemorize('fatima-prayer')} /></SnapPage>
                              </React.Fragment>
                          );
                      })}

                      {/* Block 9: Conclusion */}
                      <SnapPage subtitle={ctxClosing}><PrayerCard title={getTitle('hail-holy-queen')} text={getPrayer('hail-holy-queen')} onMemorize={() => onMemorize('hail-holy-queen')} /></SnapPage>
                      <SnapPage subtitle={ctxClosing}><PrayerCard title={getTitle('rosary-closing')} text={getPrayer('rosary-closing')} onMemorize={() => onMemorize('rosary-closing')} /></SnapPage>
                      <SnapPage subtitle={ctxClosing}><PrayerCard title={lang === Lang.ES ? "Señal de la Cruz" : lang === Lang.LA ? "Signum Crucis" : "Sign of the Cross"} text={getCommon('SIGN_CROSS')} /></SnapPage>

                      <SnapPage>
                          <div className="text-center">
                              <div className="inline-flex items-center justify-center w-20 h-20 mb-6 rounded-full bg-gold-500 text-church-950 shadow-[0_0_40px_rgba(234,179,8,0.4)]">
                                  <Icons.Cross />
                              </div>
                              <h2 className="font-display text-3xl font-bold text-white">
                                  {lang === Lang.ES ? "Rosario Completo" : lang === Lang.LA ? "Rosarium Completum" : "Rosary Complete"}
                              </h2>
                          </div>
                      </SnapPage>

                  </main>
              </div>
          );
      }

      const SnapPage = ({ subtitle, children }) => (
          <div className="snap-start min-h-[100dvh] w-full flex flex-col justify-center px-4 pt-24 pb-16 relative">
              <div className="my-auto w-full max-w-2xl mx-auto flex flex-col justify-center">
                  {subtitle && (
                      <div className="w-full flex items-center justify-center gap-4 mb-6">
                          <div className="h-px bg-gold-500/30 flex-1 max-w-[3rem]"></div>
                          <span className="font-display text-gold-400 text-xs uppercase tracking-widest text-center leading-tight">{subtitle}</span>
                          <div className="h-px bg-gold-500/30 flex-1 max-w-[3rem]"></div>
                      </div>
                  )}
                  <div className="w-full">
                      {children}
                  </div>
              </div>
              <div className="absolute bottom-6 left-1/2 -translate-x-1/2 opacity-30 animate-pulse flex flex-col items-center pointer-events-none">
                  <Icons.ChevronDown className="w-6 h-6 text-gold-500" />
              </div>
          </div>
      );

      const PrayerCard = ({ title, text, highlight, onMemorize }) => (
          <div className={`p-6 rounded-xl border ${highlight ? 'bg-gold-500/5 border-gold-500/30' : 'bg-white/5 border-white/5'} backdrop-blur-sm relative group`}>
              <div className="flex justify-between items-start mb-3">
                  <h4 className={`font-display font-bold ${highlight ? 'text-gold-300' : 'text-slate-200'}`}>{title}</h4>
                  {onMemorize && (
                      <button onClick={onMemorize} className="text-slate-400 hover:text-gold-400 transition-colors p-1.5 bg-black/20 rounded-md border border-white/10 hover:border-gold-500/50" title={highlight ? "Memorize" : "Memorize"}>
                          <Icons.Brain className="w-4 h-4" />
                      </button>
                  )}
              </div>
              <p className="font-serif text-slate-300 leading-relaxed text-lg whitespace-pre-line">{text}</p>
          </div>
      );

      const DecadeCard = ({ title, text, count, onMemorize }) => {
          const [beads, setBeads] = useState(Array(count).fill(false));
          const toggleBead = (idx) => {
              const newBeads = [...beads];
              newBeads[idx] = !newBeads[idx];
              setBeads(newBeads);
          };

          return (
            <div className="relative p-1 rounded-xl bg-gradient-to-b from-blue-500/10 to-transparent border border-blue-500/20">
                <div className="bg-church-950/80 p-6 rounded-lg relative overflow-hidden">
                    <div className="flex justify-between items-baseline mb-4">
                        <div className="flex items-center gap-3">
                            <h4 className="font-display font-bold text-blue-200">{title}</h4>
                            {onMemorize && (
                                <button onClick={onMemorize} className="text-blue-300/70 hover:text-blue-200 transition-colors p-1.5 bg-black/20 rounded-md border border-white/5 hover:border-blue-400/30" title="Memorize">
                                    <Icons.Brain className="w-4 h-4" />
                                </button>
                            )}

                        <span className="text-xs font-bold bg-blue-500/20 text-blue-300 px-2 py-1 rounded border border-blue-500/30">x{count}</span>

                    <p className="font-serif text-slate-300 leading-relaxed text-lg mb-6 whitespace-pre-line">{text}</p>
                    
                    {/* Bead Counter */}
                    <div className="flex flex-wrap justify-center gap-3 pt-4 border-t border-white/10">
                        {beads.map((active, i) => (
                            <button key={i} onClick={() => toggleBead(i)} className={`w-8 h-8 rounded-full border-2 transition-all duration-300 ${active ? 'bg-gold-500 border-gold-400 shadow-[0_0_10px_rgba(234,179,8,0.5)] scale-110' : 'bg-transparent border-slate-600 hover:border-slate-400'}`} aria-label={`Bead ${i+1}`}></button>

      // --- MASS FULL COMPONENT ---
      function MassFullView({ lang, setLang, onBack, onMemorize }) {
          const massPrayers = PRAYERS.filter(p => p.category === PrayerCategory.MASS_RESPONSES);

              <div className="min-h-screen relative text-slate-100 pb-20 bg-church-950">
                  <Background />
                  <header className="fixed top-0 left-0 right-0 z-50 px-4 py-4 backdrop-blur-xl border-b border-white/5 bg-church-950/90 shadow-lg">
                      <div className="max-w-4xl mx-auto flex items-center justify-between">
                          <button onClick={onBack} className="p-2 hover:bg-white/10 rounded-full transition-colors text-slate-300 hover:text-white"><Icons.Back /></button>
                          <h1 className="font-display text-xl font-bold text-white">{lang === Lang.ES ? "Orden de la Misa" : lang === Lang.LA ? "Ordo Missae" : "Order of Mass"}</h1>
                          <div className="w-8 md:hidden"></div>
                          <div className="hidden md:block">
                             <HeaderControls lang={lang} setLang={setLang} className="flex items-center" />
                          </div>
                      </div>
                      <div className="md:hidden mt-2 flex justify-center">
                         <HeaderControls lang={lang} setLang={setLang} className="flex items-center relative top-0 right-0" />
                      </div>
                  </header>

                  <main className="relative z-10 max-w-3xl mx-auto px-4 pt-32">
                      <div className="text-center mb-16">
                          <div className="inline-flex items-center justify-center w-16 h-16 mb-6 rounded-full bg-gold-500/10 border border-gold-500/30 text-gold-400 shadow-[0_0_30px_rgba(234,179,8,0.2)]">
                              <Icons.Book />
                          </div>
                          <h2 className="font-display text-4xl font-bold text-white">
                              {lang === Lang.ES ? "Orden de la Misa" : lang === Lang.LA ? "Ordo Missae" : "Order of Mass"}
                          </h2>
                          <p className="text-gold-500/80 font-serif italic mt-4 max-w-md mx-auto">
                              {lang === Lang.ES ? "Respuestas completas para la celebración Eucarística." : lang === Lang.LA ? "Responsa completa pro celebratione Eucharistica." : "Complete responses for the Eucharistic celebration."}
                          </p>
                      </div>

                      <div className="space-y-12">
                          {massPrayers.map((prayer) => {
                              const title = getPrayerTitle(prayer, lang);

                                  <div key={prayer.id} className="relative">
                                      <div className="flex items-center gap-4 mb-6">
                                          <div className="h-px bg-gold-500/30 flex-1"></div>
                                          <div className="flex items-center gap-3">
                                              <h3 className="font-display font-bold text-gold-500 uppercase tracking-widest text-sm text-center">{title}</h3>
                                              <button onClick={() => onMemorize(prayer.id)} className="text-slate-400 hover:text-gold-400 transition-colors p-1.5 bg-black/20 rounded-md border border-white/10 hover:border-gold-500/50" title="Memorize">

                                              </button>
                                          </div>
                                          <div className="h-px bg-gold-500/30 flex-1"></div>
                                      </div>
                                      
                                      <div className="glass-panel p-6 md:p-10 rounded-2xl border border-white/10 shadow-xl bg-gradient-to-b from-white/5 to-transparent">
                                          {prayer.latinTitle && lang !== Lang.LA && (
                                              <p className="text-center text-gold-400/60 font-serif italic text-sm mb-8">{prayer.latinTitle}</p>
                                          )}
                                          <div className="font-serif text-lg md:text-xl leading-relaxed text-slate-200">
                                              {structure.map((seg, i) => (
                                                  <div key={i} className={`mb-6 ${seg.role === Role.PRIEST ? 'text-gold-500/90 italic ml-[-1rem] border-l-2 border-gold-500/30 pl-4' : ''} ${seg.role === Role.RUBRIC ? 'text-sm text-slate-500 italic text-center' : ''}`}>
                                                      {seg.role === Role.PRIEST && <span className="text-xs uppercase tracking-widest block text-gold-600/50 mb-1 not-italic font-sans">{lang === Lang.ES ? "Sacerdote" : lang === Lang.LA ? "Sacerdos" : "Priest"}</span>}
                                                      {seg.role === Role.PEOPLE && <span className="text-xs uppercase tracking-widest block text-slate-500 mb-1 font-sans">{lang === Lang.ES ? "Pueblo" : lang === Lang.LA ? "Populus" : "People"}</span>}
                                                      <span className="whitespace-pre-line">{seg.text}</span>
                                                  </div>
                                              ))}
                                          </div>
                                      </div>
                                  </div>
                              );
                          })}
                      </div>

                      <div className="text-center mt-16 opacity-50 font-serif text-sm pb-10">
                          {lang === Lang.ES ? "Misa Concluida" : lang === Lang.LA ? "Missa Conclusa" : "Mass Ended"}
                      </div>
                  </main>
              </div>
          );
      }

      // --- DIVINE MERCY FULL COMPONENT ---
      function DivineMercyFullView({ lang, setLang, onBack, onMemorize }) {
          const PRAYERS_BY_ID = useMemo(() => {
              const map = {};
              PRAYERS.forEach(p => map[p.id] = p);
              return map;
          }, []);

          useEffect(() => {
              window.scrollTo(0, 0);
          }, []);

          const getPrayer = (id) => {
              const p = PRAYERS_BY_ID[id];
              return p ? getPrayerText(p, lang) : "";
          };
          const getTitle = (id) => {
              const p = PRAYERS_BY_ID[id];
              return p ? getPrayerTitle(p, lang) : "";
          };
          const getCommon = (key) => {
              if(lang === Lang.ES) return COMMON_PRAYERS[key].es;
              if(lang === Lang.LA) return COMMON_PRAYERS[key].la || COMMON_PRAYERS[key].en;
              return COMMON_PRAYERS[key].en;
          };
          
          const decades = [1, 2, 3, 4, 5];

          return (
              <div className="h-[100dvh] overflow-y-auto snap-y snap-mandatory relative text-slate-100 bg-church-950 scroll-smooth">
                  <Background />
                  
                  <header className="fixed top-0 left-0 right-0 z-50 px-4 py-4 backdrop-blur-xl border-b border-white/5 bg-church-950/90 shadow-lg">
                      <div className="max-w-4xl mx-auto flex items-center justify-between">
                          <button onClick={onBack} className="p-2 hover:bg-white/10 rounded-full transition-colors text-slate-300 hover:text-white"><Icons.Back /></button>
                          <h1 className="font-display text-xl font-bold text-white">{lang === Lang.ES ? "Divina Misericordia" : lang === Lang.LA ? "Divina Misericordia" : "Divine Mercy"}</h1>
                          <div className="w-8 md:hidden"></div>
                          <div className="hidden md:block">
                             <HeaderControls lang={lang} setLang={setLang} className="flex items-center" />
                          </div>
                      </div>
                      <div className="md:hidden mt-2 flex justify-center">
                         <HeaderControls lang={lang} setLang={setLang} className="flex items-center relative top-0 right-0" />
                      </div>
                  </header>

                  <main className="relative z-10 w-full">
                      
                      {/* Block 1: Intro */}
                      <SnapPage>
                          <div className="text-center">
                              <div className="inline-flex items-center justify-center w-16 h-16 mb-6 rounded-full bg-gold-500/10 border border-gold-500/30 text-gold-400 shadow-[0_0_30px_rgba(234,179,8,0.2)]">
                                  <Icons.Book />
                              </div>
                              <h2 className="font-display text-4xl font-bold mb-4 text-white">
                                  {lang === Lang.ES ? "Coronilla a la Divina Misericordia" : lang === Lang.LA ? "Corona Divinae Misericordiae" : "Chaplet of Divine Mercy"}
                              </h2>
                              <p className="text-gold-500/80 font-serif italic max-w-md mx-auto mb-10">
                                  {lang === Lang.ES ? "Jesús, en Ti confío." : lang === Lang.LA ? "Iesu, in te confido." : "Jesus, I trust in You."}
                              </p>
                              
                              <div className="mt-12 text-gold-500/60 flex flex-col items-center gap-2 animate-pulse">
                                  <span className="text-xs uppercase tracking-widest font-display font-bold">
                                      {lang === Lang.ES ? "Desliza para rezar" : lang === Lang.LA ? "Labi ad orandum" : "Swipe to pray"}
                                  </span>
                              </div>
                          </div>
                      </SnapPage>

                      {/* Block 2: Opening Prayers */}
                      <SnapPage subtitle={lang === Lang.ES ? "Oraciones Iniciales" : lang === Lang.LA ? "Orationes Initiales" : "Opening Prayers"}>
                           <PrayerCard title={lang === Lang.ES ? "Señal de la Cruz" : lang === Lang.LA ? "Signum Crucis" : "Sign of the Cross"} text={getCommon('SIGN_CROSS')} />
                      </SnapPage>
                      <SnapPage subtitle={lang === Lang.ES ? "Oraciones Iniciales" : lang === Lang.LA ? "Orationes Initiales" : "Opening Prayers"}>
                           <PrayerCard title={getTitle('dm-opening')} text={getPrayer('dm-opening')} onMemorize={() => onMemorize('dm-opening')} />
                           <div className="mt-6"></div>
                           <PrayerCard title={getTitle('dm-blood-water')} text={getPrayer('dm-blood-water')} onMemorize={() => onMemorize('dm-blood-water')} />
                      </SnapPage>
                      <SnapPage subtitle={lang === Lang.ES ? "Oraciones Iniciales" : lang === Lang.LA ? "Orationes Initiales" : "Opening Prayers"}>
                          <PrayerCard title={getTitle('our-father')} text={getPrayer('our-father')} onMemorize={() => onMemorize('our-father')} />
                          <div className="mt-6"></div>
                          <PrayerCard title={getTitle('hail-mary')} text={getPrayer('hail-mary')} onMemorize={() => onMemorize('hail-mary')} />
                          <div className="mt-6"></div>
                          <PrayerCard title={getTitle('apostles-creed')} text={getPrayer('apostles-creed')} onMemorize={() => onMemorize('apostles-creed')} />
                      </SnapPage>

                      {/* Decades 1-5 */}
                      {decades.map((dec, idx) => (
                          <React.Fragment key={idx}>
                              <SnapPage subtitle={lang === Lang.ES ? `Décena ${dec}` : lang === Lang.LA ? `Decas ${dec}` : `Decade ${dec}`}>
                                  <PrayerCard title={getTitle('dm-eternal-father')} text={getPrayer('dm-eternal-father')} onMemorize={() => onMemorize('dm-eternal-father')} highlight />
                              </SnapPage>
                              <SnapPage subtitle={lang === Lang.ES ? `Décena ${dec}` : lang === Lang.LA ? `Decas ${dec}` : `Decade ${dec}`}>
                                  <DecadeCard title={getTitle('dm-passion')} text={getPrayer('dm-passion')} count={10} onMemorize={() => onMemorize('dm-passion')} />
                              </SnapPage>
                          </React.Fragment>
                      ))}

                      {/* Conclusion */}
                      <SnapPage subtitle={lang === Lang.ES ? "Conclusión" : lang === Lang.LA ? "Conclusio" : "Conclusion"}>
                          <DecadeCard title={getTitle('dm-holy-god')} text={getPrayer('dm-holy-god')} count={3} onMemorize={() => onMemorize('dm-holy-god')} />
                      </SnapPage>
                      
                      <SnapPage subtitle={lang === Lang.ES ? "Oraciones Finales" : lang === Lang.LA ? "Orationes Finales" : "Closing Prayers"}>
                          <PrayerCard title={getTitle('dm-closing')} text={getPrayer('dm-closing')} onMemorize={() => onMemorize('dm-closing')} />
                          <div className="mt-6"></div>
                          <PrayerCard title={lang === Lang.ES ? "Señal de la Cruz" : lang === Lang.LA ? "Signum Crucis" : "Sign of the Cross"} text={getCommon('SIGN_CROSS')} />
                      </SnapPage>

                      <SnapPage>
                          <div className="text-center">
                              <div className="inline-flex items-center justify-center w-20 h-20 mb-6 rounded-full bg-gold-500 text-church-950 shadow-[0_0_40px_rgba(234,179,8,0.4)]">
                                  <Icons.Cross />
                              </div>
                              <h2 className="font-display text-3xl font-bold text-white">
                                  {lang === Lang.ES ? "Coronilla Completada" : lang === Lang.LA ? "Corona Completa" : "Chaplet Complete"}
                              </h2>
                          </div>
                      </SnapPage>

                  </main>
              </div>
          );
      }

      function App() {
        const [view, setView] = useState(ViewMode.HOME);
        const [selectedCategory, setSelectedCategory] = useState(null);
        const [selectedPrayer, setSelectedPrayer] = useState(null);
        const [lang, setLang] = useState(Lang.EN);
        const [searchQuery, setSearchQuery] = useState("");
        const [novenaProgress, setNovenaProgress] = useState({});
        const [user, setUser] = useState(null);
        const [isReady, setIsReady] = useState(window.FirebaseAPI?.isReady || false);

        useEffect(() => {
          // Fallback local storage load
          try {
              const localData = localStorage.getItem('sanctus_novena_progress');
              if (localData) setNovenaProgress(JSON.parse(localData));
          } catch (e) {}

          const handleReady = () => {
              setIsReady(true);
              if (window.FirebaseAPI && window.FirebaseAPI.auth) {
                  window.FirebaseAPI.onAuthStateChanged(window.FirebaseAPI.auth, (u) => {
                      setUser(u);
                      if (u) {
                          const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                          const progressRef = window.FirebaseAPI.doc(window.FirebaseAPI.db, 'artifacts', appId, 'users', u.uid, 'novenas', 'progress');
                          window.FirebaseAPI.onSnapshot(progressRef, (docSnap) => {
                              if (docSnap.exists()) {
                                  setNovenaProgress(prev => {
                                      const merged = { ...prev, ...docSnap.data() };
                                      try { localStorage.setItem('sanctus_novena_progress', JSON.stringify(merged)); } catch(e) {}
                                      return merged;
                                  });
                              }
                          }, (err) => console.error("Cloud sync error:", err));
                      }
                  });
              }
          };

          if (window.FirebaseAPI?.isReady) {
              handleReady();
          } else {
              window.addEventListener('firebaseAPIReady', handleReady);
              return () => window.removeEventListener('firebaseAPIReady', handleReady);
          }
        }, []);

        const handleSetNovenaProgress = async (prayerId, day) => {
            setNovenaProgress(prev => {
                const next = { ...prev, [prayerId]: day };
                try { localStorage.setItem('sanctus_novena_progress', JSON.stringify(next)); } catch (e) {}
                return next;
            });
            
            if (user && window.FirebaseAPI && window.FirebaseAPI.db) {
                try {
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                    const progressRef = window.FirebaseAPI.doc(window.FirebaseAPI.db, 'artifacts', appId, 'users', user.uid, 'novenas', 'progress');
                    await window.FirebaseAPI.setDoc(progressRef, { [prayerId]: day }, { merge: true });
                } catch (err) {
                    console.error("Error saving progress:", err);
                }
            }
        };

        const handleMemorize = (prayerId, category) => {
            const prayer = PRAYERS.find(p => p.id === prayerId);
            if (prayer) {
                setSelectedPrayer(prayer);
                setSelectedCategory(category);
                setView(ViewMode.PRAYER_DETAIL);
            }
        };

        // Render our own elegant spinner if not ready, shielding the user from a blank screen 
        // while the environment checks resolve (usually <1 second).
        if (!isReady) {
            return (
              <div className="flex flex-col items-center justify-center min-h-screen bg-church-950 gap-6">
                <Background />
                <div className="w-16 h-16 border-4 border-gold-500/10 border-t-gold-500 rounded-full animate-[spin_1s_linear_infinite] relative z-10"></div>
                <div className="text-gold-500 font-display text-2xl tracking-widest animate-pulse-slow relative z-10">SANCTUS</div>
              </div>
            );
        }

        if (view === ViewMode.HOME) {
          const filteredPrayers = searchQuery.trim() === '' ? [] : PRAYERS.filter(p => {
              const q = searchQuery.toLowerCase();
              return (p.title?.toLowerCase().includes(q) || 
                      p.title_es?.toLowerCase().includes(q) || 
                      p.latinTitle?.toLowerCase().includes(q));
          });

          return (
            <div className="min-h-screen text-slate-100 relative overflow-hidden flex flex-col">
              <Background />
              <HeaderControls lang={lang} setLang={setLang} />
              <header className="relative z-10 pt-20 pb-8 px-6 text-center">
                <div className="inline-flex items-center justify-center w-16 h-16 mb-6 rounded-full bg-gold-500/10 border border-gold-500/30 text-gold-400 shadow-[0_0_30px_rgba(234,179,8,0.2)]"><Icons.Cross /></div>
                <h1 className="font-display text-5xl md:text-7xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-b from-gold-200 to-gold-600 drop-shadow-sm mb-4">Sanctus</h1>
                <p className="font-serif italic text-church-200/80 text-lg max-w-md mx-auto leading-relaxed">"Lex orandi, lex credendi."</p>
              </header>
              <main className="relative z-10 max-w-5xl mx-auto px-6 pb-20 w-full flex-1">
                
                {/* SEARCH BAR */}
                <div className="max-w-md mx-auto mb-10 relative">
                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                        <Icons.Search />
                    </div>
                    <input 
                        type="text" 
                        value={searchQuery}
                        onChange={(e) => setSearchQuery(e.target.value)}
                        placeholder={lang === Lang.ES ? "Buscar oración..." : lang === Lang.LA ? "Quaerere orationem..." : "Search prayers..."}
                        className="w-full bg-white/5 border border-white/10 text-white rounded-full py-3 pl-12 pr-4 focus:outline-none focus:border-gold-500/50 focus:ring-1 focus:ring-gold-500/50 transition-all placeholder-slate-500 backdrop-blur-md font-serif"
                    />
                </div>

                {searchQuery.trim() !== '' ? (
                    <div className="grid gap-4 animate-fade-in max-w-3xl mx-auto">
                        {filteredPrayers.length > 0 ? filteredPrayers.map((prayer, i) => (
                            <button key={prayer.id} onClick={() => { setSelectedCategory(prayer.category); setSelectedPrayer(prayer); setView(ViewMode.PRAYER_DETAIL); setSearchQuery(""); }} className="group bg-white/5 hover:bg-white/10 backdrop-blur-sm border border-white/10 hover:border-gold-500/30 p-6 rounded-xl transition-all duration-300 text-left hover:shadow-lg flex items-center justify-between glass-panel active:scale-[0.99]" style={{ animationDelay: `${(i % 10) * 30}ms` }}>
                              <div>
                                  <h3 className="font-display text-xl font-bold text-slate-100 group-hover:text-gold-200">{getPrayerTitle(prayer, lang)}</h3>
                                  <p className="font-serif text-sm text-gold-500/70 mt-1">{getCategoryTitle(prayer.category, lang)}</p>
                              </div>
                              <div className="opacity-0 group-hover:opacity-100 transform translate-x-[-10px] group-hover:translate-x-0 transition-all duration-300 text-gold-400"><Icons.ChevronRight /></div>
                            </button>
                        )) : (
                            <div className="text-center text-slate-400 py-10 font-serif italic">
                                {lang === Lang.ES ? "No se encontraron oraciones." : lang === Lang.LA ? "Nullae orationes inventae sunt." : "No prayers found."}
                            </div>
                        )}
                    </div>
                ) : (
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-fade-in">
                      {Object.values(PrayerCategory).map((cat, i) => (
                        <button key={cat} onClick={() => { 
                            setSelectedCategory(cat); 
                            if (cat === PrayerCategory.ROSARY) setView(ViewMode.ROSARY_FULL);
                            else if (cat === PrayerCategory.MASS_RESPONSES) setView(ViewMode.MASS_FULL);
                            else if (cat === PrayerCategory.DIVINE_MERCY) setView(ViewMode.DIVINE_MERCY_FULL);
                            else setView(ViewMode.CATEGORY);
                        }} className="group relative overflow-hidden bg-white/5 hover:bg-white/10 backdrop-blur-md border border-white/10 hover:border-gold-500/50 p-8 rounded-2xl transition-all duration-300 hover:shadow-[0_0_30px_rgba(234,179,8,0.1)] hover:-translate-y-1 text-left flex items-center justify-between glass-panel active:scale-[0.98]" style={{ animationDelay: `${i * 50}ms` }}>
                          <div className="relative z-10">
                            <h3 className="font-display text-2xl font-bold text-slate-100 group-hover:text-gold-300 transition-colors">{getCategoryTitle(cat, lang)}</h3>
                            <p className="text-slate-400 font-serif text-sm mt-2 flex items-center gap-2"><span className="w-1.5 h-1.5 rounded-full bg-gold-500/50"></span>{cat === PrayerCategory.ROSARY ? 20 : PRAYERS.filter(p => p.category === cat).length} {lang === Lang.ES ? 'Oraciones' : lang === Lang.LA ? 'Orationes' : 'Prayers'}</p>
                          </div>
                          <div className="text-white/20 group-hover:text-gold-400/80 transition-all transform group-hover:translate-x-1"><Icons.ChevronRight /></div>
                        </button>
                      ))}
                    </div>
                )}
              </main>
              <footer className="relative z-10 py-6 text-center text-slate-600 text-xs font-serif">AMDG • Ad Majorem Dei Gloriam</footer>
            </div>
          );
        }

        if (view === ViewMode.ROSARY_FULL) {
            return <RosaryFullView lang={lang} setLang={setLang} onBack={() => setView(ViewMode.HOME)} onMemorize={(id) => handleMemorize(id, PrayerCategory.ROSARY)} />;
        }

        if (view === ViewMode.MASS_FULL) {
            return <MassFullView lang={lang} setLang={setLang} onBack={() => setView(ViewMode.HOME)} onMemorize={(id) => handleMemorize(id, PrayerCategory.MASS_RESPONSES)} />;
        }

        if (view === ViewMode.DIVINE_MERCY_FULL) {
            return <DivineMercyFullView lang={lang} setLang={setLang} onBack={() => setView(ViewMode.HOME)} onMemorize={(id) => handleMemorize(id, PrayerCategory.DIVINE_MERCY)} />;
        }

        if (view === ViewMode.CATEGORY && selectedCategory) {
          const categoryPrayers = PRAYERS.filter(p => p.category === selectedCategory);
          return (
            <div className="min-h-screen text-slate-100 relative">
              <Background />
              <header className="relative z-10 pt-8 pb-4 px-6 max-w-4xl mx-auto flex flex-col md:flex-row md:items-center gap-6 justify-between">
                <div className="flex items-center gap-6">
                    <button onClick={() => { setView(ViewMode.HOME); }} className="p-3 bg-white/5 hover:bg-white/10 rounded-full border border-white/10 text-slate-300 hover:text-white transition-all hover:scale-105 active:scale-95"><Icons.Back /></button>
                    <div><span className="text-gold-500 text-xs font-bold tracking-widest uppercase mb-1 block">Category</span><h1 className="font-display text-3xl font-bold text-white shadow-black drop-shadow-lg">{getCategoryTitle(selectedCategory, lang)}</h1></div>
                </div>
                <div className="hidden md:block">
                  <HeaderControls lang={lang} setLang={setLang} className="flex items-center" />
                </div>
              </header>
              <div className="md:hidden mt-2 flex justify-center w-full relative z-20">
                  <HeaderControls lang={lang} setLang={setLang} className="flex items-center" />
              </div>
              <main className="relative z-10 max-w-4xl mx-auto px-6 mt-8 pb-20">
                <div className="grid gap-4 animate-slide-up">
                  {categoryPrayers.map((prayer, i) => (
                    <button key={prayer.id} onClick={() => { setSelectedPrayer(prayer); setView(ViewMode.PRAYER_DETAIL); }} className="group bg-white/5 hover:bg-white/10 backdrop-blur-sm border border-white/10 hover:border-gold-500/30 p-6 rounded-xl transition-all duration-300 text-left hover:shadow-lg flex items-center justify-between glass-panel active:scale-[0.99]" style={{ animationDelay: `${i * 30}ms` }}>
                      <div>
                          <h3 className="font-display text-xl font-bold text-slate-100 group-hover:text-gold-200">{getPrayerTitle(prayer, lang)}</h3>
                          {prayer.latinTitle && lang !== Lang.LA && <p className="font-serif italic text-sm text-gold-500/70 mt-1">{prayer.latinTitle}</p>}
                      </div>
                      <div className="opacity-0 group-hover:opacity-100 transform translate-x-[-10px] group-hover:translate-x-0 transition-all duration-300 text-gold-400"><Icons.ChevronRight /></div>
                    </button>
                  ))}
                </div>
              </main>
            </div>
          );
        }

        if (view === ViewMode.PRAYER_DETAIL && selectedPrayer) {
          const categoryPrayers = PRAYERS.filter(p => p.category === selectedCategory);
          const currentIndex = categoryPrayers.findIndex(p => p.id === selectedPrayer.id);
          const prevPrayer = currentIndex > 0 ? categoryPrayers[currentIndex - 1] : null;
          const nextPrayer = currentIndex < categoryPrayers.length - 1 ? categoryPrayers[currentIndex + 1] : null;
          
          const handleBack = () => {
              if (selectedCategory === PrayerCategory.ROSARY) setView(ViewMode.ROSARY_FULL);
              else if (selectedCategory === PrayerCategory.MASS_RESPONSES) setView(ViewMode.MASS_FULL);
              else if (selectedCategory === PrayerCategory.DIVINE_MERCY) setView(ViewMode.DIVINE_MERCY_FULL);
              else setView(ViewMode.CATEGORY);
          };

          return <PrayerDetail prayer={selectedPrayer} lang={lang} onBack={handleBack} Background={Background} setLang={setLang} onPrev={prevPrayer ? () => { setSelectedPrayer(prevPrayer); } : null} onNext={nextPrayer ? () => { setSelectedPrayer(nextPrayer); } : null} currentIndex={currentIndex} total={categoryPrayers.length} novenaProgress={novenaProgress} setNovenaProgress={handleSetNovenaProgress} />;
        }
        
        return null;
      }

      function PrayerDetail({ prayer, lang, onBack, Background, setLang, onPrev, onNext, currentIndex, total, novenaProgress, setNovenaProgress }) {
        const [activeTab, setActiveTab] = useState('read');
        const [gameMode, setGameMode] = useState(GameType.NONE);
        const topRef = useRef(null);
        useEffect(() => { setGameMode(GameType.NONE); setActiveTab('read'); window.scrollTo({ top: 0, behavior: 'smooth' }); }, [prayer]);
        
        const title = getPrayerTitle(prayer, lang);
        const fullText = getPrayerText(prayer, lang);
        const isNovena = prayer.category === PrayerCategory.NOVENAS;
        const currentDay = novenaProgress?.[prayer.id] || 1;

        const displayText = useMemo(() => {
            if (!isNovena) return fullText;
            if (fullText.includes('Day 2:') || fullText.includes('Día 2:') || fullText.includes('Dies II:')) {
                const parts = fullText.split(/(?=Day \d:|Día \d:|Dies [IVXL]+:)/i).filter(p => p.trim().length > 0);
                return parts[currentDay - 1] ? parts[currentDay - 1].trim() : parts[0].trim();
            }
            return fullText;
        }, [fullText, isNovena, currentDay]);

        const structure = useMemo(() => analyzePrayerStructure(displayText), [displayText]);

        return (
          <div className="min-h-screen flex flex-col text-slate-100 relative" ref={topRef}>
            <Background />
            <header className="relative z-20 px-4 py-4 backdrop-blur-xl border-b border-white/5 sticky top-0 bg-church-950/80 transition-all duration-300">
              <div className="max-w-4xl mx-auto flex flex-col md:flex-row md:items-center justify-between pr-4 gap-4"> 
                  <div className="flex items-center justify-between w-full md:w-auto">
                    <div className="flex items-center gap-4">
                        <button onClick={onBack} className="p-2 hover:bg-white/10 rounded-full transition-colors text-slate-300 hover:text-white active:scale-95"><Icons.Back /></button>
                        <div>
                            <h1 className="font-display text-xl font-bold leading-tight text-white line-clamp-1">{title}</h1>
                            {prayer.latinTitle && lang !== Lang.LA && <span className="text-xs text-gold-500 font-serif italic tracking-wide">{prayer.latinTitle}</span>}
                        </div>
                    </div>
                  </div>
                  <div className="flex items-center gap-4 justify-between md:justify-end w-full md:w-auto">
                      <div className="hidden md:block"><HeaderControls lang={lang} setLang={setLang} className="flex items-center" /></div>
                      <div className="hidden md:flex bg-black/20 p-1 rounded-full border border-white/5">
                          <TabButton active={activeTab === 'read'} onClick={() => { setActiveTab('read'); setGameMode(GameType.NONE); }} icon={<Icons.Book />} label={lang === Lang.ES ? "Leer" : lang === Lang.LA ? "Legere" : "Read"} />
                          <TabButton active={activeTab === 'games'} onClick={() => { setActiveTab('games'); setGameMode(GameType.NONE); }} icon={<Icons.Puzzle />} label={lang === Lang.ES ? "Memorizar" : lang === Lang.LA ? "Memorare" : "Memorize"} />
                      </div>
                  </div>
              </div>
            </header>
            <div className="md:hidden mt-2 flex justify-center w-full relative z-20">
                <HeaderControls lang={lang} setLang={setLang} className="flex items-center" />
            </div>
            <div className="md:hidden relative z-20 px-4 py-2 mt-2 bg-church-950/40 border-y border-white/5 backdrop-blur-md">
                <div className="flex justify-between gap-2">
                  <TabButton mobile active={activeTab === 'read'} onClick={() => { setActiveTab('read'); setGameMode(GameType.NONE); }} icon={<Icons.Book />} label={lang === Lang.ES ? "Leer" : lang === Lang.LA ? "Legere" : "Read"} />
                  <TabButton mobile active={activeTab === 'games'} onClick={() => { setActiveTab('games'); setGameMode(GameType.NONE); }} icon={<Icons.Puzzle />} label={lang === Lang.ES ? "Memorizar" : lang === Lang.LA ? "Memorare" : "Memorize"} />
                </div>
            </div>
            <main className="relative z-10 flex-1 max-w-3xl mx-auto w-full p-4 md:p-8 pb-32">
              {activeTab === 'read' && (
                <div className="animate-fade-in glass-panel p-8 md:p-12 rounded-2xl border border-white/10 shadow-2xl">
                    {isNovena && (
                        <div className="mb-10 flex flex-col items-center border-b border-white/10 pb-8">
                            <span className="text-gold-500 font-display text-sm uppercase tracking-widest mb-4">
                                {lang === Lang.ES ? "Día" : lang === Lang.LA ? "Dies" : "Day"} {currentDay} / 9
                            </span>
                            <div className="flex flex-wrap justify-center gap-2">
                                {[1,2,3,4,5,6,7,8,9].map(day => (
                                    <button
                                        key={day}
                                        onClick={() => setNovenaProgress(prayer.id, day)}
                                        className={`w-10 h-10 rounded-full font-display font-bold text-sm transition-all active:scale-95 flex items-center justify-center ${
                                            currentDay === day
                                            ? 'bg-gold-500 text-church-950 shadow-[0_0_15px_rgba(234,179,8,0.5)] scale-110 border-2 border-gold-400'
                                            : currentDay > day
                                                ? 'bg-gold-500/20 text-gold-400 border border-gold-500/30 hover:bg-gold-500/30'
                                                : 'bg-white/5 text-slate-400 border border-white/10 hover:border-gold-500/30 hover:text-white'
                                        }`}
                                    >
                                        {day}
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}
                    <div className="font-serif text-lg md:text-xl leading-[2.2] text-slate-200">
                    {structure.map((seg, i) => (
                        <div key={i} className={`mb-4 ${seg.role === Role.PRIEST ? 'text-gold-500/80 italic ml-[-1rem] border-l-2 border-gold-500/30 pl-3' : ''}`}>
                            {seg.role === Role.PRIEST && <span className="text-xs uppercase tracking-widest block text-gold-600/50 mb-1 not-italic">{lang === Lang.ES ? "Sacerdote" : lang === Lang.LA ? "Sacerdos" : "Priest"}</span>}
                            <span className="whitespace-pre-line">{seg.text}</span>
                        </div>
                    ))}
                    </div>
                </div>
              )}
              {activeTab === 'games' && gameMode === GameType.NONE && (
                <div className="grid gap-4 mt-2 animate-slide-up grid-cols-1 md:grid-cols-2">
                  <GameCard title={lang === Lang.ES ? "Completa la Frase" : "Fill in the Blanks"} desc={lang === Lang.ES ? "Completa la oración" : "Complete the prayer"} icon={<Icons.Puzzle />} onClick={() => { setGameMode(GameType.FILL_BLANKS); }} />
                  <GameCard title={lang === Lang.ES ? "¿Qué Sigue?" : "What Comes Next?"} desc={lang === Lang.ES ? "Identifica la siguiente línea" : "Identify next line"} icon={<Icons.Brain />} onClick={() => { setGameMode(GameType.QUIZ); }} />
                  <GameCard title={lang === Lang.ES ? "Ordena las Líneas" : "Order the Lines"} desc={lang === Lang.ES ? "Reensambla línea por línea" : "Reassemble line by line"} icon={<Icons.Puzzle />} onClick={() => { setGameMode(GameType.ORDER_LINES); }} />
                  <GameCard title={lang === Lang.ES ? "Método de Primera Letra" : "First Letter Method"} desc={lang === Lang.ES ? "Solo primeras letras" : "First letters only"} icon={<Icons.Book />} onClick={() => { setGameMode(GameType.FIRST_LETTERS); }} />
                </div>
              )}
              {activeTab === 'games' && gameMode !== GameType.NONE && (
                  <div className="bg-black/20 border border-white/5 rounded-2xl p-6 backdrop-blur-md animate-fade-in min-h-[50vh]">
                      {gameMode === GameType.FILL_BLANKS && <FillBlanksGame structure={structure} lang={lang} />}
                      {gameMode === GameType.ORDER_LINES && <OrderLinesGame structure={structure} lang={lang} />}
                      {gameMode === GameType.FIRST_LETTERS && <FirstLettersGame structure={structure} lang={lang} />}
                      {gameMode === GameType.QUIZ && <QuizGame structure={structure} lang={lang} />}
                  </div>
              )}
            </main>
            <div className="fixed bottom-0 left-0 right-0 z-30 p-4 bg-church-950/90 backdrop-blur-xl border-t border-white/10 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] transition-transform duration-300">
              <div className="max-w-3xl mx-auto flex items-center justify-between">
                <button onClick={onPrev} disabled={!onPrev} className={`flex items-center gap-2 px-6 py-3 rounded-full font-serif text-sm transition-all active:scale-95 ${onPrev ? 'text-gold-400 hover:bg-white/10 hover:text-gold-300' : 'text-slate-700 cursor-not-allowed'}`}>
                  <span className="transform rotate-180"><Icons.ChevronRight /></span>{lang === Lang.ES ? "Anterior" : lang === Lang.LA ? "Anterior" : "Previous"}
                </button>
                <span className="text-xs text-slate-500 font-serif tracking-widest bg-black/20 px-3 py-1 rounded-full border border-white/5">{currentIndex + 1} / {total}</span>
                <button onClick={onNext} disabled={!onNext} className={`flex items-center gap-2 px-6 py-3 rounded-full font-serif text-sm transition-all active:scale-95 ${onNext ? 'text-gold-400 hover:bg-white/10 hover:text-gold-300' : 'text-slate-700 cursor-not-allowed'}`}>
                  {lang === Lang.ES ? "Siguiente" : lang === Lang.LA ? "Sequens" : "Next"}<Icons.ChevronRight />
                </button>
              </div>
            </div>
          </div>
        );
      }

      function TabButton({ active, onClick, icon, label, mobile }) {
        return ( <button onClick={onClick} className={`flex items-center justify-center gap-2 px-4 py-2 rounded-full text-sm font-semibold transition-all duration-300 active:scale-95 ${mobile ? 'flex-1' : ''} ${active ? 'bg-gold-500 text-church-950 shadow-[0_0_15px_rgba(245,158,11,0.4)]' : 'text-slate-400 hover:text-slate-100 hover:bg-white/5'}`}><span className="w-4 h-4">{icon}</span>{!mobile && label}{mobile && <span className="text-xs">{label}</span>}</button> );
      }
      function GameCard({ title, desc, onClick, icon }) {
        return ( <button onClick={onClick} className="group bg-gradient-to-br from-white/5 to-transparent hover:from-white/10 p-6 rounded-xl border border-white/10 hover:border-gold-500/40 transition-all duration-300 text-left hover:shadow-lg hover:-translate-y-0.5 active:scale-[0.98] h-full"><div className="flex flex-col gap-3"><div className="w-12 h-12 rounded-full bg-gold-500/10 flex items-center justify-center text-gold-400 group-hover:bg-gold-500 group-hover:text-church-950 transition-all duration-300">{icon || <Icons.Puzzle />}</div><div><h3 className="font-display text-lg font-bold text-slate-100 group-hover:text-gold-200">{title}</h3><p className="text-slate-400 text-sm mt-1">{desc}</p></div></div></button> );
      }

      // -- Mini Games Components --
      function FillBlanksGame({ structure, lang }) {
        const [segments, setSegments] = useState([]);
        const [options, setOptions] = useState([]);
        const [currentIndex, setCurrentIndex] = useState(-1);
        const [completed, setCompleted] = useState(false);
        
        useEffect(() => {
          const newSegments = []; const hiddenWords = []; let hiddenCount = 0;
          structure.forEach(seg => {
            if (seg.role === Role.PEOPLE) {
                 const tokens = [];
                 seg.text.split(/([a-zA-Z0-9À-ÿ]+)/g).forEach(s => {
                    if (!s) return;
                    const isWord = /^[a-zA-Z0-9À-ÿ]+$/.test(s);
                    const shouldHide = isWord && s.length > 2 && Math.random() < 0.3;
                    if (shouldHide) { tokens.push({ word: s, type: 'word', hidden: true, filled: false, globalIndex: hiddenCount }); hiddenWords.push(s); hiddenCount++; } 
                    else { tokens.push({ word: s, type: isWord ? 'word' : 'punct', hidden: false, filled: true }); }
                 });
                 newSegments.push({ ...seg, tokens, isInteractive: true });
            } else { newSegments.push({ ...seg, isInteractive: false }); }
          });
          setSegments(newSegments); setOptions(hiddenWords.sort(() => Math.random() - 0.5)); setCurrentIndex(0); setCompleted(hiddenWords.length === 0);
        }, [structure]);

        const handleSelectWord = (word, optionIndex) => {
          let targetSegmentIdx = -1, targetTokenIdx = -1;
          for (let s=0; s<segments.length; s++) {
             if (!segments[s].isInteractive) continue;
             const idx = segments[s].tokens.findIndex(t => t.hidden && t.globalIndex === currentIndex);
             if (idx !== -1) { targetSegmentIdx = s; targetTokenIdx = idx; break; }
          }
          if (targetSegmentIdx === -1) return;
          if (segments[targetSegmentIdx].tokens[targetTokenIdx].word === word) {
            const newSegments = [...segments]; newSegments[targetSegmentIdx].tokens[targetTokenIdx].hidden = false; newSegments[targetSegmentIdx].tokens[targetTokenIdx].filled = true; setSegments(newSegments);
            const newOptions = [...options]; newOptions.splice(optionIndex, 1); setOptions(newOptions);
            if (newOptions.length === 0) { setCompleted(true); } else { setCurrentIndex(currentIndex + 1); }
          }
        };

        return ( <div className="flex flex-col h-full"><div className="bg-black/30 p-4 rounded-xl mb-4 font-serif text-lg leading-loose min-h-[100px] max-h-[40vh] overflow-y-auto">{segments.map((seg, i) => (!seg.isInteractive ? <div key={i} className="mb-2 text-slate-500 text-sm">{seg.text}</div> : <div key={i} className="mb-2 text-slate-300">{seg.tokens.map((t, k) => !t.hidden ? <span key={k} className={t.filled && t.globalIndex !== undefined ? "text-gold-400" : ""}>{t.word}</span> : <span key={k} className={`inline-block min-w-[3rem] border-b-2 mx-1 text-center ${t.globalIndex === currentIndex ? 'border-gold-500 bg-gold-500/10' : 'border-slate-700'}`}>&nbsp;</span>)}</div>))}</div>{!completed && <div className="flex flex-wrap gap-2 justify-center">{options.map((word, i) => <button key={i} onClick={() => handleSelectWord(word, i)} className="px-3 py-1 bg-church-800 border border-white/10 rounded hover:bg-gold-500 hover:text-black transition-colors">{word}</button>)}</div>}{completed && <div className="text-center text-green-400 font-bold mt-4">Completed!</div>}</div> );
      }
      
      function FirstLettersGame({ structure }) {
        const [showFull, setShowFull] = useState(false);
        const convert = (text) => text.split(/([a-zA-Z0-9À-ÿ]+)/g).map(t => /^[a-zA-Z0-9À-ÿ]+$/.test(t) ? t.charAt(0) : t).join('');
        return ( <div><div className="flex justify-end mb-4"><button onMouseDown={()=>setShowFull(true)} onMouseUp={()=>setShowFull(false)} onMouseLeave={()=>setShowFull(false)} onTouchStart={()=>setShowFull(true)} onTouchEnd={()=>setShowFull(false)} className="text-xs bg-gold-500/20 text-gold-300 border border-gold-500/30 px-3 py-1 rounded-full uppercase font-bold transition-colors hover:bg-gold-500/40">Hold to Peek</button></div><div className="text-center space-y-4">{structure.map((seg, i) => <p key={i} className={`font-serif text-xl leading-loose transition-all duration-300 ${showFull ? 'text-slate-200' : 'text-gold-200 font-bold'}`}>{showFull ? seg.text : convert(seg.text)}</p>)}</div></div> );
      }

      function OrderLinesGame({ structure, lang }) {
        const [lines, setLines] = useState([]); const [shuffled, setShuffled] = useState([]); const [currentLineIdx, setCurrentLineIdx] = useState(0);
        useEffect(() => { const l = structure.filter(s => s.role === Role.PEOPLE).flatMap(s => breakTextIntoChunks(s.text)).filter(l=>l.length>0); setLines(l); setShuffled([...l].sort(()=>Math.random()-0.5)); setCurrentLineIdx(0); }, [structure]);
        const handleLineClick = (line, idx) => { if (line === lines[currentLineIdx]) { const n = [...shuffled]; n.splice(idx, 1); setShuffled(n); setCurrentLineIdx(p=>p+1); } };
        return ( <div><div className="bg-black/30 p-4 rounded mb-4 min-h-[100px] flex flex-col items-center">{lines.slice(0, currentLineIdx).map((l, i)=><p key={i} className="text-gold-300 mb-2 text-center w-full border-b border-white/5 pb-1">{l}</p>)}</div><div className="space-y-2">{shuffled.map((l, i)=><button key={i} onClick={()=>handleLineClick(l, i)} className="w-full p-3 bg-white/5 border border-white/10 rounded text-center text-sm hover:bg-white/10 transition-colors">{l}</button>)}</div></div> );
      }

      function QuizGame({ structure, lang }) {
         const [q, setQ] = useState(null); const [finished, setFinished] = useState(false);
         useEffect(() => {
             const units = structure.flatMap(s => breakTextIntoChunks(s.text));
             if(units.length < 2) { setFinished(true); return; }
             const qs = [];
             for(let i=0; i<units.length-1; i++) {
                 const others = units.filter(u => u !== units[i+1] && u !== units[i]);
                 const dist = others.sort(()=>0.5-Math.random()).slice(0,3);
                 qs.push({ prompt: units[i], correct: units[i+1], options: [...dist, units[i+1]].sort(()=>0.5-Math.random()) });
             }
             if(qs.length > 0) setQ({ list: qs, idx: 0 }); else setFinished(true);
         }, [structure]);
         const handleGuess = (opt) => {
             if(opt === q.list[q.idx].correct) { if(q.idx < q.list.length-1) setQ({ ...q, idx: q.idx+1 }); else setFinished(true); } 
         };
         if(finished || !q) return <div className="text-center font-bold text-green-400 mt-10">Quiz Complete!</div>;
         const curr = q.list[q.idx];
         return ( <div><div className="bg-black/30 p-6 rounded mb-6 text-center"><p className="text-xs uppercase text-slate-500 mb-2">After this...</p><p className="font-serif text-xl">"{curr.prompt}"</p></div><div className="grid gap-2">{curr.options.map((o, i)=><button key={i} onClick={()=>handleGuess(o)} className="p-4 bg-white/5 border border-white/10 rounded hover:bg-white/10 text-left transition-colors">{o}</button>)}</div></div> );
      }

      const rootElement = document.getElementById('root');
      if (!rootElement) throw new Error("Could not find root element");
      const root = ReactDOM.createRoot(rootElement);
      root.render( <React.StrictMode><ErrorBoundary><App /></ErrorBoundary></React.StrictMode> );
    </script>
  </body>
</html>
