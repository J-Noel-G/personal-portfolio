<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Sanctus - Prayer Memorization</title>
    
    <!-- 1. Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet">
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Merriweather', 'serif'],
              display: ['Cinzel', 'serif'],
            },
            colors: {
              gold: {
                50: '#fffaeb', 100: '#fef0c7', 200: '#fde68a', 300: '#fcd34d', 400: '#fbbf24',
                500: '#f59e0b', 600: '#d97706', 700: '#b45309', 800: '#92400e', 900: '#78350f', 950: '#451a03',
              },
              church: {
                50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8',
                500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0c4a6e', 950: '#020617',
              }
            }
          }
        }
      }
    </script>

    <style>
      * {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        -webkit-tap-highlight-color: transparent;
      }
      body { overscroll-behavior-y: none; }
      .glass-panel {
        background: rgba(10, 10, 15, 0.6);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      }
      .bg-noise {
        background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyBAMAAADsEZWCAAAAGFBMVEUAAAAAAAACAgIBAQEAAAAAAAABAQEAAAB2XFmnAAAACHRSTlMAz8+WlpmZlpvF688AAAABYktHRACIBR1IAAAAJ0lEQVQ4y2NgQQ0wMHCwM2ARY2RgYGARZ2BgYBFnYGBgEWdgYGARZwA5OAGx9K0x4gAAAABJRU5ErkJggg==");
        opacity: 0.025;
      }
    </style>
  </head>
  <body class="bg-church-950 text-slate-100 antialiased overflow-x-hidden min-h-screen">
    
    <!-- Background layers -->
    <div class="fixed inset-0 z-0 pointer-events-none">
      <div class="absolute inset-0 bg-gradient-to-b from-church-950 via-church-900 to-slate-950"></div>
      <div class="absolute top-[-20%] left-1/2 -translate-x-1/2 w-[800px] h-[800px] bg-gold-600/10 rounded-full blur-[120px]"></div>
      <div class="absolute inset-0 bg-noise pointer-events-none"></div>
    </div>

    <!-- Main Container -->
    <div id="root" class="relative z-10 min-h-screen flex flex-col"></div>

    <script>
      // --- APP STATE ---
      let currentLang = 'en'; 
      let currentView = 'LOADING'; // Initial view
      let selectedCategory = null;
      let selectedPrayer = null;
      let searchQuery = '';
      let PRAYERS_DATA = []; // Populated via Fetch
      let loadError = null;

      const PrayerCategory = {
        MASS_RESPONSES: 'Mass Responses',
        BASIC: 'Basic Prayers',
        ROSARY: 'Holy Rosary',
        NOVENAS: 'Novenas',
        SAINTS: 'Prayers of Saints',
        DIVINE_MERCY: 'Divine Mercy',
        ACTIVITIES: 'Daily Activities',
        MEAL: 'Meal Prayers',
        ACTS: 'Acts of Faith, Hope, Love',
        LITANIES: 'Litanies',
      };

      const CATEGORY_TRANSLATIONS = {
        [PrayerCategory.BASIC]: { es: 'Oraciones Básicas', la: 'Orationes Fundamentales' },
        [PrayerCategory.MASS_RESPONSES]: { es: 'Respuestas de la Misa', la: 'Responsa Missae' },
        [PrayerCategory.ROSARY]: { es: 'Santo Rosario', la: 'Sanctum Rosarium' },
        [PrayerCategory.NOVENAS]: { es: 'Novenas', la: 'Novendiales' },
        [PrayerCategory.SAINTS]: { es: 'Oraciones a los Santos', la: 'Orationes ad Sanctos' },
        [PrayerCategory.DIVINE_MERCY]: { es: 'Divina Misericordia', la: 'Divina Misericordia' },
        [PrayerCategory.ACTIVITIES]: { es: 'Actividades Diarias', la: 'Actus Cotidiani' },
        [PrayerCategory.MEAL]: { es: 'Oraciones para las Comidas', la: 'Orationes pro Mensa' },
        [PrayerCategory.ACTS]: { es: 'Actos de Fe, Esperanza y Caridad', la: 'Actus Fidei, Spei, Caritatis' },
        [PrayerCategory.LITANIES]: { es: 'Letanías', la: 'Litaniae' },
      };

      const LITANY_LINKS = [
        'https://www.ewtn.com/catholicism/devotions/litany-of-loreto-246',
        'https://www.ewtn.com/catholicism/devotions/litany-of-the-sacred-heart-of-jesus-250',
        'https://www.ewtn.com/catholicism/devotions/litany-of-st-joseph-247',
        'https://www.ewtn.com/catholicism/devotions/litany-of-the-holy-name-of-jesus-248',
        'https://www.ewtn.com/catholicism/devotions/litany-of-the-most-precious-blood-of-jesus-249',
        'https://www.ewtn.com/catholicism/devotions/litany-of-the-saints-251',
        'https://www.ewtn.com/catholicism/devotions/litany-of-humility-245'
      ];

      // --- ASYNC DATABASE FETCH ---
      async function fetchPrayers() {
        try {
          const response = await fetch('prayers.json');
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          PRAYERS_DATA = await response.json();
          currentView = 'HOME';
        } catch (err) {
          console.error("Could not load prayers:", err);
          loadError = err.message;
          currentView = 'ERROR';
        }
        render();
      }

      // --- UTILS ---
      function getCategoryTitle(cat, lang) {
        if (CATEGORY_TRANSLATIONS[cat] && CATEGORY_TRANSLATIONS[cat][lang]) {
          return CATEGORY_TRANSLATIONS[cat][lang];
        }
        return cat;
      }

      function getPrayerTitle(prayer, lang) {
        if (lang === 'es' && prayer.title_es) return prayer.title_es;
        if (lang === 'la' && prayer.title_la) return prayer.title_la;
        return prayer.title;
      }

      function getPrayerText(prayer, lang) {
        if (lang === 'es' && prayer.text_es) return prayer.text_es;
        if (lang === 'la' && prayer.text_la) return prayer.text_la;
        return prayer.text;
      }

      function setLang(lang) {
        currentLang = lang;
        render();
      }

      function handleSearch(val) {
        searchQuery = val;
        render();
      }

      function selectCategory(cat) {
        if (cat === PrayerCategory.LITANIES) {
          const randomLitany = LITANY_LINKS[Math.floor(Math.random() * LITANY_LINKS.length)];
          window.open(randomLitany, '_blank');
          return;
        }
        if (cat === PrayerCategory.SAINTS) {
          window.open('https://www.franciscanmedia.org/saint-of-the-day/', '_blank');
          return;
        }
        
        selectedCategory = cat;
        currentView = 'CATEGORY';
        render();
      }

      function viewPrayer(prayerId) {
        selectedPrayer = PRAYERS_DATA.find(p => p.id === prayerId);
        currentView = 'PRAYER_DETAIL';
        render();
      }

      // --- RENDER ENGINE ---
      function render() {
        const root = document.getElementById('root');

        if (currentView === 'LOADING') {
          root.innerHTML = `
            <div class="flex flex-col items-center justify-center min-h-screen gap-6">
              <div class="w-16 h-16 border-4 border-gold-500/10 border-t-gold-500 rounded-full animate-spin"></div>
              <div class="text-gold-500 font-display text-2xl tracking-widest animate-pulse">SANCTUS</div>
            </div>
          `;
          return;
        }

        if (currentView === 'ERROR') {
          root.innerHTML = `
            <div class="flex flex-col items-center justify-center min-h-screen text-center px-6">
              <div class="text-red-500 text-5xl mb-4">⚠</div>
              <h1 class="font-display text-3xl text-gold-500 mb-2">Failed to Load Prayers</h1>
              <p class="font-serif text-slate-400 mb-6 max-w-md">Please ensure your prayers.json file exists and is correctly placed in the root directory.</p>
              <p class="text-xs text-red-400 font-mono bg-black/40 p-3 rounded border border-white/5 max-w-sm overflow-auto mb-6">${loadError}</p>
              <button onclick="fetchPrayers()" class="px-6 py-2.5 bg-gold-500 text-church-950 font-display font-bold rounded-full hover:bg-gold-400 transition-colors">
                Retry Connection
              </button>
            </div>
          `;
          return;
        }

        if (currentView === 'HOME') {
          const filteredCategories = Object.values(PrayerCategory).filter(cat => {
            const translated = getCategoryTitle(cat, currentLang).toLowerCase();
            return translated.includes(searchQuery.toLowerCase());
          });

          root.innerHTML = `
            <div class="absolute top-6 right-6 z-50 flex items-center gap-1 bg-black/40 backdrop-blur-md border border-white/10 rounded-full p-1 shadow-lg">
              <button onclick="setLang('en')" class="px-4 py-1.5 rounded-full text-xs font-bold font-display transition-all ${currentLang === 'en' ? 'bg-gold-500 text-church-950 shadow-sm' : 'text-slate-400 hover:text-white'}">EN</button>
              <button onclick="setLang('es')" class="px-4 py-1.5 rounded-full text-xs font-bold font-display transition-all ${currentLang === 'es' ? 'bg-gold-500 text-church-950 shadow-sm' : 'text-slate-400 hover:text-white'}">ES</button>
              <button onclick="setLang('la')" class="px-4 py-1.5 rounded-full text-xs font-bold font-display transition-all ${currentLang === 'la' ? 'bg-gold-500 text-church-950 shadow-sm' : 'text-slate-400 hover:text-white'}">LA</button>
            </div>

            <header class="relative z-10 pt-20 pb-8 px-6 text-center">
              <div class="inline-flex items-center justify-center w-16 h-16 mb-6 rounded-full bg-gold-500/10 border border-gold-500/30 text-gold-400 shadow-[0_0_30px_rgba(234,179,8,0.2)]">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                  <path d="M12 2v20M6 8h12"></path>
                </svg>
              </div>
              <h1 class="font-display text-5xl md:text-7xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-b from-gold-200 to-gold-600 drop-shadow-sm mb-4">Sanctus</h1>
              <p class="font-serif italic text-church-200/80 text-lg max-w-md mx-auto leading-relaxed">"Lex orandi, lex credendi."</p>
            </header>

            <main class="relative z-10 max-w-5xl mx-auto px-6 pb-20 w-full flex-1">
              <div class="max-w-md mx-auto mb-10 relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.3-4.3"></path>
                  </svg>
                </div>
                <input 
                  type="text" 
                  id="searchInput"
                  value="${searchQuery}"
                  oninput="handleSearch(this.value)"
                  placeholder="${currentLang === 'es' ? 'Buscar...' : currentLang === 'la' ? 'Quaerere...' : 'Search categories...'}"
                  class="w-full bg-white/5 border border-white/10 text-white rounded-full py-3 pl-12 pr-4 focus:outline-none focus:border-gold-500/50 focus:ring-1 focus:ring-gold-500/50 transition-all placeholder-slate-500 backdrop-blur-md font-serif"
                />
              </div>

              <div class="grid grid-cols-1 md:grid-cols-2 gap-6 animate-fade-in">
                ${filteredCategories.map(cat => {
                  const count = PRAYERS_DATA.filter(p => p.category === cat).length;
                  let subLabel = '';
                  let actionIcon = '→';

                  if (cat === PrayerCategory.ROSARY) {
                    subLabel = currentLang === 'es' ? '20 Misterios' : currentLang === 'la' ? 'XX Mysteria' : '20 Mysteries';
                  } else if (cat === PrayerCategory.LITANIES) {
                    subLabel = currentLang === 'es' ? 'Letanía Aleatoria' : currentLang === 'la' ? 'Litania Fortuita' : 'Random Litany';
                    actionIcon = '⧉';
                  } else if (cat === PrayerCategory.SAINTS) {
                    subLabel = currentLang === 'es' ? 'Santo del Día' : currentLang === 'la' ? 'Sanctus Diei' : 'Saint of the Day';
                    actionIcon = '⧉';
                  } else {
                    subLabel = `${count} ${currentLang === 'es' ? 'Oraciones' : currentLang === 'la' ? 'Orationes' : 'Prayers'}`;
                  }

                  return `
                    <button onclick="selectCategory('${cat}')" class="group relative overflow-hidden bg-white/5 hover:bg-white/10 backdrop-blur-md border border-white/10 hover:border-gold-500/50 p-8 rounded-2xl transition-all duration-300 hover:shadow-[0_0_30px_rgba(234,179,8,0.1)] hover:-translate-y-1 text-left flex items-center justify-between glass-panel active:scale-[0.98]">
                      <div>
                        <h3 class="font-display text-2xl font-bold text-slate-100 group-hover:text-gold-300 transition-colors">${getCategoryTitle(cat, currentLang)}</h3>
                        <p class="text-slate-400 font-serif text-sm mt-2 flex items-center gap-2">
                          <span class="w-1.5 h-1.5 rounded-full bg-gold-500/50"></span>
                          ${subLabel}
                        </p>
                      </div>
                      <div class="text-white/20 group-hover:text-gold-400/80 transition-all transform group-hover:translate-x-1 text-xl">
                        ${actionIcon}
                      </div>
                    </button>
                  `;
                }).join('')}
              </div>
            </main>
          `;

          if (searchQuery) {
            const input = document.getElementById('searchInput');
            input.focus();
            input.setSelectionRange(input.value.length, input.value.length);
          }

        } else if (currentView === 'CATEGORY') {
          const categoryPrayers = PRAYERS_DATA.filter(p => p.category === selectedCategory);

          root.innerHTML = `
            <header class="relative z-20 px-4 py-4 backdrop-blur-xl border-b border-white/5 sticky top-0 bg-church-950/80 shadow-lg">
              <div class="max-w-4xl mx-auto flex items-center justify-between">
                <button onclick="setView('HOME')" class="p-2 hover:bg-white/10 rounded-full transition-colors text-slate-300 hover:text-white flex items-center gap-1">
                  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                    <path d="m15 18-6-6 6-6"></path>
                  </svg>
                  <span>${currentLang === 'es' ? 'Volver' : currentLang === 'la' ? 'Retro' : 'Back'}</span>
                </button>
                <h1 class="font-display text-xl font-bold text-white">${getCategoryTitle(selectedCategory, currentLang)}</h1>
                <div class="w-8"></div>
              </div>
            </header>

            <main class="relative z-10 max-w-3xl mx-auto px-6 py-8 w-full flex-1">
              <div class="grid gap-4 animate-fade-in">
                ${categoryPrayers.length > 0 ? categoryPrayers.map(prayer => `
                  <button onclick="viewPrayer('${prayer.id}')" class="group bg-white/5 hover:bg-white/10 backdrop-blur-sm border border-white/10 hover:border-gold-500/30 p-6 rounded-xl transition-all duration-300 text-left flex items-center justify-between glass-panel active:scale-[0.99]">
                    <div>
                      <h3 class="font-display text-xl font-bold text-slate-100 group-hover:text-gold-200">${getPrayerTitle(prayer, currentLang)}</h3>
                    </div>
                    <div class="opacity-0 group-hover:opacity-100 transform translate-x-[-10px] group-hover:translate-x-0 transition-all duration-300 text-gold-400">→</div>
                  </button>
                `).join('') : `
                  <div class="glass-panel p-12 rounded-2xl border border-white/10 text-center animate-fade-in">
                    <p class="font-serif italic text-slate-400">No prayers found in this category.</p>
                  </div>
                `}
              </div>
            </main>
          `;
        } else if (currentView === 'PRAYER_DETAIL' && selectedPrayer) {
          const hasLatin = Boolean(selectedPrayer.text_la);

          root.innerHTML = `
            <header class="relative z-20 px-4 py-4 backdrop-blur-xl border-b border-white/5 sticky top-0 bg-church-950/80 shadow-lg">
              <div class="max-w-4xl mx-auto flex items-center justify-between">
                <button onclick="setView('CATEGORY')" class="p-2 hover:bg-white/10 rounded-full transition-colors text-slate-300 hover:text-white flex items-center gap-1">
                  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                    <path d="m15 18-6-6 6-6"></path>
                  </svg>
                  <span>${currentLang === 'es' ? 'Volver' : 'Back'}</span>
                </button>
                <h1 class="font-display text-xl font-bold text-white">${getPrayerTitle(selectedPrayer, currentLang)}</h1>
                
                <div class="flex items-center gap-1 bg-black/40 border border-white/10 rounded-full p-1">
                  <button onclick="setLang('en')" class="px-3 py-1 rounded-full text-xs font-bold ${currentLang === 'en' ? 'bg-gold-500 text-church-950 shadow-sm' : 'text-slate-400'}">EN</button>
                  <button onclick="setLang('es')" class="px-3 py-1 rounded-full text-xs font-bold ${currentLang === 'es' ? 'bg-gold-500 text-church-950 shadow-sm' : 'text-slate-400'}">ES</button>
                  ${hasLatin ? `<button onclick="setLang('la')" class="px-3 py-1 rounded-full text-xs font-bold ${currentLang === 'la' ? 'bg-gold-500 text-church-950 shadow-sm' : 'text-slate-400'}">LA</button>` : ''}
                </div>
              </div>
            </header>

            <main class="relative z-10 flex-1 max-w-3xl mx-auto w-full p-6 md:p-8">
              <div class="animate-fade-in glass-panel p-8 md:p-12 rounded-2xl border border-white/10 shadow-2xl">
                <div class="font-serif text-lg md:text-xl leading-[2.2] text-slate-200 whitespace-pre-line">
                  ${getPrayerText(selectedPrayer, currentLang)}
                </div>
              </div>
            </main>
          `;
        }
      }

      window.setView = (view) => {
        currentView = view;
        render();
      };

      // --- RUN APP ---
      window.onload = fetchPrayers;
    </script>
  </body>
</html>
