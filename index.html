                    id: 'beyond-the-homelab', 
                    title: "Beyond the Homelab: Translating Projects to Business Value", 
                    date: "Sep 28, 2025", 
                    tags: ["Career", "Strategy"], 
                    summary: "How skills learned in a homelab environment directly solve real-world business problems.", 
                    content: `
                        <p class="mb-4 text-lg leading-relaxed">A homelab is more than just a collection of servers and virtual machines blinking in a closet; it's a micro-enterprise. In the IT industry, experience is currency. However, the "catch-22" of needing experience to get a job is well known. My solution was to build that experience myself. Every project, every configuration, and every failure in my lab is a direct simulation of the challenges businesses face daily.</p>
                        
                        <h3 class="text-xl font-bold text-white mt-6 mb-3 border-b border-slate-700 pb-2">The Enterprise Mindset Simulation</h3>
                        <p class="mb-3">The biggest takeaway from my lab isn't just the syntax of a command, but the lifecycle of a service. In a business, you don't just install software; you plan for its maintenance, its security, and its eventual retirement. I apply this same rigor to my lab environment to cultivate an "Enterprise Mindset" before I even step foot in the office.</p>
                        
                        <h4 class="text-lg font-bold text-cyan-400 mt-5 mb-2">1. Change Management & Disaster Recovery</h4>
                        <p class="mb-3">Early in my lab journey, I deployed an update to my Proxmox host that broke the network bridge, effectively severing access to all my VMs. In a production environment, this would be an RGE (Resume Generating Event). Now, I practice strict change management:</p>
                        <ul class="list-disc pl-5 mb-4 space-y-1 text-slate-300">
                            <li><strong>Backups are Non-Negotiable:</strong> I use Proxmox Backup Server (PBS) with a retention policy that mimics industry standards (Grandfather-Father-Son). Before any major change, I verify the integrity of the latest backup.</li>
                            <li><strong>Rollback Plans:</strong> I document the steps to reverse a change before I implement it. If an update fails, I know exactly how to restore service within minutes, not hours.</li>
                        </ul>

                        <h4 class="text-lg font-bold text-cyan-400 mt-5 mb-2">2. Security by Design, Not Afterthought</h4>
                        <p class="mb-3">My lab is connected to the internet, which makes it a target for automated bots and scanners. This reality forced me to implement <strong>Defense in Depth</strong> strategies:</p>
                        <ul class="list-disc pl-5 mb-4 space-y-1 text-slate-300">
                            <li><strong>Network Segmentation:</strong> I don't let my insecure IoT devices (smart bulbs, cameras) talk to my Server VLAN. I learned to configure 802.1Q VLAN tags and firewall rules in pfSense to strictly isolate traffic.</li>
                            <li><strong>Least Privilege:</strong> My daily driver account does not have root/admin privileges. I force myself to use <code>sudo</code> or elevate privileges only when necessary, minimizing the blast radius of a potential compromise.</li>
                            <li><strong>Monitoring:</strong> Implementing Zabbix alerted me to high CPU usage on a container that was actually a misconfigured process loop. This taught me the value of observability—you can't fix what you can't see.</li>
                        </ul>
                        
                        <h3 class="text-xl font-bold text-white mt-6 mb-3 border-b border-slate-700 pb-2">Conclusion</h3>
                        <p class="leading-relaxed">Ultimately, my homelab is a proof-of-concept factory. It allows me to look an employer in the eye and say, "I haven't just read about this technology; I've built it, I've broken it, and most importantly, I've fixed it." It bridges the gap between theoretical certification knowledge and the messy reality of IT operations.</p>
                    `
                },
                { 
                    id: 'lessons-from-emergency-management', 
                    title: "Lessons from Emergency Management: An IT Perspective", 
                    date: "Sep 15, 2025", 
                    tags: ["Leadership", "Incident Response"], 
                    summary: "How years of crisis management experience provides a unique foundation for a career in IT and cybersecurity.", 
                    content: `
                        <p class="mb-4 text-lg leading-relaxed">My path to IT was not a traditional one. I spent over five years in DoD Emergency Management, coordinating responses to high-stakes crises. While the tools have changed—firewalls instead of sandbags, ransomware instead of hurricanes—the core principles of <strong>Incident Response (IR)</strong> remain strikingly identical. I bring a calmness to IT chaos that can only be learned in the field.</p>
                        
                        <h3 class="text-xl font-bold text-white mt-6 mb-3 border-b border-slate-700 pb-2">The OODA Loop in Cybersecurity</h3>
                        <p class="mb-3">In emergency ops, we live by the OODA Loop: <strong>Observe, Orient, Decide, Act</strong>. This military concept is perfectly applicable to Cyber Incident Response:</p>
                        <ul class="list-disc pl-5 mb-4 space-y-1 text-slate-300">
                            <li><strong>Observe:</strong> Recognizing the anomaly. In EM, it's a weather report; in IT, it's a spike in outbound traffic on the firewall logs.</li>
                            <li><strong>Orient:</strong> Contextualizing the data. Is this a backup job running late, or is it data exfiltration? Understanding the baseline is critical.</li>
                            <li><strong>Decide:</strong> Formulating a plan. Do we sever the connection and risk business continuity, or do we monitor to learn the attacker's objective?</li>
                            <li><strong>Act:</strong> Executing the containment strategy with precision.</li>
                        </ul>

                        <h3 class="text-xl font-bold text-white mt-6 mb-3 border-b border-slate-700 pb-2">The Art of Triage</h3>
                        <p class="mb-3">In a disaster, you rarely have enough resources to solve every problem at once. You have to triage. In IT Operations, this translates directly to ticket prioritization and resource allocation. When a server goes down, is it a critical business stopper (Code Red), or a minor inconvenience for one user (Code Green)?</p>
                        <p class="mb-3">My background trained me to assess severity quickly, strip away emotion, and allocate resources where they make the most impact on business continuity. I don't get overwhelmed by a flood of alerts; I categorize them.</p>
                        
                        <h3 class="text-xl font-bold text-white mt-6 mb-3 border-b border-slate-700 pb-2">Communication is a Critical Infrastructure</h3>
                        <p class="mb-3">The technical fix is only half the battle; the other half is communication. During a crisis, stakeholders need clear, concise, and accurate information. I learned to translate complex situational data into actionable intelligence for leadership.</p>
                        <p>In Cybersecurity, this skill is vital when explaining the impact of a vulnerability to a non-technical C-suite executive. They don't need to know the CVE number or the CVSS score; they need to know the <strong>Risk</strong> to the business revenue and reputation. I speak that language.</p>
                        
                        <p class="italic text-slate-400 border-l-2 border-cyan-500 pl-4 mt-6">"Panic fixes nothing; procedure, preparation, and clear communication fix everything."</p>
                    `
                },
                { 
                    id: 'tech-choices-explained', 
                    title: "The 'Why' Behind My Tech Choices", 
                    date: "Sep 02, 2025", 
                    tags: ["Hardware", "Architecture"], 
                    summary: "Exploring the decision-making process behind the key technologies used in my homelab.", 
                    content: `
                        <p class="mb-4 text-lg leading-relaxed">Knowing <em>how</em> to configure a tool is the job of a technician; knowing <em>why</em> you chose that tool over its alternatives is the job of an engineer. Every component in my homelab was selected not because it was easy, but because it offered the best balance of learning potential, enterprise relevance, and cost-efficiency. Here is the architecture defense for my stack.</p>
                        
                        <h3 class="text-xl font-bold text-white mt-6 mb-3 border-b border-slate-700 pb-2">Hypervisor: Proxmox VE vs. VMware ESXi</h3>
                        <p class="mb-3">While VMware is the industry standard for enterprise virtualization, I deliberately chose <strong>Proxmox Virtual Environment (VE)</strong> for my core infrastructure.</p>
                        <ul class="list-disc pl-5 mb-4 space-y-1 text-slate-300">
                            <li><strong>Open Source Transparency:</strong> Proxmox is based on Debian Linux and KVM. This forces me to get comfortable with the Linux CLI. If something breaks in Proxmox, I can usually fix it by digging into standard Linux configuration files (<code>/etc/network/interfaces</code>, <code>systemd</code>), which deepens my Linux administration skills.</li>
                            <li><strong>LXC Container Integration:</strong> Proxmox has native support for Linux Containers (LXC). This allows me to spin up lightweight services (like a DNS server or a web proxy) that share the host kernel, consuming a fraction of the resources a full VM would take. This taught me the fundamental differences between Containerization and Virtualization.</li>
                            <li><strong>No Licensing Paywalls:</strong> I can access advanced features like High Availability (HA) clustering and backup integration without navigating complex enterprise licensing tiers.</li>
                        </ul>
                        
                        <h3 class="text-xl font-bold text-white mt-6 mb-3 border-b border-slate-700 pb-2">Firewall: pfSense vs. Unifi/Consumer Routers</h3>

                        <h3 class="text-xl font-bold text-white mt-6 mb-3 border-b border-slate-700 pb-2">Operating Systems: Ubuntu & Windows Server</h3>

                    content: `
                        <p class="mb-4 text-lg leading-relaxed">Building a portfolio is a rite of passage for anyone in the tech industry, but I wanted mine to be more than just a digital resume. I wanted it to be a live demonstration of my ability to learn and implement technologies outside my immediate comfort zone of Systems Administration.</p>
                        
                        <h3 class="text-xl font-bold text-white mt-6 mb-3 border-b border-slate-700 pb-2">Hand-Coded vs. Website Builders</h3>
                        <p class="mb-3">I could have used Wix, Squarespace, or WordPress. It would have been faster. But as a technical professional, I value <strong>control</strong> and <strong>performance</strong>.</p>
                        <p class="mb-3">This site is a Single Page Application (SPA) built with <strong>Vanilla JavaScript</strong> and <strong>Tailwind CSS</strong>. There is no heavy framework like React or Angular bloating the load time. The decision to hand-code this site demonstrates several key competencies:</p>

                            <li><strong>Security Awareness:</strong> By writing the DOM manipulation logic myself, I had to be conscious of Cross-Site Scripting (XSS) vulnerabilities. I ensured that user inputs (if I had any) or data rendering methods were sanitized, a practice that directly translates to AppSec.</li>

                        <h3 class="text-xl font-bold text-white mt-6 mb-3 border-b border-slate-700 pb-2">The Design Philosophy</h3>

                        <p class="mb-4 text-lg leading-relaxed">One of the best ways to learn enterprise IT is to build a small-scale version of an enterprise network yourself. My Proxmox homelab is not just a server; it is the heart of my continuous learning strategy and a sandbox where I can execute dangerous commands safely.</p>
                        
                        <h3 class="text-xl font-bold text-white mt-6 mb-3 border-b border-slate-700 pb-2">The Hardware: Constraints as a Teacher</h3>
                        <p class="mb-3">The lab runs on a dedicated Dell server with 64GB of RAM and 12 cores. While this is modest compared to a data center rack, resource constraints are actually a great teacher. They force me to:</p>
                        <ul class="list-disc pl-5 mb-4 space-y-1 text-slate-300">

                        <h3 class="text-xl font-bold text-white mt-6 mb-3 border-b border-slate-700 pb-2">Identity Management: Active Directory</h3>
                        <p class="mb-3">Inside Proxmox, I run a Windows Server 2019 Domain Controller. This isn't just an install-and-forget setup. I actively use it to simulate corporate administration:</p>

        // RE-ADDED AND ENHANCED BLOG PAGE

        const createStudyGuidesPage = () => `

        // Helper for hidden pages
        const createHiddenPage = (title, color, icon, link, desc) => `
             <div class="min-h-screen flex items-center justify-center p-4">
                <div class="glass-panel p-12 rounded-2xl max-w-2xl text-center border-t-4 border-${color}-500">

        `;

        // --- UTILS ---
        const createIcon = (name, classes) => `<i data-lucide="${name}" class="${classes}"></i>`;

        // --- IMPROVED CANVAS ANIMATION (Background) ---
        const initCanvas = () => {
            const canvas = document.getElementById('canvas-bg');
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];
            // Mouse tracking
            let mouse = { x: null, y: null, radius: 150 };

            window.addEventListener('mousemove', (event) => {
                mouse.x = event.x;
                mouse.y = event.y;
            });
            
            // Clear mouse on leave so lines don't get stuck
            window.addEventListener('mouseleave', () => {
                mouse.x = null;
                mouse.y = null;
            });

            const resize = () => {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                initParticles();
            };

            const initParticles = () => {
                particles = [];
                // Reduce density slightly for cleaner look
                const count = Math.floor((width * height) / 18000); 
                for (let i = 0; i < count; i++) {
                    // Randomly assign a color type: Cyan (main) or Green (accent)
                    const type = Math.random() > 0.85 ? 'green' : 'cyan';
                    particles.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        vx: (Math.random() - 0.5) * 0.3, // Slower movement
                        vy: (Math.random() - 0.5) * 0.3,
                        size: Math.random() * 2 + 0.5,
                        baseOpacity: Math.random() * 0.4 + 0.1, // Varied opacity for depth
                        type: type
                    });
                }
            };

            const draw = () => {
                ctx.clearRect(0, 0, width, height);
                
                particles.forEach((p, i) => {
                    p.x += p.vx;
                    p.y += p.vy;

                    // Wrap around screen
                    if (p.x < 0) p.x = width;
                    else if (p.x > width) p.x = 0;
                    if (p.y < 0) p.y = height;
                    else if (p.y > height) p.y = 0;

                    // Draw particle
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    
                    // Color based on type
                    if (p.type === 'green') {
                        ctx.fillStyle = `rgba(16, 185, 129, ${p.baseOpacity})`; 
                    } else {
                        ctx.fillStyle = `rgba(6, 182, 212, ${p.baseOpacity})`;
                    }
                    ctx.fill();

                    // Connect to Mouse (Interactive Network)
                    if (mouse.x != null) {
                        const dx = p.x - mouse.x;
                        const dy = p.y - mouse.y;
                        const distance = Math.sqrt(dx*dx + dy*dy);
                        if (distance < mouse.radius) {
                             ctx.beginPath();
                             const opacity = 0.3 * (1 - distance / mouse.radius);
                             ctx.strokeStyle = p.type === 'green' 
                                ? `rgba(16, 185, 129, ${opacity})`
                                : `rgba(34, 211, 238, ${opacity})`;
                             ctx.lineWidth = 0.8;
                             ctx.moveTo(p.x, p.y);
                             ctx.lineTo(mouse.x, mouse.y);
                             ctx.stroke();
                        }
                    }

                    // Connect to neighbors (Constellation)
                    for (let j = i + 1; j < particles.length; j++) {
                        const p2 = particles[j];
                        const dx = p.x - p2.x;
                        const dy = p.y - p2.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < 100) {
                            ctx.beginPath();
                            // If both are green, line is green. If one is green, weak mix. Mostly Cyan.
                            let color = '34, 211, 238'; // Default Cyan
                            if (p.type === 'green' && p2.type === 'green') color = '16, 185, 129';
                            
                            ctx.strokeStyle = `rgba(${color}, ${0.08 * (1 - dist / 100)})`; // Very faint lines
                            ctx.lineWidth = 0.5;
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.stroke();
                        }
                    }
                });
                requestAnimationFrame(draw);
            };

            window.addEventListener('resize', resize);
            resize();
            draw();
        };

        // --- TYPING EFFECT ---
        const initTyping = () => {
            const element = document.getElementById('typing-text');
            if(!element) return;
            
            const words = ["Cybersecurity Analyst", "Systems Administrator", "Network Engineer", "Incident Responder"];
            let wordIndex = 0;
            let charIndex = 0;
            let isDeleting = false;
            let typeSpeed = 100;

            const type = () => {
                const currentWord = words[wordIndex];
                
                if (isDeleting) {
                    element.textContent = currentWord.substring(0, charIndex - 1);
                    charIndex--;
                    typeSpeed = 50;
                } else {
                    element.textContent = currentWord.substring(0, charIndex + 1);
                    charIndex++;
                    typeSpeed = 100;
                }

                if (!isDeleting && charIndex === currentWord.length) {
                    isDeleting = true;
                    typeSpeed = 2000; // Pause at end
                } else if (isDeleting && charIndex === 0) {
                    isDeleting = false;
                    wordIndex = (wordIndex + 1) % words.length;
                    typeSpeed = 500;
                }

                setTimeout(type, typeSpeed);
            };
            type();
        };

        // --- COPY EMAIL FUNCTION ---
        const copyEmail = () => {
            const email = 'noel.garcia1999@gmail.com';
            // Use execCommand for broader compatibility in some environments
            const textArea = document.createElement("textarea");
            textArea.value = email;
            document.body.appendChild(textArea);
            textArea.select();

                console.error('Fallback: Oops, unable to copy', err);

        // --- NEW: ANIMATE NUMBERS ---
        const animateStats = () => {
            const stats = document.querySelectorAll('.stat-counter');
            stats.forEach(counter => {
                const target = +counter.getAttribute('data-target');
                const duration = 2000; // 2 seconds
                const increment = target / (duration / 16); // 60 FPS
                
                let current = 0;
                const updateCount = () => {
                    current += increment;
                    if (current < target) {
                        counter.innerText = Math.ceil(current);
                        requestAnimationFrame(updateCount);
                    } else {
                        counter.innerText = target;
                    }
                };
                updateCount();
            });
        };

        // --- CORE LOGIC ---
        const mainContent = document.getElementById('main-content');
        const renderPage = (pageId, dataId) => {
            // Close mobile menu
            document.getElementById('mobile-menu').classList.add('hidden');
            
            let html = '';
            switch(pageId) {
                case 'home': html = createHomePage(); break;
                case 'certs_projects': html = createCertsAndProjectsPage(); break;
                case 'study_guides': html = createStudyGuidesPage(); break;
                case 'blog': html = createBlogPage(); break;
                case 'project_detail': html = createDetailPage(DATA.projects.find(p => p.id === dataId), 'project'); break;
                case 'certification_detail': html = createDetailPage(DATA.certifications.find(c => c.id === dataId), 'certification'); break;
                case 'article_detail': html = createDetailPage(DATA.articles.find(a => a.id === dataId), 'article'); break;
                // Hidden Pages
                case 'veritas': html = createHiddenPage('Veritas', 'amber', 'book-open', 'veritas.html', 'Catholic Apologetics & Family Study'); break;
                case 'prayers': html = createHiddenPage('Prayers', 'indigo', 'heart', 'prayers.html', 'Spiritual Reflections & Prayers'); break;
                case 'signum': html = createHiddenPage('Signum', 'red', 'bookmark', 'signum.html', 'The Sign & Symbol Guide'); break;
                default: html = createHomePage();
            }
            
            mainContent.innerHTML = html;
            window.scrollTo(0, 0);
            lucide.createIcons();
            
            // Re-init Typing & Stats if on home
            if (pageId === 'home') {
                initTyping();
                animateStats();
            }
            
            updateActiveNav(pageId);
        };

        const updateActiveNav = (pageId) => {
            document.querySelectorAll('.nav-link').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.page === pageId);
                // Handle parent pages
                if (pageId.includes('detail') && btn.dataset.page === 'certs_projects' && pageId !== 'article_detail') btn.classList.add('active');
                if (pageId === 'article_detail' && btn.dataset.page === 'blog') btn.classList.add('active');
            });
        };

        // Event Delegation (Click + Hover for Spotlight)
        document.body.addEventListener('click', (e) => {
            const link = e.target.closest('[data-page]');
            const filter = e.target.closest('.filter-btn');
            
            if (link) {
                renderPage(link.dataset.page, link.dataset.id);
            }
            
            if (filter) {
                // Filter Logic
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.classList.remove('bg-slate-700', 'text-white', 'shadow');
                    b.classList.add('text-slate-400', 'hover:text-white');
                });
                filter.classList.add('bg-slate-700', 'text-white', 'shadow');
                filter.classList.remove('text-slate-400');
                
                const category = filter.dataset.filter;
                document.querySelectorAll('.project-card').forEach(card => {
                    if (category === 'all' || card.dataset.category === category) {
                        card.style.display = 'flex';
                    } else {
                        card.style.display = 'none';
                    }
                });
            }
        });

        // Add Mouse Move listener for spotlight effect
        document.body.addEventListener('mousemove', (e) => {
            document.querySelectorAll('.glass-card').forEach(card => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                card.style.setProperty('--mouse-x', `${x}px`);
                card.style.setProperty('--mouse-y', `${y}px`);
            });
        });

        // Init
        document.getElementById('year').textContent = new Date().getFullYear();
        document.getElementById('desktop-nav').innerHTML = renderNav();
        document.querySelector('#mobile-menu nav').innerHTML = renderNav();
        
        document.getElementById('mobile-menu-button').onclick = () => {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        };

        // Hash Router
        const checkHash = () => {
            const hash = window.location.hash.substring(1);
            if (['veritas', 'prayers', 'signum'].includes(hash)) renderPage(hash);
            else renderPage('home');
        };
        window.addEventListener('hashchange', checkHash);

        // Start
        initCanvas();
        checkHash();

        // Reveal the site after a brief moment to ensure styles are loaded
        window.addEventListener('load', () => {
            document.body.style.opacity = '1';
        });
        // Fallback in case load event already fired
        setTimeout(() => { document.body.style.opacity = '1'; }, 300);

    </script>
</body>
</html>
''
